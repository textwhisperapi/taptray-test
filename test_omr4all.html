            x: Number(first.x || 0),
            y: top,
            w: Number(first.w || 0),
            h: Math.max(1, bottom - top),

      .filter((r) => r && Number.isFinite(r.y) && Number.isFinite(r.h) && r.h > 8)

    if (!wsSorted.length) return choirAwareStaff;

    const assignCounts = new Array(choirAwareStaff.length).fill(0);
    for (let i = 0; i < wsSorted.length; i++) {
      const w = wsSorted[i];

      let bestOverlap = -1;

    const rectH = Math.max(1, Number(rect?.h || 1));
    const wsMuchMore = wsSorted.length >= choirAwareStaff.length + 2;
    const hasVeryTallStaffBlock = choirAwareStaff.some((r) => Number(r.h || 0) >= rectH * 0.42);

  function detectPlaybackSystems() {
    if (!selection) {

      .map((r) => ({ ...r }));

  function stopPlaybackVisualLoop(hardReset = false) {

  function startPlaybackVisualLoop() {

    playbackVisualRunning = true;
    const frame = () => {
      if (!playbackVisualRunning) return;
      const p = window._activeMidiPlayer;
      if (!p || typeof p.isPlaying !== 'function' || !p.isPlaying()) {
        playbackRenderRaf = requestAnimationFrame(frame);
        return;
      }
      const rawTick = typeof p.getCurrentTick === 'function'
        ? Number(p.getCurrentTick() || 0)
        : Number(lastPlaybackTick || 0);
      let tick = rawTick;
      if (!Number.isFinite(playbackClockTick)) {
        playbackClockTick = rawTick;
      } else {
        const backward = rawTick < (playbackClockTick - 1);
        if (backward) {
          const drop = playbackClockTick - rawTick;
          const seekThreshold = Math.max(120, Number(playbackTotalTicks || 1) * 0.08);

            playbackSmoothedPx = null;
            playbackLastSystemIndex = -1;
            playbackLastDrawTick = rawTick;

            tick = playbackClockTick;
          }

        }

      playbackRenderRaf = requestAnimationFrame(frame);

  function buildPlaybackVisualCache() {
    const anchor = getActiveRect();
    if (!anchor) return null;
    const systems = playbackSystems.length ? playbackSystems : [{ y: anchor.y, h: anchor.h }];
    const sysCount = Math.max(1, systems.length);
    const band = estimatePitchBandFromStaffLines(anchor);
    const interline = Math.max(5, Number(band?.interline || (anchor.h / 18)));
    const globalLeft = Math.max(anchor.x, anchor.x + interline * 6.5);
    const globalRight = Math.max(globalLeft + 1, anchor.x + anchor.w - interline * 0.8);

    const realNotes = mapped
      .map((n) => ({

        y: Number(n.y || 0) + Number(n.h || 0) * 0.5,

        measure: String(n.measure || ''),

    const evenStep = totalTickSpan / sysCount;
    const ax = Math.max(0, Math.floor(anchor.x));
    const ay = Math.max(0, Math.floor(anchor.y));
    const aw = Math.max(1, Math.floor(anchor.w));
    const ah = Math.max(1, Math.floor(anchor.h));
    let anchorImg = null;
    try {
      anchorImg = ctx.getImageData(ax, ay, aw, ah).data;
    } catch {

    }

    const detectSystemBarlines = (sys) => {
      if (!anchorImg) return [];
      const sysLeft = Number(sys?.x || anchor.x);
      const minCandidateX = sysLeft + interline * 2.2; // after brace/clef stem zone
      const sysTop = Number(sys.y || anchor.y) - anchor.y;
      const sysH = Number(sys.h || anchor.h);
      const trim = Math.max(interline * 0.45, sysH * 0.09); // trim lyric/title bleed
      const top = Math.max(0, Math.floor(sysTop + trim));
      const bottom = Math.min(ah - 1, Math.floor(sysTop + sysH - trim));
      if (bottom - top < Math.max(10, interline * 3)) return [];
      const minDarkRatio = 0.36;
      const cands = [];
      for (let lx = 0; lx < aw; lx++) {
        let dark = 0;
        let topDark = 0;
        let midDark = 0;
        let botDark = 0;
        let curRun = 0;
        let maxRun = 0;
        const span = bottom - top + 1;
        const c1 = top + Math.floor(span / 3);
        const c2 = top + Math.floor((span * 2) / 3);
        for (let ly = top; ly <= bottom; ly++) {
          const iPix = (ly * aw + lx) * 4;
          const lum = 0.2126 * anchorImg[iPix] + 0.7152 * anchorImg[iPix + 1] + 0.0722 * anchorImg[iPix + 2];
          if (lum < 122) {
            dark++;
            curRun++;
            if (curRun > maxRun) maxRun = curRun;
            if (ly < c1) topDark++;
            else if (ly < c2) midDark++;
            else botDark++;
          } else {
            curRun = 0;
          }
        }
        const ratio = dark / Math.max(1, span);
        const fullHeight = topDark > 0 && midDark > 0 && botDark > 0;
        const longRun = maxRun >= Math.max(8, span * 0.62);
        if (ratio >= minDarkRatio && fullHeight && longRun) cands.push(ax + lx);
      }
      if (!cands.length) return [];
      const merged = [];
      for (let i = 0; i < cands.length; i++) {
        const x = cands[i];
        const prev = merged[merged.length - 1];
        if (prev == null || Math.abs(x - prev) > 2) merged.push(x);
        else merged[merged.length - 1] = Math.round((prev + x) * 0.5);
      }
      const filtered = merged.filter((x) => x >= minCandidateX && x <= globalRight);
      if (filtered.length < 2) return filtered;
      // Keep only bars that belong to a plausible repeating measure sequence.
      const minGap = Math.max(18, interline * 5.0);
      const maxGap = Math.max(minGap + 12, interline * 42.0);
      const keep = [];
      for (let i = 0; i < filtered.length; i++) {
        const x = filtered[i];
        const leftGap = i > 0 ? (x - filtered[i - 1]) : Number.POSITIVE_INFINITY;
        const rightGap = i + 1 < filtered.length ? (filtered[i + 1] - x) : Number.POSITIVE_INFINITY;
        const inSeq = (leftGap >= minGap && leftGap <= maxGap) || (rightGap >= minGap && rightGap <= maxGap);
        if (inSeq) keep.push(x);
      }
      return keep.length >= 2 ? keep : filtered;
    };
    const detectSystemStaffStartX = (sys) => {
      if (!anchorImg) return null;
      const sysLeft = Number(sys?.x || anchor.x);
      const sysTop = Number(sys.y || anchor.y) - anchor.y;
      const sysH = Number(sys.h || anchor.h);
      const probeY = Math.max(0, Math.min(ah - 1, Math.round(sysTop + sysH * 0.52)));
      const minRun = Math.max(Math.round(interline * 5.2), Math.round(aw * 0.06));
      let run = 0;
      for (let lx = 0; lx < aw; lx++) {
        const iPix = (probeY * aw + lx) * 4;
        const lum = 0.2126 * anchorImg[iPix] + 0.7152 * anchorImg[iPix + 1] + 0.0722 * anchorImg[iPix + 2];
        if (lum < 145) run++;
        else run = 0;
        if (run >= minRun) {
          const x = ax + lx - run + 1;
          return Math.max(sysLeft + interline * 1.8, x);
        }
      }
      return null;
    };

    const windows = [];
    const systemWeights = [];
    const fullSpan = Math.max(1, globalRight - globalLeft);
    for (let s = 0; s < sysCount; s++) {
      const notes = notesBySys[s].slice().sort((a, b) => a.start - b.start || a.x - b.x);
      const rawStart = notes.length ? notes[0].start : (globalStart + s * evenStep);
      const rawEnd = notes.length ? notes[notes.length - 1].end : (globalStart + (s + 1) * evenStep);
      const seenMeasure = new Set();
      let weight = 0;
      for (let i = 0; i < notes.length; i++) {
        const n = notes[i];
        const m = String(n.measure || '');
        if (!m || seenMeasure.has(m)) continue;
        seenMeasure.add(m);
        const beats = Number(n.timeBeats);
        const beatType = Number(n.timeBeatType);
        if (Number.isFinite(beats) && beats > 0 && Number.isFinite(beatType) && beatType > 0) {
          weight += beats * (4 / beatType);
        } else {
          weight += 1;
        }
      }
      if (!(weight > 0)) weight = 1;
      systemWeights.push(weight);
      let x0 = globalLeft;
      let x1 = globalRight;
      if (notes.length >= 3) {
        const xs = notes.map((n) => n.x).sort((a, b) => a - b);
        const q0 = Math.max(globalLeft, xs[Math.floor((xs.length - 1) * 0.08)] ?? xs[0]);
        const q1 = Math.min(globalRight, xs[Math.floor((xs.length - 1) * 0.95)] ?? xs[xs.length - 1]);
        const covered = Math.max(1, q1 - q0);
        const coverageRatio = covered / fullSpan;
        // If detected notes cover only part of the line, don't truncate playhead width.
        if (coverageRatio >= 0.68) {
          x0 = q0;
          x1 = q1;
        }
      }
      if (!(x1 > x0)) {
        x0 = globalLeft;
        x1 = globalRight;
      }
      const barXs = detectSystemBarlines(systems[s] || { y: anchor.y, h: anchor.h });
      if (barXs.length >= 1) {
        // Hard-start at first real barline: never begin before it.
        const firstBar = Number(barXs[0]);
        const plausible = Number.isFinite(firstBar) && firstBar <= (globalLeft + fullSpan * 0.55);
        if (plausible) x0 = Math.max(x0, firstBar);
      } else {
        const staffStartX = detectSystemStaffStartX(systems[s] || { x: anchor.x, y: anchor.y, h: anchor.h });
        if (Number.isFinite(staffStartX)) x0 = Math.max(x0, Number(staffStartX));
      }
      if (barXs.length >= 2) {
        x1 = Math.min(x1, barXs[barXs.length - 1]);
      }
      if (!(x1 > x0)) {
        x0 = globalLeft;
        x1 = globalRight;
      }
      // Keep barline sequence inside window for bar-aware interpolation.
      const innerBars = barXs.filter((x) => x > x0 + 2 && x < x1 - 2);
      windows.push({ sys: s, rawStart, rawEnd, x0, x1, bars: innerBars });
    }

    // Build contiguous monotonic tick windows from raw boundaries.
    const boundaries = new Array(sysCount + 1);
    boundaries[0] = globalStart;
    boundaries[sysCount] = globalEnd;
    const sumW = systemWeights.reduce((a, b) => a + b, 0);
    const weightedBoundaries = new Array(sysCount + 1).fill(NaN);
    if (sumW > 0) {
      weightedBoundaries[0] = globalStart;
      let cw = 0;
      for (let i = 1; i < sysCount; i++) {
        cw += Number(systemWeights[i - 1] || 0);
        weightedBoundaries[i] = Math.round(globalStart + (cw / sumW) * totalTickSpan);
      }
      weightedBoundaries[sysCount] = globalEnd;
    }
    for (let i = 1; i < sysCount; i++) {
      const a = Number(windows[i - 1].rawEnd || boundaries[i - 1] + 1);
      const b = Number(windows[i].rawStart || a + 1);
      const rawMid = Math.round((a + b) * 0.5);
      const weightedMid = Number(weightedBoundaries[i]);
      boundaries[i] = Number.isFinite(weightedMid)
        ? Math.round(rawMid * 0.35 + weightedMid * 0.65)
        : rawMid;
    }
    for (let i = 1; i < boundaries.length; i++) {
      boundaries[i] = Math.max(boundaries[i], boundaries[i - 1] + 1);
    }
    for (let i = 0; i < sysCount; i++) {
      windows[i].start = boundaries[i];
      windows[i].end = boundaries[i + 1];
    }

    // Build per-system bar segments so playhead aligns with barlines.
    for (let i = 0; i < sysCount; i++) {
      const w = windows[i];
      const xs = [Number(w.x0), ...(Array.isArray(w.bars) ? w.bars.map((v) => Number(v)) : []), Number(w.x1)]
        .filter((v) => Number.isFinite(v))
        .sort((a, b) => a - b);
      const uniq = [];
      for (let j = 0; j < xs.length; j++) {
        if (!uniq.length || Math.abs(xs[j] - uniq[uniq.length - 1]) > 2) uniq.push(xs[j]);
      }
      const segs = [];
      for (let j = 0; j + 1 < uniq.length; j++) {
        const a = uniq[j];
        const b = uniq[j + 1];
        if (b - a > 4) segs.push({ x0: a, x1: b });
      }
      if (segs.length) {
        const span = Math.max(1, Number(w.end || 0) - Number(w.start || 0));
        const segDur = span / segs.length;
        w.segments = segs.map((s, k) => ({
          x0: s.x0,
          x1: s.x1,
          start: Number(w.start || 0) + segDur * k,
          end: Number(w.start || 0) + segDur * (k + 1)
        }));
      } else {
        w.segments = [{
          x0: Number(w.x0),
          x1: Number(w.x1),
          start: Number(w.start || 0),
          end: Number(w.end || 0)
        }];
      }
    }

    return { mode: 'timeline', windows, globalStart, globalEnd };
  }

  function drawPlaybackHighlight(tick, totalTicks = playbackTotalTicks) {
    const currentTick = Number(tick || 0);
    const tickForward = !Number.isFinite(playbackLastDrawTick) || currentTick >= (playbackLastDrawTick - 0.5);
    lastPlaybackTick = currentTick;
    clearPlaybackHighlight();
    const anchor = getActiveRect();
    if (!anchor) return;
    const cache = playbackVisualCache || (playbackVisualCache = buildPlaybackVisualCache());
    const systems = playbackSystems.length ? playbackSystems : [{ y: anchor.y, h: anchor.h }];
    const sysCount = Math.max(1, systems.length);
    const windows = Array.isArray(cache?.windows) && cache.windows.length === sysCount
      ? cache.windows
      : Array.from({ length: sysCount }, (_, i) => ({
        sys: i,
        start: i,
        end: i + 1,
        x0: anchor.x + (anchor.w * 0.08),
        x1: anchor.x + (anchor.w * 0.95)
      }));

    const widths = windows.map((w) => Math.max(1, Number(w.x1 || 0) - Number(w.x0 || 0)));
    const cum = new Array(widths.length + 1).fill(0);
    for (let i = 0; i < widths.length; i++) cum[i + 1] = cum[i] + widths[i];

    let idx = 0;
    if (currentTick <= Number(windows[0].start || 0)) idx = 0;
    else if (currentTick >= Number(windows[windows.length - 1].end || 0)) idx = windows.length - 1;
    else {
      for (let i = 0; i < windows.length; i++) {
        const w = windows[i];
        if (currentTick >= Number(w.start || 0) && currentTick <= Number(w.end || 0)) {
          idx = i;
          break;
        }
      }
    }
    const w = windows[idx];
    const segments = Array.isArray(w.segments) && w.segments.length
      ? w.segments
      : [{ x0: Number(w.x0), x1: Number(w.x1), start: Number(w.start || 0), end: Number(w.end || 0) }];
    let seg = segments[0];
    for (let i = 0; i < segments.length; i++) {
      const s = segments[i];
      if (currentTick >= Number(s.start || 0) && currentTick <= Number(s.end || 0)) {
        seg = s;
        break;
      }
      if (currentTick > Number(s.end || 0)) seg = s;
    }
    const segSpan = Math.max(1, Number(seg.end || 0) - Number(seg.start || 0));
    let segPct = Math.max(0, Math.min(1, (currentTick - Number(seg.start || 0)) / segSpan));
    segPct = Math.max(0, Math.min(1, segPct * VISUAL_PROGRESS_GAIN));
    const segX = Number(seg.x0 || w.x0) + segPct * Math.max(1, Number(seg.x1 || w.x1) - Number(seg.x0 || w.x0));
    let linearPos = cum[idx] + Math.max(0, Math.min(widths[idx], segX - Number(w.x0 || segX)));
    if (tickForward && Number.isFinite(playbackLastLinearPos)) {
      linearPos = Math.max(linearPos, playbackLastLinearPos);
    }
    const maxLinear = Math.max(0, cum[cum.length - 1] - 1);
    linearPos = Math.max(0, Math.min(maxLinear, linearPos));

    let activeIdx = 0;
    while (activeIdx < widths.length - 1 && linearPos > cum[activeIdx + 1]) activeIdx++;
    const local = linearPos - cum[activeIdx];
    const activeW = windows[activeIdx];
    const px = Math.round(Number(activeW.x0 || anchor.x) + Math.max(0, Math.min(widths[activeIdx], local)));
    playbackSmoothedPx = px;
    const activeSystem = systems[activeIdx];

    const p0 = toDisplayRect(px, activeSystem.y);
    const p1 = toDisplayRect(px, activeSystem.y + activeSystem.h);
    poctx.save();
    poctx.strokeStyle = 'rgba(255, 120, 0, 0.95)';
    poctx.lineWidth = 2;
    poctx.beginPath();
    poctx.moveTo(p0.x, p0.y);
    poctx.lineTo(p1.x, p1.y);
    poctx.stroke();
    poctx.restore();
    playbackLastDrawTick = currentTick;
    playbackLastSystemIndex = activeIdx;
    playbackLastLinearPos = linearPos;

    if (!SHOW_APPROX_DOTS) return;
    if (!Array.isArray(playbackNoteMap) || playbackNoteMap.length === 0) return;
    const active = playbackNoteMap.filter((n) => tick >= n.startTick && tick <= n.endTick);
    if (!active.length) return;

    poctx.save();
    poctx.lineWidth = 2;
    poctx.strokeStyle = 'rgba(40, 180, 120, 0.95)';
    poctx.fillStyle = 'rgba(40, 180, 120, 0.20)';
    active.slice(0, 8).forEach((n) => {
      const r = toDisplayRect(n.x, n.y, n.w, n.h);
      poctx.fillRect(r.x, r.y, r.w, r.h);
      poctx.strokeRect(r.x, r.y, r.w, r.h);
    });
    poctx.restore();
  }

  function buildApproxNoteMapFromEvents(events, rect = null) {
    const anchor = rect || getActiveRect();
    if (!anchor || !events.length) return [];
    const sorted = [...events].sort((a, b) => a.startTick - b.startTick);
    const scanned = buildScannedNoteMapFromEvents(sorted, anchor);
    if (scanned.length >= Math.max(6, Math.floor(sorted.length * 0.35))) {
      return scanned;
    }
    const minPitch = Math.min(...sorted.map((n) => n.noteNumber));
    const maxPitch = Math.max(...sorted.map((n) => n.noteNumber));
    const pitchSpan = Math.max(1, maxPitch - minPitch);
    const staffBand = estimatePitchBandFromStaffLines(anchor);
    const yTop = staffBand?.yTop ?? (anchor.y + anchor.h * 0.07);
    const yBottom = staffBand?.yBottom ?? (anchor.y + anchor.h * 0.34);
    const interline = Math.max(5, Number(staffBand?.interline || (anchor.h / 18)));
    const lyricGuardBottom = anchor.y + anchor.h * 0.52;
    const boxW = Math.max(6, Math.min(14, Math.round(interline * 1.3)));
    const boxH = Math.max(6, Math.min(14, Math.round(interline * 1.25)));
    const step = anchor.w / (sorted.length + 1);
    const bandH = Math.max(24, yBottom - yTop);

    return sorted.map((n, i) => {
      const x = Math.round(Math.max(anchor.x, Math.min(anchor.x + anchor.w - boxW, anchor.x + step * (i + 1) - boxW / 2)));
      const pNorm = (n.noteNumber - minPitch) / pitchSpan;
      const yCenter = yBottom - Math.max(0, Math.min(1, pNorm)) * bandH;
      const yRaw = Math.round(yCenter - boxH / 2);
      const y = Math.max(
        Math.round(yTop - boxH * 0.3),
        Math.min(Math.round(Math.min(yBottom - boxH * 0.7, lyricGuardBottom - boxH)), yRaw)
      );
      return {
        ...n,
        x,
        y,
        w: boxW,
        h: boxH,
        mapSource: 'pitch'
      };
    });
  }

  function scanNoteHeadLocations(rect) {
    if (!rect || !ctx) return [];
    try {
      const systems = (detectSystemsInRect(rect) || [])
        .filter((s) => s && Number.isFinite(s.y) && Number.isFinite(s.h) && s.h > 10);
      const systemsOrdered = systems.length
        ? [...systems].sort((a, b) => a.y - b.y)
        : [{ x: rect.x, y: rect.y, w: rect.w, h: rect.h }];
      const band = estimatePitchBandFromStaffLines(rect);
      const interline = Math.max(5, Number(band?.interline || (rect.h / 18)));
      const systemsBottom = systems.length ? Math.max(...systems.map((s) => s.y + s.h)) : null;
      const hasMultiSystems = systems.length > 1;
      const lyricCutoffY = hasMultiSystems
        ? Math.min(rect.y + rect.h, Number(systemsBottom || (rect.y + rect.h)) + interline * 0.8)
        : (band?.yBottom ?? (rect.y + rect.h * 0.36)) + interline * 0.8;
      const systemsTop = systems.length ? Math.min(...systems.map((s) => s.y)) : null;
      let staffTopGlobal = Number.isFinite(systemsTop) ? systemsTop : (band?.yTop ?? (rect.y + rect.h * 0.05));
      let staffBottomGlobal = Number.isFinite(systemsBottom) ? systemsBottom : (band?.yBottom ?? (rect.y + rect.h * 0.34));
      const getSystemIndexForY = (cy) => {
        let bestIdx = 0;
        let bestDist = Number.POSITIVE_INFINITY;
        for (let i = 0; i < systemsOrdered.length; i++) {
          const s = systemsOrdered[i];
          const top = s.y - interline * 1.2;
          const bottom = s.y + s.h + interline * 1.1;
          if (cy >= top && cy <= bottom) return i;
          const c = s.y + s.h * 0.5;
          const d = Math.abs(cy - c);
          if (d < bestDist) {
            bestDist = d;
            bestIdx = i;
          }
        }
        return bestIdx;
      };

      const roiTop = Math.max(
        rect.y,
        (systemsTop ?? (band?.yTop ?? (rect.y + rect.h * 0.05))) - interline * 1.2
      );
      const roiBottom = Math.min(
        rect.y + rect.h,
        Math.min((systemsBottom ?? (band?.yBottom ?? (rect.y + rect.h * 0.34))) + interline * 0.8, lyricCutoffY)
      );

      const sx = Math.max(0, Math.floor(rect.x));
      const sy = Math.max(0, Math.floor(roiTop));
      const sw = Math.max(1, Math.floor(rect.w));
      const sh = Math.max(1, Math.floor(roiBottom - roiTop));
      if (sw < 6 || sh < 6) return [];

      const img = ctx.getImageData(sx, sy, sw, sh).data;
      const mask = new Uint8Array(sw * sh);
      const rowDark = new Array(sh).fill(0);
      const rowRun = new Array(sh).fill(0);
      const isMusicInk = (r, g, b, lumThresh = 132) => {
        const lum = 0.2126 * r + 0.7152 * g + 0.0722 * b;
        if (lum >= lumThresh) return false;
        // Keep neutral/dark print ink, reject colored annotations (blue/red pen marks).
        const rg = Math.abs(r - g);
        const gb = Math.abs(g - b);
        const rb = Math.abs(r - b);
        return rg <= 28 && gb <= 28 && rb <= 36;
      };

      for (let y = 0; y < sh; y++) {
        let dark = 0;
        let run = 0;
        let maxRun = 0;
        const rowOffset = y * sw * 4;
        for (let x = 0; x < sw; x++) {
          const i = rowOffset + x * 4;
          const r = img[i], g = img[i + 1], b = img[i + 2];
          const isDark = isMusicInk(r, g, b, 132);
          if (isDark) {
            dark++;
            run++;
            if (run > maxRun) maxRun = run;
            mask[y * sw + x] = 1;
          } else {
            run = 0;
          }
        }
        rowDark[y] = dark / sw;
        rowRun[y] = maxRun / sw;
      }

      // Build staff-line centers from long horizontal runs.
      const lineCentersLocal = [];
      let lineRunStart = -1;
      for (let y = 0; y < sh; y++) {
        const onLine = rowDark[y] >= 0.022 && rowRun[y] >= 0.56;
        if (onLine && lineRunStart === -1) lineRunStart = y;
        if (!onLine && lineRunStart !== -1) {
          lineCentersLocal.push(Math.round((lineRunStart + (y - 1)) / 2));
          lineRunStart = -1;
        }
      }
      if (lineRunStart !== -1) {
        lineCentersLocal.push(Math.round((lineRunStart + (sh - 1)) / 2));
      }
      const rawLineCentersGlobal = lineCentersLocal
        .map((y) => sy + y)
        .filter((y) => y <= lyricCutoffY && y >= rect.y);

      // Keep one center per actual staff line (merge near-duplicates).
      const lineCentersGlobal = [];
      const mergeTol = Math.max(2, interline * 0.33);
      rawLineCentersGlobal
        .sort((a, b) => a - b)
        .forEach((y) => {
          const prev = lineCentersGlobal[lineCentersGlobal.length - 1];
          if (prev === undefined || Math.abs(y - prev) > mergeTol) {
            lineCentersGlobal.push(y);
          } else {
            lineCentersGlobal[lineCentersGlobal.length - 1] = (prev + y) / 2;
          }
        });

      // Require at least one full 5-line staff group.
      const staffGroups = [];
      for (let i = 0; i + 4 < lineCentersGlobal.length; i++) {
        const group = lineCentersGlobal.slice(i, i + 5);
        const gaps = [
          group[1] - group[0],
          group[2] - group[1],
          group[3] - group[2],
          group[4] - group[3]
        ];
        const inRange = gaps.every((d) => d >= interline * 0.45 && d <= interline * 1.75);
        if (!inRange) continue;
        const meanGap = gaps.reduce((s, v) => s + v, 0) / gaps.length;
        const maxDev = Math.max(...gaps.map((d) => Math.abs(d - meanGap)));
        if (maxDev > interline * 0.55) continue;

        // Avoid duplicates of the same 5-line staff.
        const last = staffGroups[staffGroups.length - 1];
        if (!last || Math.abs(group[2] - last[2]) > interline * 0.9) {
          staffGroups.push(group);
        }
      }
      if (!staffGroups.length) return [];

      const systemMeta = systemsOrdered.map((s, i) => ({
        ...s,
        sys: i,
        groups: [],
        slots: [],
        top: s.y - interline * 1.1,
        bottom: Math.min(s.y + s.h + interline * 1.0, lyricCutoffY)
      }));
      staffGroups.forEach((group) => {
        const centerY = group[2];
        const sys = getSystemIndexForY(centerY);
        if (systemMeta[sys]) systemMeta[sys].groups.push(group);
      });
      if (!systemMeta.some((m) => m.groups.length)) return [];
      systemMeta.forEach((m) => {
        if (!m.groups.length) return;
        const lines = m.groups.flat();
        m.top = Math.max(rect.y, Math.min(...lines) - interline * 1.1);
        m.bottom = Math.min(lyricCutoffY, Math.max(...lines) + interline * 1.1);
        for (let g = 0; g < m.groups.length; g++) {
          const group = m.groups[g];
          for (let i = 0; i < group.length; i++) {
            m.slots.push(group[i]);
            if (i > 0) {
              m.slots.push((group[i - 1] + group[i]) * 0.5);
            }
          }
        }
      });
      systemMeta.forEach((m) => {
        // Estimate actual staff start x from long horizontal runs on detected staff-line rows.
        // This is robust against left margin text (TENOR/BASS labels).
        const lineYs = (Array.isArray(m.groups) ? m.groups.flat() : [])
          .map((gy) => Math.round(Number(gy || 0) - sy))
          .filter((ly) => ly >= 0 && ly < sh);
        const probeRows = [...new Set(lineYs)];
        const starts = [];
        const minRun = Math.max(Math.round(interline * 5.5), Math.round(sw * 0.08));
        for (let r = 0; r < probeRows.length; r++) {
          const y = probeRows[r];
          let run = 0;
          for (let x = 0; x < sw; x++) {
            const iPix = (y * sw + x) * 4;
            const dark = isMusicInk(img[iPix], img[iPix + 1], img[iPix + 2], 145);
            if (dark) {
              run++;
            } else {
              run = 0;
            }
            if (run >= minRun) {
              starts.push(x - run + 1);
              break;
            }
          }
        }
        if (starts.length) {
          starts.sort((a, b) => a - b);
          const s0 = starts[Math.floor(starts.length * 0.25)];
          m.staffStartX = sx + s0;
        } else {
          m.staffStartX = Number(m.x || rect.x);
        }
      });

      const allGroupLines = staffGroups.flat();
      staffTopGlobal = Math.max(rect.y, Math.min(...allGroupLines) - interline * 1.1);
      staffBottomGlobal = Math.min(lyricCutoffY, Math.max(...allGroupLines) + interline * 1.1);

      // Remove likely staff lines (long horizontal runs).
      for (let y = 0; y < sh; y++) {
        if (rowDark[y] > 0.04 && rowRun[y] > 0.5) {
          const y0 = Math.max(0, y - 1);
          const y1 = Math.min(sh - 1, y + 1);
          for (let yy = y0; yy <= y1; yy++) {
            for (let x = 0; x < sw; x++) mask[yy * sw + x] = 0;
          }
        }
      }

      const visited = new Uint8Array(sw * sh);
      const minArea = Math.max(5, Math.round(interline * interline * 0.12));
      const maxArea = Math.max(70, Math.round(interline * interline * 10.0));
      const blobs = [];
      const qx = new Int16Array(sw * sh);
      const qy = new Int16Array(sw * sh);

      for (let y = 0; y < sh; y++) {
        for (let x = 0; x < sw; x++) {
          const idx = y * sw + x;
          if (!mask[idx] || visited[idx]) continue;
          let head = 0;
          let tail = 0;
          qx[tail] = x;
          qy[tail] = y;
          tail++;
          visited[idx] = 1;

          let area = 0;
          let minX = x, maxX = x, minY = y, maxY = y;
          let sumX = 0, sumY = 0;

          while (head < tail) {
            const cx = qx[head];
            const cy = qy[head];
            head++;
            area++;
            sumX += cx;
            sumY += cy;
            if (cx < minX) minX = cx;
            if (cx > maxX) maxX = cx;
            if (cy < minY) minY = cy;
            if (cy > maxY) maxY = cy;

            for (let oy = -1; oy <= 1; oy++) {
              for (let ox = -1; ox <= 1; ox++) {
                if (ox === 0 && oy === 0) continue;
                const nx = cx + ox;
                const ny = cy + oy;
                if (nx < 0 || ny < 0 || nx >= sw || ny >= sh) continue;
                const nIdx = ny * sw + nx;
                if (!mask[nIdx] || visited[nIdx]) continue;
                visited[nIdx] = 1;
                qx[tail] = nx;
                qy[tail] = ny;
                tail++;
              }
            }
          }

          const w = maxX - minX + 1;
          const h = maxY - minY + 1;
          const aspect = w / Math.max(1, h);
          const fill = area / Math.max(1, w * h);
          if (area < minArea || area > maxArea) continue;
          // Keep only notehead-like dimensions; reject long stems/text fragments.
          if (w < Math.max(4, interline * 0.45) || h < Math.max(4, interline * 0.40)) continue;
          if (w > interline * 2.3 || h > interline * 2.1) continue;
          if (aspect < 0.45 || aspect > 2.25) continue;
          if (fill < 0.08 || fill > 0.94) continue;

          // Distinguish filled (black) vs open (half) noteheads via center/ring darkness.
          let centerPix = 0;
          let centerDark = 0;
          let ringPix = 0;
          let ringDark = 0;
          const cx0 = (minX + maxX) * 0.5;
          const cy0 = (minY + maxY) * 0.5;
          const rx = Math.max(1, w * 0.5);
          const ry = Math.max(1, h * 0.5);
          for (let yy = minY; yy <= maxY; yy++) {
            const row = yy * sw * 4;
            for (let xx = minX; xx <= maxX; xx++) {
              const dx = (xx - cx0) / rx;
              const dy = (yy - cy0) / ry;
              const r2 = dx * dx + dy * dy;
              if (r2 > 1.25) continue;
              const iPix = row + xx * 4;
              const isDark = isMusicInk(img[iPix], img[iPix + 1], img[iPix + 2], 140);
              if (r2 <= 0.42) {
                centerPix++;
                if (isDark) centerDark++;
              } else if (r2 >= 0.62 && r2 <= 1.18) {
                ringPix++;
                if (isDark) ringDark++;
              }
            }
          }
          const centerDarkRatio = centerPix ? (centerDark / centerPix) : 0;
          const ringDarkRatio = ringPix ? (ringDark / ringPix) : 0;
          const looksBlackHead = centerDarkRatio >= 0.36 && fill >= 0.22;
          const looksHalfHead = ringDarkRatio >= 0.30 && centerDarkRatio <= 0.45 && fill <= 0.55;
          if (!looksBlackHead && !looksHalfHead) continue;

          const cyGlobal = sy + (sumY / area);
          const sys = getSystemIndexForY(cyGlobal);
          const meta = systemMeta[sys];
          const topBound = Number.isFinite(meta?.top) ? meta.top : staffTopGlobal;
          const bottomBound = Number.isFinite(meta?.bottom) ? meta.bottom : staffBottomGlobal;
          // Allow ledger-line notes above/below staff while still rejecting distant text.
          if (cyGlobal < topBound - interline * 3.2 || cyGlobal > bottomBound + interline * 3.2) continue;

          // Noteheads must sit near staff/space slots, including ledger steps.
          let minSlotDist = Number.POSITIVE_INFINITY;
          const slots = Array.isArray(meta?.slots) && meta.slots.length ? meta.slots.slice() : [];
          if (slots.length >= 2) {
            const topSlot = Math.min(...slots);
            const bottomSlot = Math.max(...slots);
            const slotStep = Math.max(2, interline * 0.5);
            const ledgerSteps = 8;
            for (let k = 1; k <= ledgerSteps; k++) {
              slots.push(topSlot - slotStep * k);
              slots.push(bottomSlot + slotStep * k);
            }
          }
          for (let s = 0; s < slots.length; s++) {
            const d = Math.abs(cyGlobal - slots[s]);
            if (d < minSlotDist) minSlotDist = d;
          }
          if (minSlotDist > interline * 0.58) continue;

          if (!systems.length) {
            // Last safety net to avoid lyric row blobs when system detection fails.
            const lyricGuard = Math.min(rect.y + rect.h * 0.50, lyricCutoffY);
            if (cyGlobal > lyricGuard) continue;
          }

          blobs.push({
            cx: sx + sumX / area,
            cy: cyGlobal,
            sys,
            area,
            headType: looksBlackHead ? 'black' : 'half'
          });
        }
      }

      if (!blobs.length) return [];
      blobs.sort((a, b) => a.sys - b.sys || a.cx - b.cx || a.cy - b.cy);

      // Deduplicate near-identical detections, but keep close vertical chord notes.
      const deduped = [];
      const mergeDx = interline * 0.34;
      const mergeDy = interline * 0.26;
      for (let i = 0; i < blobs.length; i++) {
        const b = blobs[i];
        const prev = deduped[deduped.length - 1];
        if (!prev) {
          deduped.push(b);
          continue;
        }
        const dx = b.cx - prev.cx;
        const dy = b.cy - prev.cy;
        if (prev.sys === b.sys && Math.abs(dx) < mergeDx && Math.abs(dy) < mergeDy) {
          if (b.area > prev.area) deduped[deduped.length - 1] = b;
        } else {
          deduped.push(b);
        }
      }

      // Hard-exclude left label/brace lane (voice names, brace, title text).
      // This avoids classifying "TENOR/BASS" text as notes.
      let refined = [];
      for (let si = 0; si < systemsOrdered.length; si++) {
        const group = deduped.filter((b) => b.sys === si);
        if (!group.length) continue;
        const staffStartX = Number(systemMeta[si]?.staffStartX || systemsOrdered[si].x || rect.x);
        const leftGuardX = staffStartX + interline * 1.9;
        const musicalLane = group.filter((b) => b.cx >= leftGuardX);
        refined.push(...musicalLane);
      }

      // Drop false blobs that appear immediately before a vertical barline.
      // True noteheads are typically on/after the beat side, not just left of a barline stroke.
      const isFrontOfBarArtifact = (b) => {
        const cxLocal = Math.round(Number(b.cx || 0) - sx);
        const cyLocal = Math.round(Number(b.cy || 0) - sy);
        if (!Number.isFinite(cxLocal) || !Number.isFinite(cyLocal)) return false;
        if (cxLocal < 0 || cxLocal >= sw || cyLocal < 0 || cyLocal >= sh) return false;
        const y0 = Math.max(0, Math.round(cyLocal - interline * 2.1));
        const y1 = Math.min(sh - 1, Math.round(cyLocal + interline * 2.1));
        if (y1 - y0 < 8) return false;
        const minDx = Math.max(1, Math.round(interline * 0.18));
        const maxDx = Math.max(minDx + 1, Math.round(interline * 1.05));
        for (let dx = minDx; dx <= maxDx; dx++) {
          const x = cxLocal + dx;
          if (x < 0 || x >= sw) continue;
          let dark = 0;
          let topDark = 0;
          let midDark = 0;
          let botDark = 0;
          const span = Math.max(1, y1 - y0 + 1);
          const cut1 = y0 + Math.floor(span / 3);
          const cut2 = y0 + Math.floor((span * 2) / 3);
          for (let y = y0; y <= y1; y++) {
            const iPix = (y * sw + x) * 4;
            if (isMusicInk(img[iPix], img[iPix + 1], img[iPix + 2], 122)) {
              dark++;
              if (y < cut1) topDark++;
              else if (y < cut2) midDark++;
              else botDark++;
            }
          }
          const darkRatio = dark / span;
          const verticalContinuity = (topDark > 0) && (midDark > 0) && (botDark > 0);
          if (darkRatio >= 0.62 && verticalContinuity) return true;
        }
        return false;
      };
      refined = refined.filter((b) => !isFrontOfBarArtifact(b));

      // Limit over-detection in the same x-column, but preserve common chords.
      const colWindow = interline * 0.40;
      const maxPerColumn = 3;
      const minVerticalGap = Math.max(3, interline * 0.46);
      const limited = [];
      for (let si = 0; si < systemsOrdered.length; si++) {
        const byX = refined.filter((b) => b.sys === si).sort((a, b) => a.cx - b.cx || a.cy - b.cy);
        const columnGroups = [];
        for (let i = 0; i < byX.length; i++) {
          const b = byX[i];
          const g = columnGroups[columnGroups.length - 1];
          if (!g || Math.abs(b.cx - g.cxMean) > colWindow) {
            columnGroups.push({ items: [b], cxMean: b.cx });
          } else {
            g.items.push(b);
            g.cxMean = g.items.reduce((s, it) => s + it.cx, 0) / g.items.length;
          }
        }
        for (let i = 0; i < columnGroups.length; i++) {
          const grp = columnGroups[i].items.slice().sort((a, b) => b.area - a.area);
          const selected = [];
          for (let j = 0; j < grp.length; j++) {
            const cand = grp[j];
            const tooClose = selected.some((it) => Math.abs(Number(it.cy || 0) - Number(cand.cy || 0)) < minVerticalGap);
            if (tooClose) continue;
            selected.push(cand);
            if (selected.length >= maxPerColumn) break;
          }
          limited.push(...selected);
        }
      }
      refined = limited.sort((a, b) => a.sys - b.sys || a.cx - b.cx || a.cy - b.cy);

      const boxW = Math.max(6, Math.min(14, Math.round(interline * 1.3)));
      const boxH = Math.max(6, Math.min(14, Math.round(interline * 1.25)));
      return refined.map((b) => ({
        x: Math.round(Math.max(rect.x, Math.min(rect.x + rect.w - boxW, b.cx - boxW / 2))),
        y: Math.round(Math.max(rect.y, Math.min(rect.y + rect.h - boxH, b.cy - boxH / 2))),
        w: boxW,
        h: boxH
      }));
    } catch {
      return [];
    }
  }

  function buildScannedNoteMapFromEvents(sortedEvents, rect) {
    const heads = scanNoteHeadLocations(rect);
    if (!heads.length || !sortedEvents.length) return [];
    const mapCount = Math.min(sortedEvents.length, heads.length);
    const out = [];
    for (let i = 0; i < mapCount; i++) {
      const ev = sortedEvents[i];
      const idx = (sortedEvents.length > 1 && heads.length > 1)
        ? Math.round((i / (sortedEvents.length - 1)) * (heads.length - 1))
        : Math.min(i, heads.length - 1);
      const h = heads[Math.max(0, Math.min(heads.length - 1, idx))];
      out.push({
        ...ev,
        x: h.x,
        y: h.y,
        w: h.w,
        h: h.h,
        mapSource: 'scan'
      });
    }
    return out;
  }

  function buildExactScanNoteMapFromEvents(sortedEvents, rect) {
    const heads = scanNoteHeadLocations(rect);
    if (!heads.length || !sortedEvents.length) return [];

    const minCount = Math.min(sortedEvents.length, heads.length);
    const maxCount = Math.max(sortedEvents.length, heads.length);
    const coverage = minCount / Math.max(1, maxCount);

    // Strict mode: require high coverage between scanned noteheads and MIDI notes.
    if (coverage < 0.78 || minCount < 8) return [];

    const out = [];
    for (let i = 0; i < minCount; i++) {
      const evIdx = (minCount > 1 && sortedEvents.length > 1)
        ? Math.round((i / (minCount - 1)) * (sortedEvents.length - 1))
        : 0;
      const headIdx = (minCount > 1 && heads.length > 1)
        ? Math.round((i / (minCount - 1)) * (heads.length - 1))
        : 0;
      const ev = sortedEvents[Math.max(0, Math.min(sortedEvents.length - 1, evIdx))];
      const h = heads[Math.max(0, Math.min(heads.length - 1, headIdx))];
      out.push({
        ...ev,
        x: h.x,
        y: h.y,
        w: h.w,
        h: h.h,
        mapSource: 'exact-scan'
      });
    }
    return out;
  }

  function extractNoteEventsFromTracks(tracks) {
    const events = [];
    tracks.forEach((track) => {
      const stacks = new Map();
      track.forEach((ev) => {
        if (!ev || typeof ev.tick !== 'number' || typeof ev.noteNumber !== 'number') return;
        const ch = Number(ev.channel || 1);
        const key = `${ch}:${ev.noteNumber}`;
        if (ev.name === 'Note on' && (ev.velocity || 0) > 0) {
          if (!stacks.has(key)) stacks.set(key, []);
          stacks.get(key).push(ev.tick);
        } else if (ev.name === 'Note off' || (ev.name === 'Note on' && (ev.velocity || 0) === 0)) {
          const stack = stacks.get(key);
          if (stack && stack.length) {
            const startTick = stack.pop();
            events.push({
              startTick,
              endTick: Math.max(startTick, ev.tick),
              noteNumber: ev.noteNumber,
              channel: ch
            });
          }
        }
      });
    });
    return events;
  }

  function extractNoteMessagesFromTracks(tracks) {
    const out = [];
    tracks.forEach((track) => {
      track.forEach((ev) => {
        if (!ev || typeof ev.tick !== 'number' || typeof ev.noteNumber !== 'number') return;
        const tick = Math.max(0, Math.floor(Number(ev.tick || 0)));
        const noteNumber = Math.max(0, Math.min(127, Number(ev.noteNumber || 0)));
        const channel = Math.max(1, Math.min(16, Number(ev.channel || 1)));
        const vel = Math.max(0, Math.min(127, Number(ev.velocity || 0)));
        if (ev.name === 'Note on' && vel > 0) {
          out.push({ tick, type: 'on', noteNumber, channel, velocity: vel });
        } else if (ev.name === 'Note off' || (ev.name === 'Note on' && vel === 0)) {
          out.push({ tick, type: 'off', noteNumber, channel, velocity: 0 });
        }
      });
    });
    return out.sort((a, b) => Number(a.tick || 0) - Number(b.tick || 0) || (a.type === 'off' ? -1 : 1));
  }

  function extractControlMessagesFromTracks(tracks) {
    const out = [];
    tracks.forEach((track) => {
      track.forEach((ev) => {
        if (!ev || typeof ev.tick !== 'number') return;
        const tick = Math.max(0, Math.floor(Number(ev.tick || 0)));
        const channel = Math.max(1, Math.min(16, Number(ev.channel || 1)));
        if (ev.name === 'Controller Change') {
          out.push({
            tick,
            channel,
            name: 'Controller Change',
            controllerType: Number(ev.controllerType || 0),
            value: Number(ev.value || 0)
          });
        } else if (ev.name === 'Program Change') {
          out.push({
            tick,
            channel,
            name: 'Program Change',
            value: Number(ev.value || ev.programNumber || 0)
          });
        }
      });
    });
    return out.sort((a, b) => Number(a.tick || 0) - Number(b.tick || 0));
  }

  function analyzeMidiRingingCandidates(midiInfo) {
    const notes = Array.isArray(midiInfo?.notes) ? midiInfo.notes : [];
    const noteMessages = Array.isArray(midiInfo?.noteMessages) ? midiInfo.noteMessages : [];
    const controlMessages = Array.isArray(midiInfo?.controlMessages) ? midiInfo.controlMessages : [];

    const durations = notes
      .map((n) => Math.max(1, Number(n.endTick || 0) - Number(n.startTick || 0)))
      .sort((a, b) => a - b);
    const medianDur = durations.length ? durations[Math.floor(durations.length * 0.5)] : 1;
    const longDur = Math.max(48, Math.round(medianDur * 4.2));
    const quickRetriggerGap = Math.max(3, Math.round(medianDur * 0.12));

    const longHoldNotes = notes
      .filter((n) => (Number(n.endTick || 0) - Number(n.startTick || 0)) >= longDur)
      .slice(0, 240)
      .map((n) => ({
        startTick: Number(n.startTick || 0),
        endTick: Number(n.endTick || 0),
        duration: Math.max(1, Number(n.endTick || 0) - Number(n.startTick || 0)),
        noteNumber: Number(n.noteNumber || 0),
        channel: Number(n.channel || 1)
      }));

    const retriggers = [];
    const byKey = new Map();
    for (let i = 0; i < notes.length; i++) {
      const n = notes[i];
      const key = `${Number(n.channel || 1)}:${Number(n.noteNumber || 0)}`;
      if (!byKey.has(key)) byKey.set(key, []);
      byKey.get(key).push(n);
    }
    byKey.forEach((arr, key) => {
      const seq = [...arr].sort((a, b) => Number(a.startTick || 0) - Number(b.startTick || 0));
      for (let i = 1; i < seq.length; i++) {
        const prev = seq[i - 1];
        const cur = seq[i];
        const gap = Number(cur.startTick || 0) - Number(prev.endTick || 0);
        if (Math.abs(gap) <= quickRetriggerGap) {
          retriggers.push({
            key,
            prevStart: Number(prev.startTick || 0),
            prevEnd: Number(prev.endTick || 0),
            curStart: Number(cur.startTick || 0),
            curEnd: Number(cur.endTick || 0),
            gap
          });
          if (retriggers.length >= 240) break;
        }
      }
    });

    const balance = new Map();
    for (let i = 0; i < noteMessages.length; i++) {
      const m = noteMessages[i];
      const key = `${Number(m.channel || 1)}:${Number(m.noteNumber || 0)}`;
      const cur = Number(balance.get(key) || 0);
      if (m.type === 'on') balance.set(key, cur + 1);
      else if (m.type === 'off') balance.set(key, Math.max(0, cur - 1));
    }
    const likelyStuck = [];
    balance.forEach((count, key) => {
      if (count > 0) likelyStuck.push({ key, unmatchedOnCount: count });
    });

    const cc64 = controlMessages
      .filter((m) => m.name === 'Controller Change' && Number(m.controllerType || 0) === 64)
      .slice(0, 400);

    return {
      medianDurationTicks: medianDur,
      longDurationThresholdTicks: longDur,
      quickRetriggerThresholdTicks: quickRetriggerGap,
      longHoldCount: longHoldNotes.length,
      retriggerCount: retriggers.length,
      unmatchedOnKeys: likelyStuck,
      sustainEvents: cc64,
      longHoldNotes,
      retriggers
    };
  }

  function encodeVlq(value) {
    let v = Math.max(0, Math.floor(Number(value || 0)));
    const out = [v & 0x7f];
    while ((v >>= 7) > 0) out.unshift((v & 0x7f) | 0x80);
    return out;
  }

  function u32be(n) {
    const v = Number(n >>> 0);
    return [(v >>> 24) & 0xff, (v >>> 16) & 0xff, (v >>> 8) & 0xff, v & 0xff];
  }

  function u16be(n) {
    const v = Number(n & 0xffff);
    return [(v >>> 8) & 0xff, v & 0xff];
  }

  function bytesToBase64(bytes) {
    const arr = bytes instanceof Uint8Array ? bytes : new Uint8Array(bytes || []);
    let out = '';
    const chunk = 0x8000;
    for (let i = 0; i < arr.length; i += chunk) {
      out += String.fromCharCode(...arr.subarray(i, i + chunk));
    }
    return btoa(out);
  }

  function parseMidiFromArrayBuffer(buffer) {
    const parser = new MidiPlayer.Player(() => {});
    parser.loadArrayBuffer(buffer);
    const tracks = parser.getEvents();
    const noteMessages = extractNoteMessagesFromTracks(tracks);
    const notes = extractNoteEventsFromTracks(tracks);
    const controlMessages = extractControlMessagesFromTracks(tracks);
    return {
      division: Math.max(1, Number(parser.division || 480)),
      tempoBpm: Math.max(20, Number(parser.tempo || 120)),
      totalTicks: Math.max(1, Number(parser.totalTicks || 1)),
      noteMessages,
      notes,
      controlMessages
    };
  }

  function buildMidiFromNoteEvents(noteEvents, division = 480, tempoBpm = 120) {
    if (!Array.isArray(noteEvents) || !noteEvents.length) return null;
    const srcNotes = noteEvents
      .map((n) => ({
        startTick: Math.max(0, Math.floor(Number(n.startTick || 0))),
        endTick: Math.max(0, Math.floor(Number(n.endTick || 0))),
        noteNumber: Math.max(0, Math.min(127, Number(n.noteNumber || 0))),
        channel: Math.max(1, Math.min(16, Number(n.channel || 1)))
      }))
      .filter((n) => n.endTick > n.startTick);
    if (!srcNotes.length) return null;

    // Trim likely false tie/slur carries: if a long tone keeps sounding while
    // a nearby stepwise tone starts, end the old tone at that onset.
    const durs = srcNotes.map((n) => Math.max(1, n.endTick - n.startTick)).sort((a, b) => a - b);
    const medianDur = durs[Math.floor(durs.length * 0.5)] || 1;
    const retriggerMergeTol = 1;
    const minLongDur = Math.max(180, Math.floor(medianDur * 1.05));
    const minTail = Math.max(36, Math.floor(medianDur * 0.20));
    const trimmed = srcNotes.map((n) => ({ ...n }));
    for (let i = 0; i < trimmed.length; i++) {
      const n = trimmed[i];
      const dur = n.endTick - n.startTick;
      if (dur < minLongDur) continue;
      let cutAt = null;
      for (let j = 0; j < trimmed.length; j++) {
        if (i === j) continue;
        const m = trimmed[j];
        if (m.startTick <= n.startTick || m.startTick >= n.endTick) continue;
        if (Math.abs(m.noteNumber - n.noteNumber) > 2) continue;
        if ((n.endTick - m.startTick) < minTail) continue;
        if (cutAt === null || m.startTick < cutAt) cutAt = m.startTick;
      }
      // Additional guard for monophonic vocal channels:
      // if a later onset appears on the same channel while this note is still on,
      // the earlier note is likely an OMR tie/slur carry and should stop there.
      for (let j = 0; j < trimmed.length; j++) {
        if (i === j) continue;
        const m = trimmed[j];
        if (Number(m.channel || 1) !== Number(n.channel || 1)) continue;
        if (m.startTick <= n.startTick || m.startTick >= n.endTick) continue;
        if ((n.endTick - m.startTick) < minTail) continue;
        if (cutAt === null || m.startTick < cutAt) cutAt = m.startTick;
      }
      if (cutAt !== null) {
        n.endTick = Math.max(n.startTick + 1, cutAt - 1);
      }
    }

    // Collapse exact unison duplicates (same pitch/start, different channels).
    // These are common OMR merge artifacts and sound like ringing/chorus.
    const dedupeByUnison = [];
    const byPitch = new Map();
    const sortedTrimmed = [...trimmed].sort((a, b) => a.startTick - b.startTick || a.noteNumber - b.noteNumber || a.channel - b.channel);
    for (let i = 0; i < sortedTrimmed.length; i++) {
      const n = sortedTrimmed[i];
      const key = String(n.noteNumber);
      const arr = byPitch.get(key) || [];
      let merged = false;
      for (let j = arr.length - 1; j >= 0; j--) {
        const p = arr[j];
        const sameStart = Math.abs(Number(n.startTick || 0) - Number(p.startTick || 0)) <= 1;
        const overlap = Math.min(Number(n.endTick || 0), Number(p.endTick || 0)) - Math.max(Number(n.startTick || 0), Number(p.startTick || 0));
        const minDur = Math.max(1, Math.min(Number(n.endTick || 0) - Number(n.startTick || 0), Number(p.endTick || 0) - Number(p.startTick || 0)));
        const heavyOverlap = overlap >= Math.floor(minDur * 0.7);
        if (!sameStart || !heavyOverlap) continue;
        p.startTick = Math.min(p.startTick, n.startTick);
        p.endTick = Math.max(p.endTick, n.endTick);
        // Keep deterministic channel assignment.
        p.channel = Math.min(Number(p.channel || 1), Number(n.channel || 1));
        merged = true;
        break;
      }
      if (!merged) {
        const clone = { ...n };
        arr.push(clone);
        dedupeByUnison.push(clone);
        byPitch.set(key, arr);
      }
    }

    const events = [];
    const activeByKey = new Map();
    for (let i = 0; i < dedupeByUnison.length; i++) {
      const n = dedupeByUnison[i];
      const ch = Math.max(0, Math.min(15, Number((n.channel || 1) - 1)));
      const nn = Math.max(0, Math.min(127, Number(n.noteNumber || 0)));
      const onTick = Math.max(0, Math.floor(Number(n.startTick || 0)));
      const offTick = Math.max(onTick + 1, Math.floor(Number(n.endTick || 0)));
      const key = `${ch}:${nn}`;
      const active = activeByKey.get(key);
      if (!active) {
        activeByKey.set(key, { start: onTick, end: offTick });
      } else if (onTick <= (active.end + retriggerMergeTol)) {
        active.end = Math.max(active.end, offTick);
      } else {
        events.push({ tick: active.start, type: 'on', ch, nn, vel: 92 });
        events.push({ tick: active.end, type: 'off', ch, nn, vel: 0 });
        activeByKey.set(key, { start: onTick, end: offTick });
      }
    }
    activeByKey.forEach((active, key) => {
      const [chText, nnText] = String(key).split(':');
      const ch = Number(chText || 0);
      const nn = Number(nnText || 0);
      events.push({ tick: Number(active.start || 0), type: 'on', ch, nn, vel: 92 });
      events.push({ tick: Number(active.end || 0), type: 'off', ch, nn, vel: 0 });
    });
    if (!events.length) return null;
    events.sort((a, b) => a.tick - b.tick || (a.type === 'off' ? -1 : 1) || a.ch - b.ch || a.nn - b.nn);

    // Remove large leading silence introduced by OMR timing drift.
    const firstOn = events.find((e) => e.type === 'on');
    const leadShift = Math.max(0, Number(firstOn?.tick || 0));
    if (leadShift > 0) {
      for (let i = 0; i < events.length; i++) {
        events[i].tick = Math.max(0, Number(events[i].tick || 0) - leadShift);
      }
    }

    const track = [];
    const tempoUs = Math.max(1, Math.round(60000000 / Math.max(20, Number(tempoBpm || 120))));
    // Set tempo at tick 0.
    track.push(0x00, 0xff, 0x51, 0x03, (tempoUs >>> 16) & 0xff, (tempoUs >>> 8) & 0xff, tempoUs & 0xff);
    // Program change: Acoustic Grand Piano on channel 1.
    track.push(0x00, 0xc0, 0x00);

    let lastTick = 0;
    for (let i = 0; i < events.length; i++) {
      const ev = events[i];
      const delta = Math.max(0, ev.tick - lastTick);
      lastTick = ev.tick;
      track.push(...encodeVlq(delta));
      if (ev.type === 'on') {
        track.push(0x90 | ev.ch, ev.nn, ev.vel);
      } else {
        track.push(0x80 | ev.ch, ev.nn, ev.vel);
      }
    }
    // Hard-stop controllers help avoid stuck/ringing tails on some players/soundfonts.
    for (let ch = 0; ch < 16; ch++) {
      track.push(0x00, 0xB0 | ch, 64, 0);  // sustain off
      track.push(0x00, 0xB0 | ch, 123, 0); // all notes off
    }
    // End of track.
    track.push(0x00, 0xff, 0x2f, 0x00);

    const header = [
      0x4d, 0x54, 0x68, 0x64, // MThd
      0x00, 0x00, 0x00, 0x06, // header len
      0x00, 0x00, // format 0
      0x00, 0x01, // 1 track
      ...u16be(Math.max(1, Math.min(32767, Math.floor(division))))
    ];
    const mtrk = [
      0x4d, 0x54, 0x72, 0x6b, // MTrk
      ...u32be(track.length),
      ...track
    ];
    return new Uint8Array([...header, ...mtrk]);
  }

  function buildMidiFromNoteEventsBasic(noteEvents, division = 480, tempoBpm = 120) {
    if (!Array.isArray(noteEvents) || !noteEvents.length) return null;
    const srcRaw = noteEvents
      .map((n) => ({
        startTick: Math.max(0, Math.floor(Number(n.startTick || 0))),
        endTick: Math.max(0, Math.floor(Number(n.endTick || 0))),
        noteNumber: Math.max(0, Math.min(127, Number(n.noteNumber || 0))),
        channel: Math.max(1, Math.min(16, Number(n.channel || 1)))
      }))
      .filter((n) => n.endTick > n.startTick)
      .sort((a, b) => nCmp(a, b));
    if (!srcRaw.length) return null;

    function nCmp(a, b) {
      return Number(a.startTick || 0) - Number(b.startTick || 0)
        || Number(a.noteNumber || 0) - Number(b.noteNumber || 0)
        || Number(a.channel || 1) - Number(b.channel || 1);
    }

    // Merge same pitch/channel re-triggers with tiny gap (tie-safe).
    // This preserves notated ties without creating rapid re-attacks.
    const src = [];
    for (let i = 0; i < srcRaw.length; i++) {
      const n = srcRaw[i];
      const prev = src[src.length - 1];
      if (
        prev &&
        Number(prev.channel || 1) === Number(n.channel || 1) &&
        Number(prev.noteNumber || 0) === Number(n.noteNumber || 0) &&
        Number(n.startTick || 0) < Number(prev.endTick || 0)
      ) {
        prev.endTick = Math.max(Number(prev.endTick || 0), Number(n.endTick || 0));
        continue;
      }
      src.push({ ...n });
    }

    const events = [];
    for (let i = 0; i < src.length; i++) {
      const n = src[i];
      const ch = Math.max(0, Math.min(15, Number((n.channel || 1) - 1)));
      events.push({ tick: Number(n.startTick || 0), type: 'on', ch, nn: Number(n.noteNumber || 0), vel: 92 });
      events.push({ tick: Number(n.endTick || 0), type: 'off', ch, nn: Number(n.noteNumber || 0), vel: 0 });
    }
    events.sort((a, b) => Number(a.tick || 0) - Number(b.tick || 0) || (a.type === 'off' ? -1 : 1) || a.ch - b.ch || a.nn - b.nn);

    const firstOn = events.find((e) => e.type === 'on');
    const shift = Math.max(0, Number(firstOn?.tick || 0));
    if (shift > 0) {
      for (let i = 0; i < events.length; i++) {
        events[i].tick = Math.max(0, Number(events[i].tick || 0) - shift);
      }
    }

    const track = [];
    const tempoUs = Math.max(1, Math.round(60000000 / Math.max(20, Number(tempoBpm || 120))));
    track.push(0x00, 0xff, 0x51, 0x03, (tempoUs >>> 16) & 0xff, (tempoUs >>> 8) & 0xff, tempoUs & 0xff);
    for (let ch = 0; ch < 16; ch++) track.push(0x00, 0xc0 | ch, 0x00);

    let lastTick = 0;
    for (let i = 0; i < events.length; i++) {
      const ev = events[i];
      const delta = Math.max(0, Number(ev.tick || 0) - lastTick);
      lastTick = Math.max(0, Number(ev.tick || 0));
      track.push(...encodeVlq(delta));
      if (ev.type === 'on') track.push(0x90 | ev.ch, ev.nn, ev.vel > 0 ? ev.vel : 88);
      else track.push(0x80 | ev.ch, ev.nn, 0x00);
    }
    for (let ch = 0; ch < 16; ch++) {
      track.push(0x00, 0xB0 | ch, 64, 0);
      track.push(0x00, 0xB0 | ch, 123, 0);
    }
    track.push(0x00, 0xff, 0x2f, 0x00);

    const header = [
      0x4d, 0x54, 0x68, 0x64,
      0x00, 0x00, 0x00, 0x06,
      0x00, 0x00,
      0x00, 0x01,
      ...u16be(Math.max(1, Math.min(32767, Math.floor(division))))
    ];
    const mtrk = [0x4d, 0x54, 0x72, 0x6b, ...u32be(track.length), ...track];
    return new Uint8Array([...header, ...mtrk]);
  }

  function removeRapidRetriggersAsRest(noteEvents, division = 480) {
    if (!Array.isArray(noteEvents) || !noteEvents.length) return [];
    const src = noteEvents
      .map((n) => ({
        startTick: Math.max(0, Number(n.startTick || 0)),
        endTick: Math.max(0, Number(n.endTick || 0)),
        noteNumber: Math.max(0, Math.min(127, Number(n.noteNumber || 0))),
        channel: Math.max(1, Math.min(16, Number(n.channel || 1)))
      }))
      .filter((n) => n.endTick > n.startTick)
      .sort((a, b) =>
        Number(a.channel || 1) - Number(b.channel || 1) ||
        Number(a.noteNumber || 0) - Number(b.noteNumber || 0) ||
        Number(a.startTick || 0) - Number(b.startTick || 0)
      );
    if (!src.length) return [];

    const rapidGap = Math.max(1, Math.round(Number(division || 480) * 0.01)); // ~5 ticks at 480
    const out = [];
    const lastByKey = new Map();
    for (let i = 0; i < src.length; i++) {
      const n = src[i];
      const key = `${n.channel}:${n.noteNumber}`;
      const prev = lastByKey.get(key);
      if (prev) {
        const gap = Number(n.startTick || 0) - Number(prev.endTick || 0);
        const rapid = gap >= 0 && gap <= rapidGap;
        if (rapid) {
          // Treat rapid re-attack as intended silence instead of a new note.
          continue;
        }
      }
      out.push(n);
      lastByKey.set(key, n);
    }
    return out;
  }

  function buildMidiFromNoteMessages(noteMessages, division = 480, tempoBpm = 120) {
    if (!Array.isArray(noteMessages) || !noteMessages.length) return null;
    const sorted = [...noteMessages].sort((a, b) => Number(a.tick || 0) - Number(b.tick || 0) || (a.type === 'off' ? -1 : 1));

    // Canonicalize events so same channel+pitch cannot be stacked.
    // OMR merges can emit parallel duplicate note-ons for the same key,
    // which sounds like ringing/chorus on playback.
    const msgs = [];
    const activeKeys = new Set();
    for (let i = 0; i < sorted.length; i++) {
      const m = sorted[i];
      if (!m) continue;
      const tick = Math.max(0, Math.floor(Number(m.tick || 0)));
      const noteNumber = Math.max(0, Math.min(127, Number(m.noteNumber || 0)));
      const channel = Math.max(1, Math.min(16, Number(m.channel || 1)));
      const key = `${channel}:${noteNumber}`;
      if (m.type === 'on') {
        if (activeKeys.has(key)) continue;
        activeKeys.add(key);
        msgs.push({
          tick,
          type: 'on',
          noteNumber,
          channel,
          velocity: Math.max(0, Math.min(127, Number(m.velocity || 0)))
        });
      } else {
        if (!activeKeys.has(key)) continue;
        activeKeys.delete(key);
        msgs.push({
          tick,
          type: 'off',
          noteNumber,
          channel,
          velocity: 0
        });
      }
    }
    if (!msgs.length) return null;

    // Rebase to first note-on so MIDI starts promptly.
    const firstOnTick = (() => {
      for (let i = 0; i < msgs.length; i++) {
        if (msgs[i]?.type === 'on') return Math.max(0, Number(msgs[i].tick || 0));
      }
      return 0;
    })();
    if (firstOnTick > 0) {
      for (let i = 0; i < msgs.length; i++) {
        msgs[i].tick = Math.max(0, Number(msgs[i].tick || 0) - firstOnTick);
      }
    }

    // Targeted de-ring fix:
    // If a note is an outlier-long hold and ends exactly at the next onset
    // in the same channel, shorten it to local median context.
    {
      const active = new Map();
      const spans = [];
      for (let i = 0; i < msgs.length; i++) {
        const m = msgs[i];
        const ch = Math.max(1, Math.min(16, Number(m.channel || 1)));
        const nn = Math.max(0, Math.min(127, Number(m.noteNumber || 0)));
        const t = Math.max(0, Number(m.tick || 0));
        const key = `${ch}:${nn}`;
        if (m.type === 'on') {
          active.set(key, { startTick: t, onIndex: i, channel: ch, noteNumber: nn });
        } else {
          const a = active.get(key);
          if (!a) continue;
          spans.push({
            channel: ch,
            noteNumber: nn,
            startTick: Number(a.startTick || 0),
            endTick: t,
            offIndex: i
          });
          active.delete(key);
        }
      }
      const byCh = new Map();
      for (let i = 0; i < spans.length; i++) {
        const s = spans[i];
        const arr = byCh.get(s.channel) || [];
        arr.push(s);
        byCh.set(s.channel, arr);
      }
      byCh.forEach((arr) => {
        arr.sort((a, b) => Number(a.startTick || 0) - Number(b.startTick || 0) || Number(a.noteNumber || 0) - Number(b.noteNumber || 0));
        const durs = arr.map((s) => Math.max(1, Number(s.endTick || 0) - Number(s.startTick || 0))).sort((a, b) => a - b);
        const medianDur = durs[Math.floor(durs.length * 0.5)] || 1;
        for (let i = 0; i < arr.length - 1; i++) {
          const cur = arr[i];
          const next = arr[i + 1];
          const dur = Math.max(1, Number(cur.endTick || 0) - Number(cur.startTick || 0));
          const immediateNext = Number(next.startTick || 0) === (Number(cur.endTick || 0) + 1);
          const outlierLong = dur > Math.max(Math.round(medianDur * 1.9), Math.round(Number(division || 480) * 0.9));
          if (!(immediateNext && outlierLong)) continue;

          const prevDur = [];
          for (let p = Math.max(0, i - 4); p < i; p++) {
            prevDur.push(Math.max(1, Number(arr[p].endTick || 0) - Number(arr[p].startTick || 0)));
          }
          const shortContext = prevDur.length >= 3
            && Math.max(...prevDur) <= Math.max(Math.round(medianDur * 1.35), Math.round(Number(division || 480) * 0.8));
          if (!shortContext) continue;

          const target = Math.round(Math.max(medianDur * 1.1, Number(division || 480) * 0.45));
          const newEnd = Math.max(
            Number(cur.startTick || 0) + 1,
            Math.min(Number(cur.endTick || 0), Number(next.startTick || 0) - 1, Number(cur.startTick || 0) + target)
          );
          if (newEnd < Number(cur.endTick || 0)) {
            cur.endTick = newEnd;
            msgs[cur.offIndex].tick = newEnd;
          }
        }
      });
      msgs.sort((a, b) => Number(a.tick || 0) - Number(b.tick || 0) || (a.type === 'off' ? -1 : 1));
    }

    const track = [];
    const tempoUs = Math.max(1, Math.round(60000000 / Math.max(20, Number(tempoBpm || 120))));
    track.push(0x00, 0xff, 0x51, 0x03, (tempoUs >>> 16) & 0xff, (tempoUs >>> 8) & 0xff, tempoUs & 0xff);
    // Program changes for all channels keep timbre stable while preserving channel layout.
    for (let ch = 0; ch < 16; ch++) {
      track.push(0x00, 0xc0 | ch, 0x00);
    }

    let lastTick = 0;
    for (let i = 0; i < msgs.length; i++) {
      const m = msgs[i];
      const tick = Math.max(0, Math.floor(Number(m.tick || 0)));
      const delta = Math.max(0, tick - lastTick);
      lastTick = tick;
      const note = Math.max(0, Math.min(127, Number(m.noteNumber || 0)));
      const vel = Math.max(0, Math.min(127, Number(m.velocity || 0)));
      const chSrc = Math.max(0, Math.min(15, Number((m.channel || 1) - 1)));
      const ch = chSrc;
      track.push(...encodeVlq(delta));
      if (m.type === 'on') track.push(0x90 | ch, note, vel > 0 ? vel : 88);
      else track.push(0x80 | ch, note, 0x00);
    }
    // Hard-stop controllers help avoid stuck/ringing tails on some players/soundfonts.
    for (let ch = 0; ch < 16; ch++) {
      track.push(0x00, 0xB0 | ch, 64, 0);  // sustain off
      track.push(0x00, 0xB0 | ch, 123, 0); // all notes off
    }
    track.push(0x00, 0xff, 0x2f, 0x00);

    const header = [
      0x4d, 0x54, 0x68, 0x64,
      0x00, 0x00, 0x00, 0x06,
      0x00, 0x00,
      0x00, 0x01,
      ...u16be(Math.max(1, Math.min(32767, Math.floor(division))))
    ];
    const mtrk = [0x4d, 0x54, 0x72, 0x6b, ...u32be(track.length), ...track];
    return new Uint8Array([...header, ...mtrk]);
  }

  function stabilizeOctaveGlitches(notes) {
    if (!Array.isArray(notes) || notes.length < 3) return Array.isArray(notes) ? notes.slice() : [];
    const grouped = new Map();
    for (let i = 0; i < notes.length; i++) {
      const n = notes[i];
      const ch = Math.max(1, Math.min(16, Number(n.channel || 1)));
      if (!grouped.has(ch)) grouped.set(ch, []);
      grouped.get(ch).push({ ...n, channel: ch });
    }

    const out = [];
    grouped.forEach((arr) => {
      const seq = arr.sort((a, b) => Number(a.startTick || 0) - Number(b.startTick || 0) || Number(a.noteNumber || 0) - Number(b.noteNumber || 0));
      const fixed = seq.map((n) => ({ ...n }));

      for (let i = 1; i < seq.length - 1; i++) {
        const prev = fixed[i - 1];
        const cur = fixed[i];
        const next = fixed[i + 1];
        const p = Number(prev.noteNumber || 0);
        const c = Number(cur.noteNumber || 0);
        const q = Number(next.noteNumber || 0);
        if (!Number.isFinite(p) || !Number.isFinite(c) || !Number.isFinite(q)) continue;

        // Only fix isolated octave-like spikes inside a locally stable line.
        if (Math.abs(p - q) > 7) continue;
        const center = (p + q) / 2;
        const absDelta = Math.abs(c - center);
        const looksLikeOctaveSpike =
          (absDelta >= 10 && absDelta <= 14) ||
          (absDelta >= 22 && absDelta <= 26);
        if (!looksLikeOctaveSpike) continue;

        let candidate = c;
        while (candidate - center > 7) candidate -= 12;
        while (center - candidate > 7) candidate += 12;
        if (Math.abs(candidate - center) > 5) continue;
        if ((candidate - c) % 12 !== 0) continue;

        cur.noteNumber = Math.max(0, Math.min(127, Math.round(candidate)));
      }
      out.push(...fixed);
    });

    return out.sort((a, b) => Number(a.startTick || 0) - Number(b.startTick || 0) || Number(a.channel || 1) - Number(b.channel || 1) || Number(a.noteNumber || 0) - Number(b.noteNumber || 0));
  }

  function removeIsolatedSilencePings(notes) {
    if (!Array.isArray(notes) || notes.length < 5) return Array.isArray(notes) ? notes.slice() : [];
    const sorted = [...notes].sort((a, b) => Number(a.startTick || 0) - Number(b.startTick || 0) || Number(a.noteNumber || 0) - Number(b.noteNumber || 0));
    const durs = sorted
      .map((n) => Math.max(1, Number(n.endTick || 0) - Number(n.startTick || 0)))
      .sort((a, b) => a - b);
    const medianDur = durs[Math.floor(durs.length * 0.5)] || 1;
    const shortDur = Math.max(4, Math.floor(medianDur * 0.45));
    const longGap = Math.max(12, Math.floor(medianDur * 2.9));
    const nearStartTol = 2;

    const countNearStart = (tick) => {
      let c = 0;
      for (let i = 0; i < sorted.length; i++) {
        if (Math.abs(Number(sorted[i].startTick || 0) - tick) <= nearStartTol) c++;
      }
      return c;
    };

    const out = [];
    for (let i = 0; i < sorted.length; i++) {
      const n = sorted[i];
      const start = Number(n.startTick || 0);
      const end = Number(n.endTick || 0);
      const dur = Math.max(1, end - start);
      if (dur > shortDur) {
        out.push(n);
        continue;
      }

      const prev = i > 0 ? sorted[i - 1] : null;
      const next = i + 1 < sorted.length ? sorted[i + 1] : null;
      if (!prev || !next) {
        out.push(n);
        continue;
      }
      const prevGap = start - Number(prev.startTick || 0);
      const nextGap = Number(next.startTick || 0) - start;
      const chordLike = countNearStart(start) > 1;
      const isolated = prevGap > longGap && nextGap > longGap;

      if (!(isolated && !chordLike)) out.push(n);
    }
    return out;
  }

  function filterSystemNotesForMerge(notes) {
    if (!Array.isArray(notes) || !notes.length) return [];
    const sorted = [...notes]
      .map((n) => ({
        startTick: Number(n.startTick || 0),
        endTick: Math.max(Number(n.startTick || 0) + 1, Number(n.endTick || 0)),
        noteNumber: Number(n.noteNumber || 0),
        channel: Number(n.channel || 1)
      }))
      .filter((n) => Number.isFinite(n.startTick) && Number.isFinite(n.endTick) && Number.isFinite(n.noteNumber))
      .sort((a, b) => a.startTick - b.startTick || a.noteNumber - b.noteNumber);
    if (!sorted.length) return [];

    const durs = sorted.map((n) => Math.max(0, n.endTick - n.startTick)).sort((a, b) => a - b);
    const medianDur = durs[Math.floor(durs.length * 0.5)] || 1;
    const minDur = Math.max(6, Math.floor(medianDur * 0.22));
    const retriggerTol = Math.max(2, Math.min(8, Math.round(medianDur * 0.05)));

    const pitches = sorted.map((n) => n.noteNumber).sort((a, b) => a - b);
    const p05 = pitches[Math.floor((pitches.length - 1) * 0.05)] ?? 30;
    const p95 = pitches[Math.floor((pitches.length - 1) * 0.95)] ?? 100;
    const minPitch = Math.max(30, Math.floor(p05 - 12));
    const maxPitch = Math.min(100, Math.ceil(p95 + 12));

    const filtered = sorted.filter((n) => {
      const dur = Math.max(0, n.endTick - n.startTick);
      if (dur < minDur) return false;
      if (n.noteNumber < minPitch || n.noteNumber > maxPitch) return false;
      return true;
    });
    if (!filtered.length) return [];

    // Remove strict duplicate overlaps for same channel+pitch only.
    // Do not merge notes separated by gaps; that can create false ringing.
    const deduped = [];
    for (let i = 0; i < filtered.length; i++) {
      const n = filtered[i];
      const prev = deduped[deduped.length - 1];
      if (
        prev &&
        prev.channel === n.channel &&
        prev.noteNumber === n.noteNumber &&
        (
          Math.abs(n.startTick - prev.startTick) <= retriggerTol ||
          n.startTick < prev.endTick
        )
      ) {
        prev.startTick = Math.min(prev.startTick, n.startTick);
        prev.endTick = Math.max(prev.endTick, n.endTick);
      } else {
        deduped.push(n);
      }
    }

    // Disable cross-channel tie/slur merging; it can over-glue lines and ring.
    const stable = deduped.map((n) => ({ ...n }));
    stable.sort((a, b) => Number(a.startTick || 0) - Number(b.startTick || 0) || Number(a.noteNumber || 0) - Number(b.noteNumber || 0));
    const octaveFixed = stabilizeOctaveGlitches(stable);
    return removeIsolatedSilencePings(octaveFixed);
  }

  async function sanitizeNoisyOmrMidi(data) {
    if (!data || !data.midiUrl) return data;
    try {
      const midiInfo = await loadMidiInfoFromOmrData(data);
      const srcMsgs = Array.isArray(midiInfo?.noteMessages) ? midiInfo.noteMessages : [];
      if (srcMsgs.length < 2) return data;
      const srcNotes = Array.isArray(midiInfo?.notes) ? midiInfo.notes : [];
      const division = Math.max(1, Number(midiInfo?.division || 480));
      const tempoBpm = Math.max(20, Number(midiInfo?.tempoBpm || 120));

      // Prefer MusicXML as the source of truth when available.
      // This avoids OMR "rest/lyric as note" artifacts entirely.
      if (data?.musicXmlUrl) {
        try {
          const xmlText = await fetchMusicXmlTextFromUrl(data.musicXmlUrl);
          const restMap = parseMusicXmlRestIntervals(xmlText, division);
          const xmlNotes = parseMusicXmlToNoteEvents(xmlText, division)
            .filter((n) => Number(n.endTick || 0) > Number(n.startTick || 0));
          let filteredXmlNotes = xmlNotes;
          if (restMap instanceof Map && restMap.size) {
            const isInRest = (note) => {
              const partId = String(note.partId || '').trim();
              const voice = String(note.voice || '').trim() || '1';
              const restKey = partId ? `${partId}::${voice}` : '';
              const rests = restKey ? (restMap.get(restKey) || []) : [];
              if (!rests.length) return false;
              const t = Math.max(0, Math.round(Number(note.startTick || 0)));
              for (let i = 0; i < rests.length; i++) {
                const r = rests[i];
                if (t >= Number(r.startTick || 0) && t < Number(r.endTick || 0)) return true;
                if (Number(r.startTick || 0) > t) break;
              }
              return false;
            };
            filteredXmlNotes = xmlNotes.filter((n) => !isInRest(n));
            const dropped = xmlNotes.length - filteredXmlNotes.length;
            if (dropped > 0) writeLog(`Rest filter dropped ${dropped} XML note(s).`);
          }
          if (filteredXmlNotes.length) {
            const xmlMidiBytes = buildMidiFromNoteEventsBasic(filteredXmlNotes, division, tempoBpm);
            if (xmlMidiBytes instanceof Uint8Array && xmlMidiBytes.length) {
              const published = await publishMergedMidiBase64(bytesToBase64(xmlMidiBytes));
              if (published?.midiUrl) {
                writeLog(`MusicXML → MIDI: ${filteredXmlNotes.length} notes (lyrics/rests ignored).`);
                return {
                  ...data,
                  midiUrl: published.midiUrl,
                  midiName: String(data.midiName || published.midiName || 'omr-xml.mid')
                };
              }
            }
          }
        } catch (e) {
          console.warn('MusicXML rebuild skipped:', e);
        }
      }

      // Clean deterministic path:
      // 1) Keep notes >= 1/32
      // 2) If MusicXML exists, drop note-onsets that fall inside rest windows,
      //    unless there is a nearby real XML note onset.
      // 3) Rebuild MIDI from remaining notes.
      let cleanedNotes = srcNotes
        .map((n) => ({
          startTick: Math.max(0, Number(n.startTick || 0)),
          endTick: Math.max(0, Number(n.endTick || 0)),
          noteNumber: Math.max(0, Math.min(127, Number(n.noteNumber || 0))),
          channel: Math.max(1, Math.min(16, Number(n.channel || 1)))
        }))
        .filter((n) => n.endTick > n.startTick);

      const min32 = Math.max(1, Math.round(division / 8));
      cleanedNotes = cleanedNotes.filter((n) => (n.endTick - n.startTick) >= min32);

      if (data?.musicXmlUrl && cleanedNotes.length) {
        try {
          const xmlText = await fetchMusicXmlTextFromUrl(data.musicXmlUrl);
          const xmlNotes = parseMusicXmlToNoteEvents(xmlText, division);
          const restMap = parseMusicXmlRestIntervals(xmlText, division);
          const xmlOnsetsByPitch = new Map();
          if (Array.isArray(xmlNotes)) {
            for (let i = 0; i < xmlNotes.length; i++) {
              const n = xmlNotes[i];
              const p = Math.max(0, Math.min(127, Number(n.noteNumber || 0)));
              const t = Math.max(0, Math.round(Number(n.startTick || 0)));
              const arr = xmlOnsetsByPitch.get(p) || [];
              arr.push(t);
              xmlOnsetsByPitch.set(p, arr);
            }
            xmlOnsetsByPitch.forEach((arr) => arr.sort((a, b) => a - b));
          }
          const flatRests = [];
          if (restMap instanceof Map) {
            restMap.forEach((arr) => {
              for (let i = 0; i < (arr || []).length; i++) {
                const r = arr[i];
                const s = Math.max(0, Number(r?.startTick || 0));
                const e = Math.max(s + 1, Number(r?.endTick || 0));
                if (e > s) flatRests.push({ s, e });
              }
            });
          }
          flatRests.sort((a, b) => a.s - b.s || a.e - b.e);
          const onsetTol = Math.max(12, Math.round(division * 0.05));
          const inRest = (tick) => {
            for (let i = 0; i < flatRests.length; i++) {
              if (tick >= flatRests[i].s && tick < flatRests[i].e) return true;
              if (flatRests[i].s > tick) break;
            }
            return false;
          };
          const hasNearXmlOnset = (tick, pitch) => {
            const arr = xmlOnsetsByPitch.get(Math.max(0, Math.min(127, Number(pitch || 0)))) || [];
            for (let i = 0; i < arr.length; i++) {
              if (Math.abs(arr[i] - tick) <= onsetTol) return true;
            }
            return false;
          };

          let droppedOnRest = 0;
          cleanedNotes = cleanedNotes.filter((n) => {
            const t = Math.max(0, Math.round(Number(n.startTick || 0)));
            if (!inRest(t)) return true;
            if (hasNearXmlOnset(t, n.noteNumber)) return true;
            droppedOnRest += 1;
            return false;
          });
          if (droppedOnRest > 0) {
            writeLog(`Rest-authoritative filter removed ${droppedOnRest} note-on(s) in rest area.`);
          }
        } catch (e) {
          console.warn('Rest-authoritative filter skipped:', e);
        }
      }

      const midiBytes = cleanedNotes.length
        ? buildMidiFromNoteEventsBasic(cleanedNotes, division, tempoBpm)
        : buildMidiFromNoteMessages(srcMsgs, division, tempoBpm);
      if (!(midiBytes instanceof Uint8Array) || !midiBytes.length) return data;

      const published = await publishMergedMidiBase64(bytesToBase64(midiBytes));
      if (!published?.midiUrl) return data;

      return {
        ...data,
        midiUrl: published.midiUrl,
        midiName: String(data.midiName || published.midiName || 'omr-clean.mid')
      };
    } catch {
      return data;
    }
  }

  async function loadMidiInfoFromOmrData(data) {
    try {
      let arr = null;
      if (data?.midiUrl) {
        const res = await fetch(data.midiUrl, { cache: 'no-store' });
        if (!res.ok) return null;
        arr = await res.arrayBuffer();
      } else if (data?.midiBase64) {
        const bytes = Uint8Array.from(atob(data.midiBase64), c => c.charCodeAt(0));
        arr = bytes.buffer;
      }
      if (!arr) return null;
      return parseMidiFromArrayBuffer(arr);
    } catch (e) {
      console.warn('Failed to parse system MIDI:', e);
      return null;
    }
  }

  function buildPartAwareChannelNotes(filteredNotes, visualMap, partChannelMap) {
    if (!Array.isArray(filteredNotes) || !filteredNotes.length) return [];
    if (!Array.isArray(visualMap) || !visualMap.length) {
      return filteredNotes.map((n) => ({ ...n }));
    }
    const notes = [...filteredNotes].sort((a, b) => Number(a.startTick || 0) - Number(b.startTick || 0) || Number(a.noteNumber || 0) - Number(b.noteNumber || 0));
    const vis = [...visualMap].sort((a, b) => Number(a.startTick || 0) - Number(b.startTick || 0) || Number(a.noteNumber || 0) - Number(b.noteNumber || 0));

    const out = [];
    const useIndexMatch = Math.abs(notes.length - vis.length) <= Math.max(2, Math.floor(notes.length * 0.1));

    for (let i = 0; i < notes.length; i++) {
      const n = notes[i];
      const m = useIndexMatch ? vis[Math.min(i, vis.length - 1)] : null;
      let partId = (m && typeof m.partId === 'string') ? m.partId.trim() : '';
