    const canAutoSplit = useAutoSplit && systemsForAuto.length > 1;
    if (fastMode && usingFullPage && systemsForAuto.length >= 3) {
      // Full-page choral pages with lyrics are more reliable with higher-quality crops.
      fastMode = false;
      writeLog('Quality mode auto-enabled for multi-system full page.');
    }
    const primaryFactor = fastMode ? 1 : null;

    if (canAutoSplit) {
      writeLog(`Auto split enabled. Found ${systemsForAuto.length} systems${usingFullPage ? ' on full page' : ''}.`);
      setScanProgress(10, `Found ${systemsForAuto.length} systems.`);
    }
    setStatus('Running OMR (this can take a bit)…', true);
    setScanProgress(12, 'Running OMR…');
    try {
      resetAutoSplitPlaybackQueue();
      scannedSystemEntries = [];
      activeScannedSystemIndex = -1;
      preparedMergedNoteMap = null;
      preparedMergedName = '';
      const started = Date.now();
      let data = null;
      let attempt = { ok: false, message: 'No run executed.' };
      let rectUsedForRun = runRect;
      let autoSplitSuccesses = [];

      if (canAutoSplit) {
        const successes = [];
        for (let i = 0; i < systemsForAuto.length; i++) {
          const rect = systemsForAuto[i];
          setStatus(`System ${i + 1}/${systemsForAuto.length}: cropping…`, true);
          setScanProgress(12 + (i / Math.max(1, systemsForAuto.length)) * 58, `System ${i + 1}/${systemsForAuto.length}: cropping…`);
          const sysBlob = await cropRect(rect, primaryFactor, fastMode);
          if (!sysBlob) {
            writeLog(`System ${i + 1}/${systemsForAuto.length}: crop failed.`);
            continue;
          }
          setStatus(`System ${i + 1}/${systemsForAuto.length}: running OMR…`, true);
          setScanProgress(14 + (i / Math.max(1, systemsForAuto.length)) * 58, `System ${i + 1}/${systemsForAuto.length}: running OMR…`);
          const out = await runSingleOmrFlow(sysBlob, fastMode, fastMode ? false : force4Toggle.checked);
          if (out.attempt.ok && out.data) {
            successes.push({ index: i + 1, rect, data: out.data });
            writeLog(`System ${i + 1}/${systemsForAuto.length}: OMR ok.`);
          } else {
            writeLog(`System ${i + 1}/${systemsForAuto.length}: OMR failed.`);
          }
          setScanProgress(14 + ((i + 1) / Math.max(1, systemsForAuto.length)) * 58, `System ${i + 1}/${systemsForAuto.length} done.`);
        }

        if (successes.length > 0) {
          autoSplitSuccesses = successes;
          const first = successes[0];
          data = first.data;
          attempt = { ok: true };
          rectUsedForRun = first.rect;
          activeOmrRect = first.rect;
          // Align playback playhead with the system we actually loaded.
          playbackSystems = [{ ...first.rect }];
          playbackVisualCache = null;
          const firstXmlName = (first?.data?.midiName || 'omr') + '.musicxml';
          updateMusicXmlDownload(first?.data?.musicXmlUrl || '', firstXmlName);
          const firstReport = await validateMusicXmlFromUrl(first?.data?.musicXmlUrl || '');
          appendLog(formatMusicXmlValidationSummary(firstReport));
          appendLog(`Auto split complete: ${successes.length}/${systemsForAuto.length} systems succeeded.`);
        } else {
          attempt = { ok: false, message: `Auto split failed on all ${systemsForAuto.length} systems.` };
        }
      } else {
        activeOmrRect = runRect;
        setScanProgress(16, 'Cropping selection…');
        const blob = await cropRect(runRect, primaryFactor, fastMode);
        if (!blob) {
          writeLog(usingFullPage ? 'Failed to crop full page.' : 'Failed to crop selection.');
          setStatus('');
          extractBtn.disabled = false;
          return;
        }
        writeLog('Sending to OMR backend…');
        setScanProgress(28, 'Running OMR…');
        const out = await runSingleOmrFlow(blob, fastMode, fastMode ? false : force4Toggle.checked);
        attempt = out.attempt;
        data = out.data;
        setScanProgress(72, 'OMR complete.');
      }

      if (!attempt.ok) {
        writeLog(attempt.message || 'OMR failed.');
        setStatus('');
        try {
          localStorage.removeItem('omr4all-last-midi-url');
          localStorage.removeItem('omr4all-last-midi-b64');
        } catch {}
        return;
      }

      if (canAutoSplit && autoSplitSuccesses.length > 0) {
        const total = autoSplitSuccesses.length;
        let mergedValidationSummary = '';
        const mergedXml = await buildContinuousMusicXmlFromSystems(autoSplitSuccesses);
        if (mergedXml?.url) {
          updateMusicXmlDownload(mergedXml.url, mergedXml.name || 'omr-continuous.musicxml');
          writeLog(`Merged MusicXML ready from ${mergedXml.totalSystems}/${total} systems.`);
          const mergedReport = await validateMusicXmlFromUrl(mergedXml.url);
          mergedValidationSummary = formatMusicXmlValidationSummary(mergedReport);
        }
        setStatus(`Building continuous MIDI from ${total} systems…`, true);
        setScanProgress(82, `Building continuous MIDI (${total} systems)…`);
        const merged = await buildContinuousMidiFromSystems(autoSplitSuccesses);
        if (merged?.midiBase64) {
          activeOmrRect = runRect;
          playbackSystems = autoSplitSuccesses
            .map((s) => s?.rect)
            .filter((r) => r && Number.isFinite(r.y) && Number.isFinite(r.h))
            .sort((a, b) => Number(a.y || 0) - Number(b.y || 0))
            .map((r) => ({ ...r }));
          playbackVisualCache = null;
          scannedSystemEntries = [];
          activeScannedSystemIndex = -1;
          preparedMergedNoteMap = Array.isArray(merged.noteMap) ? merged.noteMap : [];
          preparedMergedName = merged.name || 'omr-continuous.mid';
          const published = await publishMergedMidiBase64(merged.midiBase64);
          if (published?.midiUrl) {
            setScanProgress(92, 'Loading MIDI player…');
            await playMidiUrl(published.midiUrl, merged.name || published.midiName || 'omr-continuous.mid', []);
          } else {
            setScanProgress(92, 'Loading MIDI player…');
            await playMidiFromBase64(merged.midiBase64, merged.name || 'omr-continuous.mid', []);
          }
          const p = window._activeMidiPlayer;
          if (p) {
            if (typeof p.pause === 'function') p.pause();
            else if (typeof p.stop === 'function') p.stop();
          }
          player.style.display = 'block';
          const secs = ((Date.now() - started) / 1000).toFixed(1);
          const mergedCount = Math.max(1, Number(merged.totalSystems || total));
          writeLog(`Continuous MIDI ready from ${mergedCount}/${total} systems. Click a location, then press Play.`);
          if (mergedValidationSummary) appendLog(mergedValidationSummary);
          setStatus(`Scanned ${total} systems in ${secs}s. Merged ${mergedCount} systems.`);
          finishScanProgress('Scan complete');
          return;
        }
        writeLog('Continuous merge unavailable; falling back to first successful system.');
      }

      let musicXmlNodes = [];
      let xmlValidationSummary = '';
      if (data.musicXmlUrl) {
        setStatus('Building MusicXML node map…', true);
        setScanProgress(86, 'Building MusicXML map…');
        musicXmlNodes = await buildMusicXmlNodeMap(data.musicXmlUrl, rectUsedForRun || getActiveRect());
        const xmlName = (data.midiName || 'omr') + '.musicxml';
        updateMusicXmlDownload(data.musicXmlUrl || '', xmlName);
        const singleReport = await validateMusicXmlFromUrl(data.musicXmlUrl || '');
        xmlValidationSummary = formatMusicXmlValidationSummary(singleReport);
        appendLog(xmlValidationSummary);
      }

      if (data.midiUrl) {
        setScanProgress(92, 'Loading MIDI player…');
        await playMidiUrl(data.midiUrl, data.midiName || 'omr.mid', musicXmlNodes);
        const p = window._activeMidiPlayer;
        if (p) {
          if (typeof p.pause === 'function') p.pause();
          else if (typeof p.stop === 'function') p.stop();
        }
        player.style.display = 'block';
        const secs = ((Date.now() - started) / 1000).toFixed(1);
        writeLog(`OMR complete. MIDI ready.${musicXmlNodes.length ? ` Node map:${musicXmlNodes.length}` : ''}`);
        if (xmlValidationSummary) appendLog(xmlValidationSummary);
        setStatus(`Scanned in ${secs}s. Press Play when ready.`);
        finishScanProgress('Scan complete');
      } else if (data.midiBase64) {
        setScanProgress(92, 'Loading MIDI player…');
        await playMidiFromBase64(data.midiBase64, data.midiName || 'omr.mid', musicXmlNodes);
        const p = window._activeMidiPlayer;
        if (p) {
          if (typeof p.pause === 'function') p.pause();
          else if (typeof p.stop === 'function') p.stop();
        }
        player.style.display = 'block';
        const secs = ((Date.now() - started) / 1000).toFixed(1);
        writeLog(`OMR complete. MIDI ready.${musicXmlNodes.length ? ` Node map:${musicXmlNodes.length}` : ''}`);
        if (xmlValidationSummary) appendLog(xmlValidationSummary);
        setStatus(`Scanned in ${secs}s. Press Play when ready.`);
        finishScanProgress('Scan complete');
      } else {
        writeLog('OMR complete, but no MIDI output.');
        setStatus('No MIDI output produced.');
        finishScanProgress('Scan complete');
      }
      if (data.log) {
        const hasMidi = !!(data?.midiUrl || data?.midiBase64);
        writeLog((hasMidi ? 'OMR complete. MIDI ready.\n\n' : 'OMR log:\n\n') + data.log);
      }
    } catch (err) {
      console.error(err);
      writeLog('Request failed: ' + err.message);
      setStatus('');
    } finally {
      stopScanAnimation();
      setTimeout(stopScanProgress, 600);
      extractBtn.disabled = false;
    }
  });

  // If the MIDI player failed to register, keep a hint visible
  window.setTimeout(() => {
    if (typeof window.renderCompactMidiPlayer !== 'function') {
      writeLog('Multichannel MIDI player not available.');
    }
  }, 500);

  // Show last MIDI player on refresh (or demo fallback)
  window.addEventListener('DOMContentLoaded', () => {
    try {
      const saved = JSON.parse(localStorage.getItem('omr4all-note-map') || 'null');
      if (saved && Array.isArray(saved.notes)) {
        playbackNoteMap = saved.notes;
        playbackVisualCache = null;
        playbackMapMeta = saved.meta || null;
        updateNodeInfo();
        updateNoteLocationInfo();
      }
    } catch {}

    // Enforce player placement above Output even if stale cached HTML has old order.
    try {
      const outputBlock = document.getElementById('log')?.closest('div[style]');
      if (outputBlock && player && player.parentNode === outputBlock.parentNode) {
        outputBlock.parentNode.insertBefore(player, outputBlock);
      }
    } catch {}

    let lastUrl = null;
    let lastName = null;
    let lastB64 = null;
    try {
      lastUrl = localStorage.getItem('omr4all-last-midi-url');
      lastName = localStorage.getItem('omr4all-last-midi-name');
      lastB64 = localStorage.getItem('omr4all-last-midi-b64');
    } catch {}
    const demoUrl = '/assets/MidiPlayerJS-master/demo/midi/chopin.mid';
    let url = lastUrl || demoUrl;
    let name = lastUrl ? (lastName || 'last-omr.mid') : 'demo.mid';
    // Compact player appends cache-busting query params; avoid restoring blob URLs here.
    if (lastB64 && !lastUrl) {
      writeLog('Stored base64 MIDI found; compact player needs URL-backed MIDI, run "Scan" again.');
      try { localStorage.removeItem('omr4all-last-midi-b64'); } catch {}
    }
    // Delay a bit to ensure Tone + MIDI libs are ready
    setTimeout(() => {
      updateDebug();
      renderMidiPlayerInTest(url, name, false);
    }, 600);
  });

  // Initial debug snapshot
  setTimeout(updateDebug, 800);
  window.addEventListener('beforeunload', releaseLocalMidiObjectUrl);
</script>
