      let voice = (m && typeof m.voice === 'string') ? m.voice.trim() : '';

      if (!partId && vis.length) {
        let best = null;
        let bestScore = Number.POSITIVE_INFINITY;
        const lookFrom = Math.max(0, i - 8);
        const lookTo = Math.min(vis.length - 1, i + 8);
        for (let j = lookFrom; j <= lookTo; j++) {
          const v = vis[j];
          if (!v || !v.partId) continue;
          const dt = Math.abs(Number(v.startTick || 0) - Number(n.startTick || 0));
          const dp = Math.abs(Number(v.noteNumber || 0) - Number(n.noteNumber || 0));
          const score = dt * 1.2 + dp * 6 + Math.abs(j - i) * 2;
          if (score < bestScore) {
            bestScore = score;
            best = v;
          }
        }
        partId = best?.partId ? String(best.partId).trim() : '';
        voice = best?.voice ? String(best.voice).trim() : voice;
      }

      let channel = Math.max(1, Math.min(16, Number(n.channel || 1)));
      if (partId) {
        const channelKey = voice ? `${partId}::${voice}` : partId;
        if (!partChannelMap.has(channelKey)) {
          partChannelMap.set(channelKey, Math.max(1, Math.min(16, partChannelMap.size + 1)));
        }
        channel = partChannelMap.get(channelKey);
      }

      out.push({ ...n, channel, partId: partId || null, voice: voice || null });
    }
    return out;
  }

  async function buildContinuousMidiFromSystems(systemItems) {
    if (!Array.isArray(systemItems) || !systemItems.length) return null;
    const accepted = [];
    const partChannelMap = new Map();
    for (let i = 0; i < systemItems.length; i++) {
      const item = systemItems[i];
      if (!item?.data) continue;
      const midiInfo = await loadMidiInfoFromOmrData(item.data);
      if (!midiInfo || !Array.isArray(midiInfo.notes) || !midiInfo.notes.length) continue;
      const rect = item.rect || null;
      const nodeMap = (rect && item.data.musicXmlUrl)
        ? await buildMusicXmlNodeMap(item.data.musicXmlUrl, rect)
        : [];
      const restIntervals = item.data.musicXmlUrl
        ? await buildMusicXmlRestIntervalsFromUrl(item.data.musicXmlUrl, Number(midiInfo.division || 480))
        : new Map();
      const filteredNotes = filterSystemNotesForMerge(midiInfo.notes);
      if (!filteredNotes.length) continue;
      const visualMap = (rect && nodeMap.length)
        ? mergeMidiTimingWithNodeMap(filteredNotes, nodeMap, rect)
        : buildScannedNoteMapFromEvents(filteredNotes, rect || getActiveRect());
      const channelizedNotes = buildPartAwareChannelNotes(filteredNotes, visualMap, partChannelMap);
      accepted.push({
        midiInfo,
        filteredNotes,
        channelizedNotes,
        restIntervals,
        rect,
        visualMap
      });
    }
    if (!accepted.length) return null;

    const targetDivision = Math.max(1, Number(accepted[0].midiInfo.division || 480));
    const tempoBpm = Math.max(20, Number(accepted[0].midiInfo.tempoBpm || 120));
    const mergedMsgs = [];
    const mergedVisualMap = [];
    let notesClampedByRest = 0;
    let notesDroppedByRest = 0;
    let cursorTick = 0;
    const interSystemGap = Math.max(2, Math.round(targetDivision * 0.01));

    for (let i = 0; i < accepted.length; i++) {
      const seg = accepted[i];
      const info = seg.midiInfo;
      const scale = targetDivision / Math.max(1, Number(info.division || targetDivision));
      const starts = seg.filteredNotes.map((n) => Number(n.startTick || 0));
      const ends = seg.filteredNotes.map((n) => Number(n.endTick || 0));
      const segStart = starts.length ? Math.min(...starts) : 0;
      const segEnd = ends.length ? Math.max(...ends) : Math.max(segStart + 1, Number(info.totalTicks || segStart + 1));

      const playableNotes = Array.isArray(seg.channelizedNotes) && seg.channelizedNotes.length
        ? seg.channelizedNotes
        : seg.filteredNotes;

      for (let j = 0; j < playableNotes.length; j++) {
        const n = playableNotes[j];
        let srcStart = Number(n.startTick || 0);
        let srcEnd = Math.max(srcStart + 1, Number(n.endTick || 0));
        const partId = String(n.partId || '').trim();
        const voice = String(n.voice || '').trim() || '1';
        if (partId && seg.restIntervals instanceof Map && seg.restIntervals.size) {
          const rests = seg.restIntervals.get(`${partId}::${voice}`) || [];
          for (let r = 0; r < rests.length; r++) {
            const rr = rests[r];
            const rs = Number(rr?.startTick || 0);
            const re = Number(rr?.endTick || 0);
            if (!(re > rs)) continue;
            if (srcStart >= rs && srcStart < re) {
              srcStart = re;
            }
            if (srcEnd > rs && srcStart < rs) {
              srcEnd = Math.min(srcEnd, rs);
            }
            if (srcEnd <= srcStart) break;
          }
        }
        if (srcEnd <= srcStart) {
          notesDroppedByRest += 1;
          continue;
        }
        if (srcStart !== Number(n.startTick || 0) || srcEnd !== Number(n.endTick || 0)) {
          notesClampedByRest += 1;
        }
        const onTick = Math.max(0, Math.round(cursorTick + (srcStart - segStart) * scale));
        const offTick = Math.max(onTick + 1, Math.round(cursorTick + (srcEnd - segStart) * scale));
        const ch = Math.max(1, Math.min(16, Number(n.channel || 1)));
        const nn = Math.max(0, Math.min(127, Number(n.noteNumber || 0)));
        mergedMsgs.push({ tick: onTick, type: 'on', noteNumber: nn, channel: ch, velocity: 90 });
        mergedMsgs.push({ tick: offTick, type: 'off', noteNumber: nn, channel: ch, velocity: 0 });
      }

      if (Array.isArray(seg.visualMap) && seg.visualMap.length) {
        for (let k = 0; k < seg.visualMap.length; k++) {
          const n = seg.visualMap[k];
          const s = Math.round(cursorTick + (Number(n.startTick || 0) - segStart) * scale);
          const e = Math.max(s + 1, Math.round(cursorTick + (Number(n.endTick || 0) - segStart) * scale));
          mergedVisualMap.push({
            ...n,
            startTick: s,
            endTick: e,
            channel: 1,
            mapSource: 'merged-xml'
          });
        }
      }

      const segDur = Math.max(1, Math.round((segEnd - segStart) * scale));
      cursorTick += segDur + interSystemGap;
    }

    const outBytes = buildMidiFromNoteMessages(mergedMsgs, targetDivision, tempoBpm);
    if (!outBytes) return null;
    const midiBase64 = bytesToBase64(outBytes);
    writeLog(`Rest clamp: ${notesClampedByRest} shortened, ${notesDroppedByRest} dropped.`);
    return {
      midiBase64,
      name: 'omr-continuous.mid',
      totalSystems: accepted.length,
      noteMap: mergedVisualMap.sort((a, b) => Number(a.startTick || 0) - Number(b.startTick || 0) || Number(a.x || 0) - Number(b.x || 0))
    };
  }

  async function publishMergedMidiBase64(midiBase64) {
    if (!midiBase64) return null;
    try {
      const res = await fetch('/api/omr_publish.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ midiBase64 })
      });
      if (!res.ok) return null;
      const data = await res.json();
      if (!data || data.status !== 'ok' || !data.midiUrl) return null;
      return data;
    } catch {
      return null;
    }
  }

  async function publishMergedMusicXmlText(xmlText) {
    const text = String(xmlText || '');
    if (!text.trim()) return null;
    try {
      const xmlBase64 = bytesToBase64(new TextEncoder().encode(text));
      const res = await fetch('/api/omr_publish.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ xmlBase64 })
      });
      if (!res.ok) return null;
      const data = await res.json();
      if (!data || data.status !== 'ok' || !data.xmlUrl) return null;
      return data;
    } catch {
      return null;
    }
  }

  async function publishCleanMusicXmlFromUrl(xmlUrl, fallbackName = 'omr.musicxml') {
    const src = String(xmlUrl || '').trim();
    if (!src) return { url: '', name: String(fallbackName || 'omr.musicxml') };
    try {
      const cleaned = await fetchMusicXmlTextFromUrl(src);
      if (!cleaned || !String(cleaned).trim()) {
        return { url: src, name: String(fallbackName || 'omr.musicxml') };
      }
      const published = await publishMergedMusicXmlText(cleaned);
      if (published?.xmlUrl) {
        return {
          url: String(published.xmlUrl || ''),
          name: String(published.xmlName || fallbackName || 'omr.musicxml')
        };
      }
      const blob = new Blob([cleaned], { type: 'application/vnd.recordare.musicxml+xml;charset=utf-8' });
      const objUrl = URL.createObjectURL(blob);
      return { url: objUrl, name: String(fallbackName || 'omr.musicxml') };
    } catch {
      return { url: src, name: String(fallbackName || 'omr.musicxml') };
    }
  }

  function musicXmlPitchToMidi(noteEl) {
    const pitchEl = noteEl.getElementsByTagNameNS('*', 'pitch')[0];
    if (!pitchEl) return null;
    const step = (pitchEl.getElementsByTagNameNS('*', 'step')[0]?.textContent || '').trim().toUpperCase();
    const octave = Number((pitchEl.getElementsByTagNameNS('*', 'octave')[0]?.textContent || '').trim());
    const alter = Number((pitchEl.getElementsByTagNameNS('*', 'alter')[0]?.textContent || '0').trim() || 0);
    if (!Number.isFinite(octave)) return null;
    const semis = { C: 0, D: 2, E: 4, F: 5, G: 7, A: 9, B: 11 };
    if (!(step in semis)) return null;
    return (octave + 1) * 12 + semis[step] + alter;
  }

  function localNameOf(node) {
    return (node?.localName || node?.nodeName || '').toLowerCase();
  }

  function findAncestorLocalName(node, name) {
    let cur = node?.parentNode || null;
    const want = String(name || '').toLowerCase();
    while (cur) {
      if (localNameOf(cur) === want) return cur;
      cur = cur.parentNode;
    }
    return null;
  }

  function parseMusicXmlNodes(xmlText, rect) {
    if (!xmlText || !rect) return [];
    const doc = new DOMParser().parseFromString(xmlText, 'application/xml');
    const parseErr = doc.getElementsByTagName('parsererror');
    if (parseErr && parseErr.length) return [];

    const measureTimeMap = new Map();
    const partEls = Array.from(doc.getElementsByTagNameNS('*', 'part'));
    for (let pi = 0; pi < partEls.length; pi++) {
      const partEl = partEls[pi];
      const partId = String(partEl.getAttribute('id') || '');
      let curBeats = 4;
      let curBeatType = 4;
      const measureEls = Array.from(partEl.getElementsByTagNameNS('*', 'measure'));
      for (let mi = 0; mi < measureEls.length; mi++) {
        const measureEl = measureEls[mi];
        const mNo = String(measureEl.getAttribute('number') || String(mi + 1));
        const attrEls = Array.from(measureEl.getElementsByTagNameNS('*', 'attributes'));
        for (let ai = 0; ai < attrEls.length; ai++) {
          const timeEl = attrEls[ai].getElementsByTagNameNS('*', 'time')[0];
          if (!timeEl) continue;
          const beats = Number((timeEl.getElementsByTagNameNS('*', 'beats')[0]?.textContent || '').trim());
          const beatType = Number((timeEl.getElementsByTagNameNS('*', 'beat-type')[0]?.textContent || '').trim());
          if (Number.isFinite(beats) && beats > 0) curBeats = beats;
          if (Number.isFinite(beatType) && beatType > 0) curBeatType = beatType;
        }
        measureTimeMap.set(`${partId}:${mNo}`, { beats: curBeats, beatType: curBeatType });
      }
    }

    const noteEls = Array.from(doc.getElementsByTagNameNS('*', 'note'));
    const raw = [];
    for (let i = 0; i < noteEls.length; i++) {
      const noteEl = noteEls[i];
      if (noteEl.getElementsByTagNameNS('*', 'rest').length) continue;
      const x = Number(noteEl.getAttribute('default-x'));
      const y = Number(noteEl.getAttribute('default-y'));
      const measureEl = findAncestorLocalName(noteEl, 'measure');
      const partEl = findAncestorLocalName(noteEl, 'part');
      const partId = partEl?.getAttribute('id') || '';
      const measure = measureEl?.getAttribute('number') || '';
      const voice = (noteEl.getElementsByTagNameNS('*', 'voice')[0]?.textContent || '').trim() || '1';
      const tSig = measureTimeMap.get(`${partId}:${measure}`) || null;
      raw.push({
        order: raw.length,
        partId,
        voice,
        measure,
        timeBeats: Number.isFinite(Number(tSig?.beats)) ? Number(tSig.beats) : null,
        timeBeatType: Number.isFinite(Number(tSig?.beatType)) ? Number(tSig.beatType) : null,
        defaultX: Number.isFinite(x) ? x : null,
        defaultY: Number.isFinite(y) ? y : null,
        noteNumber: musicXmlPitchToMidi(noteEl)
      });
    }
    if (!raw.length) return [];

    const xVals = raw.map((n) => n.defaultX).filter((n) => Number.isFinite(n));
    const minX = xVals.length ? Math.min(...xVals) : 0;
    const maxX = xVals.length ? Math.max(...xVals) : 1;
    const spanX = Math.max(1, maxX - minX);
    const boxW = Math.max(10, Math.min(26, rect.w / 20));
    const boxH = Math.max(8, Math.min(22, rect.h / 10));

    return raw.map((n, i) => {
      const xNorm = Number.isFinite(n.defaultX) ? (n.defaultX - minX) / spanX : (raw.length <= 1 ? 0.5 : i / (raw.length - 1));
      const cx = rect.x + Math.max(0, Math.min(1, xNorm)) * rect.w;
      const cy = rect.y + rect.h * 0.35;
      return {
        ...n,
        x: Math.round(cx - boxW / 2),
        y: Math.round(cy - boxH / 2),
        w: boxW,
        h: boxH
      };
    });
  }

  async function buildMusicXmlNodeMap(xmlUrl, rect) {
    if (!xmlUrl || !rect) return [];
    try {
      const res = await fetch(xmlUrl, { cache: 'no-store' });
      if (!res.ok) return [];
      const xmlText = await res.text();
      return parseMusicXmlNodes(xmlText, rect);
    } catch (e) {
      console.warn('MusicXML parse failed:', e);
      return [];
    }
  }

  function parseMusicXmlToNoteEvents(xmlText, targetDivision = 480) {
    const text = String(xmlText || '');
    if (!text.trim()) return [];
    const doc = new DOMParser().parseFromString(text, 'application/xml');
    if (doc.getElementsByTagName('parsererror').length) return [];

    const out = [];
    const partVoiceToChannel = new Map();
    const getChannel = (partId, voice) => {
      const key = `${partId}::${voice}`;
      if (!partVoiceToChannel.has(key)) {
        partVoiceToChannel.set(key, Math.max(1, Math.min(16, partVoiceToChannel.size + 1)));
      }
      return partVoiceToChannel.get(key);
    };
    const activeTies = new Map();

    const partEls = Array.from(doc.getElementsByTagNameNS('*', 'part'));
    for (let pi = 0; pi < partEls.length; pi++) {
      const partEl = partEls[pi];
      const partId = String(partEl.getAttribute('id') || '').trim() || `P${pi + 1}`;
      let partCursor = 0;
      let divisions = Math.max(1, Number(targetDivision || 480));
      const voiceStarts = new Map();
      const voiceLastDur = new Map();
      const measureEls = Array.from(partEl.getElementsByTagNameNS('*', 'measure'));

      for (let mi = 0; mi < measureEls.length; mi++) {
        const measureEl = measureEls[mi];
        const children = Array.from(measureEl.childNodes || []).filter((n) => n && n.nodeType === 1);
        for (let ci = 0; ci < children.length; ci++) {
          const el = children[ci];
          const name = localNameOf(el);
          if (name === 'attributes') {
            const divText = (el.getElementsByTagNameNS('*', 'divisions')[0]?.textContent || '').trim();
            const d = Number(divText);
            if (Number.isFinite(d) && d > 0) divisions = d;
            continue;
          }
          if (name === 'backup' || name === 'forward') {
            const dur = Number((el.getElementsByTagNameNS('*', 'duration')[0]?.textContent || '').trim());
            if (Number.isFinite(dur) && dur > 0) {
              const delta = Math.round((dur * Number(targetDivision || 480)) / Math.max(1, divisions));
              partCursor += (name === 'backup' ? -delta : delta);
              if (!Number.isFinite(partCursor) || partCursor < 0) partCursor = 0;
              if (name === 'forward' && delta > 0) {
                // Time jump is a hard barrier for active ties in this part.
                const prefix = `${partId}::`;
                for (const k of Array.from(activeTies.keys())) {
                  if (String(k).startsWith(prefix)) activeTies.delete(k);
                }
              }
            }
            continue;
          }
          if (name !== 'note') continue;

          const hasGrace = el.getElementsByTagNameNS('*', 'grace').length > 0;
          const hasRest = el.getElementsByTagNameNS('*', 'rest').length > 0;
          const hasChord = el.getElementsByTagNameNS('*', 'chord').length > 0;
          const voice = (el.getElementsByTagNameNS('*', 'voice')[0]?.textContent || '').trim() || '1';
          let durRaw = xmlDurationRawFromNote(el, divisions);
          if (!(Number.isFinite(durRaw) && durRaw > 0) && hasChord) {
            const prevDur = Number(voiceLastDur.get(voice) || 0);
            if (Number.isFinite(prevDur) && prevDur > 0) durRaw = prevDur;
          }
          if (!(Number.isFinite(durRaw) && durRaw > 0) && hasRest && !hasGrace) {
            const prevDur = Number(voiceLastDur.get(voice) || 0);
            durRaw = (Number.isFinite(prevDur) && prevDur > 0)
              ? prevDur
              : Math.max(1, Math.round(divisions * 0.5));
          }
          const dur = Number.isFinite(durRaw) && durRaw > 0
            ? Math.max(1, Math.round((durRaw * Number(targetDivision || 480)) / Math.max(1, divisions)))
            : 0;
          if (!hasChord && durRaw > 0) voiceLastDur.set(voice, Number(durRaw));
          const startTick = hasChord ? Number(voiceStarts.get(voice) ?? partCursor) : partCursor;
          if (!hasChord) voiceStarts.set(voice, startTick);

          // A rest is a hard barrier: ties must not bridge across it.
          if (!hasGrace && hasRest) {
            const prefix = `${partId}::${voice}::`;
            for (const k of Array.from(activeTies.keys())) {
              if (String(k).startsWith(prefix)) activeTies.delete(k);
            }
          }

          if (!hasGrace && !hasRest && dur > 0) {
            const nn = musicXmlPitchToMidi(el);
            if (Number.isFinite(nn)) {
              const noteNumber = Math.max(0, Math.min(127, Math.round(nn)));
              const tieEls = Array.from(el.getElementsByTagNameNS('*', 'tie'));
              const tiedEls = Array.from(el.getElementsByTagNameNS('*', 'tied'));
              const tieTypes = new Set(
                tieEls.map((t) => String(t.getAttribute('type') || '').toLowerCase())
              );
              const tiedTypes = new Set(
                tiedEls.map((t) => String(t.getAttribute('type') || '').toLowerCase())
              );
              const hasTieStart = tieTypes.has('start') || tiedTypes.has('start');
              const hasTieStop = tieTypes.has('stop') || tiedTypes.has('stop');
              const tieKey = `${partId}::${voice}::${noteNumber}`;
              const active = activeTies.get(tieKey) || null;

              if (hasTieStop && active) {
                active.endTick = Math.max(Number(active.endTick || 0), startTick + dur);
                if (!hasTieStart) activeTies.delete(tieKey);
              } else if (hasTieStart) {
                const ev = {
                  startTick,
                  endTick: startTick + dur,
                  noteNumber,
                  channel: getChannel(partId, voice),
                  partId,
                  voice
                };
                out.push(ev);
                activeTies.set(tieKey, ev);
              } else {
                out.push({
                  startTick,
                  endTick: startTick + dur,
                  noteNumber,
                  channel: getChannel(partId, voice),
                  partId,
                  voice
                });
              }
            }
          }

          if (!hasChord && dur > 0) {
            partCursor += dur;
          }
        }
      }
    }
    return out;
  }

  function xmlDurationRawFromNote(noteEl, divisions = 1) {
    const raw = Number((noteEl?.getElementsByTagNameNS('*', 'duration')[0]?.textContent || '').trim());
    if (Number.isFinite(raw) && raw > 0) return Math.max(1, Math.round(raw));
    const typeText = String(noteEl?.getElementsByTagNameNS('*', 'type')[0]?.textContent || '').trim().toLowerCase();
    const quarterMultByType = {
      longa: 16,
      breve: 8,
      whole: 4,
      half: 2,
      quarter: 1,
      eighth: 0.5,
      '16th': 0.25,
      '32nd': 0.125,
      '64th': 0.0625,
      '128th': 0.03125
    };
    const mult = Number(quarterMultByType[typeText] || 0);
    if (!(mult > 0)) return 0;
    const dots = noteEl.getElementsByTagNameNS('*', 'dot').length;
    let dotFactor = 1;
    let add = 0.5;
    for (let i = 0; i < dots; i++) {
      dotFactor += add;
      add *= 0.5;
    }
    let tupletFactor = 1;
    const tm = noteEl.getElementsByTagNameNS('*', 'time-modification')[0];
    if (tm) {
      const actual = Number((tm.getElementsByTagNameNS('*', 'actual-notes')[0]?.textContent || '').trim());
      const normal = Number((tm.getElementsByTagNameNS('*', 'normal-notes')[0]?.textContent || '').trim());
      if (Number.isFinite(actual) && actual > 0 && Number.isFinite(normal) && normal > 0) {
        tupletFactor = normal / actual;
      }
    }
    return Math.max(1, Math.round(Number(divisions || 1) * mult * dotFactor * tupletFactor));
  }

  function validateMusicXmlMeasures(xmlText) {
    const text = String(xmlText || '');
    const out = { ok: true, totalMeasures: 0, issueCount: 0, issues: [] };
    if (!text.trim()) return out;
    const doc = new DOMParser().parseFromString(text, 'application/xml');
    if (doc.getElementsByTagName('parsererror').length) {
      return {
        ok: false,
        totalMeasures: 0,
        issueCount: 1,
        issues: [{ code: 'XML_PARSE_ERROR', partId: '', measure: '', detail: 'parsererror' }]
      };
    }

    const overlaps = (a0, a1, b0, b1) => Math.min(a1, b1) > Math.max(a0, b0);
    const partEls = Array.from(doc.getElementsByTagNameNS('*', 'part'));
    for (let pi = 0; pi < partEls.length; pi++) {
      const partEl = partEls[pi];
      const partId = String(partEl.getAttribute('id') || '').trim() || `P${pi + 1}`;
      let divisions = 1;
      let beats = 4;
      let beatType = 4;
      const measureEls = Array.from(partEl.getElementsByTagNameNS('*', 'measure'));
      out.totalMeasures += measureEls.length;

      for (let mi = 0; mi < measureEls.length; mi++) {
        const measureEl = measureEls[mi];
        const measureNo = String(measureEl.getAttribute('number') || String(mi + 1));
        const children = Array.from(measureEl.childNodes || []).filter((n) => n && n.nodeType === 1);
        for (let ci = 0; ci < children.length; ci++) {
          if (localNameOf(children[ci]) !== 'attributes') continue;
          const d = Number((children[ci].getElementsByTagNameNS('*', 'divisions')[0]?.textContent || '').trim());
          if (Number.isFinite(d) && d > 0) divisions = d;
          const timeEl = children[ci].getElementsByTagNameNS('*', 'time')[0];
          if (timeEl) {
            const b = Number((timeEl.getElementsByTagNameNS('*', 'beats')[0]?.textContent || '').trim());
            const bt = Number((timeEl.getElementsByTagNameNS('*', 'beat-type')[0]?.textContent || '').trim());
            if (Number.isFinite(b) && b > 0) beats = b;
            if (Number.isFinite(bt) && bt > 0) beatType = bt;
          }
        }
        const expected = Math.max(1, Math.round(divisions * beats * (4 / beatType)));

        let streamPos = 0;
        const voiceStarts = new Map();
        const eventsByVoice = new Map();

        for (let ci = 0; ci < children.length; ci++) {
          const el = children[ci];
          const ln = localNameOf(el);
          if (ln === 'backup' || ln === 'forward') {
            const d = Number((el.getElementsByTagNameNS('*', 'duration')[0]?.textContent || '').trim());
            if (Number.isFinite(d) && d > 0) {
              streamPos += (ln === 'backup' ? -d : d);
              if (streamPos < 0) streamPos = 0;
            }
            continue;
          }
          if (ln !== 'note') continue;
          const voice = String(el.getElementsByTagNameNS('*', 'voice')[0]?.textContent || '1').trim() || '1';
          const hasChord = el.getElementsByTagNameNS('*', 'chord').length > 0;
          const isRest = el.getElementsByTagNameNS('*', 'rest').length > 0;
          const dur = xmlDurationRawFromNote(el, divisions);
          if (!(dur > 0)) continue;
          const start = hasChord ? Number(voiceStarts.get(voice) ?? streamPos) : streamPos;
          const end = start + dur;
          if (!hasChord) {
            voiceStarts.set(voice, start);
            streamPos = end;
          }
          const arr = eventsByVoice.get(voice) || [];
          arr.push({ start, end, isRest });
          eventsByVoice.set(voice, arr);
        }

        eventsByVoice.forEach((arr, voice) => {
          if (!arr.length) return;
          const filled = Math.max(...arr.map((e) => Number(e.end || 0)));
          if (filled < expected) {
            out.issues.push({ code: 'UNDERFILL', partId, measure: measureNo, voice, detail: `${filled}/${expected}` });
          } else if (filled > expected) {
            out.issues.push({ code: 'OVERFILL', partId, measure: measureNo, voice, detail: `${filled}/${expected}` });
          }

          const pitched = arr.filter((e) => !e.isRest).sort((a, b) => a.start - b.start || a.end - b.end);
          for (let i = 1; i < pitched.length; i++) {
            const p = pitched[i - 1];
            const c = pitched[i];
            if (overlaps(p.start, p.end, c.start, c.end) && !(p.start === c.start && p.end === c.end)) {
              out.issues.push({ code: 'VOICE_OVERLAP', partId, measure: measureNo, voice, detail: `${p.start}-${p.end} vs ${c.start}-${c.end}` });
              break;
            }
          }
        });

        const v1 = eventsByVoice.get('1') || [];
        const v2 = eventsByVoice.get('2') || [];
        if (v1.length && v2.length) {
          const v1Rests = v1.filter((e) => e.isRest);
          const v2Rests = v2.filter((e) => e.isRest);
          for (let i = 0; i < v1Rests.length; i++) {
            const r = v1Rests[i];
            const hasOther = v2.some((e) => overlaps(r.start, r.end, e.start, e.end));
            if (!hasOther) {
              out.issues.push({ code: 'SHARED_REST_CANDIDATE', partId, measure: measureNo, voice: '2', detail: `${r.start}-${r.end}` });
              break;
            }
          }
          for (let i = 0; i < v2Rests.length; i++) {
            const r = v2Rests[i];
            const hasOther = v1.some((e) => overlaps(r.start, r.end, e.start, e.end));
            if (!hasOther) {
              out.issues.push({ code: 'SHARED_REST_CANDIDATE', partId, measure: measureNo, voice: '1', detail: `${r.start}-${r.end}` });
              break;
            }
          }
        }
      }
    }

    out.issueCount = out.issues.length;
    out.ok = out.issueCount === 0;
    return out;
  }

  async function validateMusicXmlFromUrl(xmlUrl) {
    const url = String(xmlUrl || '').trim();
    if (!url) return { ok: true, totalMeasures: 0, issueCount: 0, issues: [] };
    try {
      const xmlText = await fetchMusicXmlTextFromUrl(url);
      return validateMusicXmlMeasures(xmlText);
    } catch (e) {
      return {
        ok: false,
        totalMeasures: 0,
        issueCount: 1,
        issues: [{ code: 'XML_FETCH_ERROR', partId: '', measure: '', detail: String(e?.message || e) }]
      };
    }
  }

  function formatMusicXmlValidationSummary(report, maxIssues = 8) {
    const rep = report || { ok: true, totalMeasures: 0, issueCount: 0, issues: [] };
    const issues = Array.isArray(rep.issues) ? rep.issues : [];
    if (!issues.length) return `MusicXML validation: ok (${Number(rep.totalMeasures || 0)} measures).`;
    const counts = new Map();
    for (let i = 0; i < issues.length; i++) {
      const code = String(issues[i]?.code || 'UNKNOWN');
      counts.set(code, Number(counts.get(code) || 0) + 1);
    }
    const head = Array.from(counts.entries())
      .sort((a, b) => b[1] - a[1])
      .map(([k, v]) => `${k}:${v}`)
      .join(', ');
    const lines = [`MusicXML validation: ${issues.length} issue(s) in ${Number(rep.totalMeasures || 0)} measures (${head}).`];
    const lim = Math.max(1, Number(maxIssues || 8));
    for (let i = 0; i < Math.min(lim, issues.length); i++) {
      const it = issues[i];
      lines.push(`- ${it.code} part:${it.partId || '-'} measure:${it.measure || '-'} voice:${it.voice || '-'} ${it.detail || ''}`.trim());
    }
    return lines.join('\n');
  }

  function parseMusicXmlRestIntervals(xmlText, targetDivision = 480) {
    const out = new Map();
    const text = String(xmlText || '');
    if (!text.trim()) return out;
    const doc = new DOMParser().parseFromString(text, 'application/xml');
    if (doc.getElementsByTagName('parsererror').length) return out;

    const partEls = Array.from(doc.getElementsByTagNameNS('*', 'part'));
    for (let pi = 0; pi < partEls.length; pi++) {
      const partEl = partEls[pi];
      const partId = String(partEl.getAttribute('id') || '').trim() || `P${pi + 1}`;
      let partCursor = 0;
      let divisions = Math.max(1, Number(targetDivision || 480));
      const voiceStarts = new Map();
      const measureEls = Array.from(partEl.getElementsByTagNameNS('*', 'measure'));

      for (let mi = 0; mi < measureEls.length; mi++) {
        const measureEl = measureEls[mi];
        const children = Array.from(measureEl.childNodes || []).filter((n) => n && n.nodeType === 1);
        for (let ci = 0; ci < children.length; ci++) {
          const el = children[ci];
          const name = localNameOf(el);
          if (name === 'attributes') {
            const divText = (el.getElementsByTagNameNS('*', 'divisions')[0]?.textContent || '').trim();
            const d = Number(divText);
            if (Number.isFinite(d) && d > 0) divisions = d;
            continue;
          }
          if (name === 'backup' || name === 'forward') {
            const dur = Number((el.getElementsByTagNameNS('*', 'duration')[0]?.textContent || '').trim());
            if (Number.isFinite(dur) && dur > 0) {
              const delta = Math.round((dur * Number(targetDivision || 480)) / Math.max(1, divisions));
              partCursor += (name === 'backup' ? -delta : delta);
              if (!Number.isFinite(partCursor)) partCursor = 0;
              if (partCursor < 0) partCursor = 0;
            }
            continue;
          }
          if (name !== 'note') continue;

          const hasChord = el.getElementsByTagNameNS('*', 'chord').length > 0;
          const hasRest = el.getElementsByTagNameNS('*', 'rest').length > 0;
          const voice = (el.getElementsByTagNameNS('*', 'voice')[0]?.textContent || '').trim() || '1';
          const durRaw = Number((el.getElementsByTagNameNS('*', 'duration')[0]?.textContent || '').trim());
          const dur = Number.isFinite(durRaw) && durRaw > 0
            ? Math.max(1, Math.round((durRaw * Number(targetDivision || 480)) / Math.max(1, divisions)))
            : 0;
          const noteStart = hasChord ? Number(voiceStarts.get(voice) ?? partCursor) : partCursor;
          if (!hasChord) voiceStarts.set(voice, noteStart);

          if (hasRest && dur > 0) {
            const key = `${partId}::${voice}`;
            const arr = out.get(key) || [];
            arr.push({ startTick: noteStart, endTick: noteStart + dur });
            out.set(key, arr);
          }

          if (!hasChord && dur > 0) {
            partCursor += dur;
          }
        }
      }
    }

    out.forEach((arr, key) => {
      const sorted = arr
        .filter((r) => Number.isFinite(r.startTick) && Number.isFinite(r.endTick) && r.endTick > r.startTick)
        .sort((a, b) => Number(a.startTick || 0) - Number(b.startTick || 0));
      const merged = [];
      for (let i = 0; i < sorted.length; i++) {
        const cur = { ...sorted[i] };
        const prev = merged[merged.length - 1];
        if (!prev || cur.startTick > prev.endTick) {
          merged.push(cur);
        } else {
          prev.endTick = Math.max(Number(prev.endTick || 0), Number(cur.endTick || 0));
        }
      }
      out.set(key, merged);
    });
    return out;
  }

  async function buildMusicXmlRestIntervalsFromUrl(xmlUrl, targetDivision = 480) {
    if (!xmlUrl) return new Map();
    try {
      const xmlText = await fetchMusicXmlTextFromUrl(xmlUrl);
      return parseMusicXmlRestIntervals(xmlText, targetDivision);
    } catch (e) {
      console.warn('MusicXML rest parse failed:', e);
      return new Map();
    }
  }

  async function fetchMusicXmlTextFromUrl(xmlUrl) {
    if (!xmlUrl) return '';
    const res = await fetch(xmlUrl, { cache: 'no-store' });
    if (!res.ok) throw new Error(`MusicXML fetch failed: HTTP ${res.status}`);
    const buf = await res.arrayBuffer();
    if (isZipBytes(buf)) {
      const xml = await extractXmlFromMxl(buf);
      if (!xml) throw new Error('Could not extract XML from MXL');
      return cleanupMusicXmlText(xml);
    }
    const xmlText = new TextDecoder('utf-8', { fatal: false }).decode(new Uint8Array(buf));
    return cleanupMusicXmlText(xmlText);
  }
  async function fetchMusicXmlRawTextFromUrl(xmlUrl) {
    if (!xmlUrl) return '';
    const res = await fetch(xmlUrl, { cache: 'no-store' });
    if (!res.ok) throw new Error(`MusicXML fetch failed: HTTP ${res.status}`);
    const buf = await res.arrayBuffer();
    if (isZipBytes(buf)) {
      const xml = await extractXmlFromMxl(buf);
      if (!xml) throw new Error('Could not extract XML from MXL');
      return String(xml || '');
    }
    return new TextDecoder('utf-8', { fatal: false }).decode(new Uint8Array(buf));
  }

  function cleanupMusicXmlText(xmlText) {
    const raw = String(xmlText || '');
    if (!raw.trim()) return raw;
    try {
      const doc = new DOMParser().parseFromString(raw, 'application/xml');
      if (doc.getElementsByTagName('parsererror').length) return raw;

      // Remove noisy OMR directions/dynamics that often create visual clutter (ppmf, etc).
      const directions = Array.from(doc.getElementsByTagNameNS('*', 'direction'));
      for (let i = 0; i < directions.length; i++) {
        directions[i].parentNode?.removeChild(directions[i]);
      }

      const sounds = Array.from(doc.getElementsByTagNameNS('*', 'sound'));
      for (let i = 0; i < sounds.length; i++) {
        sounds[i].parentNode?.removeChild(sounds[i]);
      }

      const getVoice = (noteEl) => {
        const v = String(noteEl?.getElementsByTagNameNS('*', 'voice')[0]?.textContent || '').trim();
        return v || '1';
      };
      const setVoice = (noteEl, voice) => {
        if (!noteEl) return;
        let vEl = noteEl.getElementsByTagNameNS('*', 'voice')[0] || null;
        if (!vEl) {
          vEl = doc.createElement('voice');
          noteEl.appendChild(vEl);
        }
        vEl.textContent = String(voice || '1');
      };
      // Two-voice barline rules:
      // 1) stem up -> upper voice (1)
      // 2) stem down -> lower voice (2)
      const measures = Array.from(doc.getElementsByTagNameNS('*', 'measure'));
      for (let mi = 0; mi < measures.length; mi++) {
        const measure = measures[mi];
        const notesInMeasure = Array.from(measure.children || []).filter((n) => localNameOf(n) === 'note');
        if (!notesInMeasure.length) continue;

        // Apply stem->voice mapping for pitched notes (always, per note).
        for (let i = 0; i < notesInMeasure.length; i++) {
          const n = notesInMeasure[i];
          if (n.getElementsByTagNameNS('*', 'rest').length) continue;
          const stem = String(n.getElementsByTagNameNS('*', 'stem')[0]?.textContent || '').trim().toLowerCase();
          if (stem === 'up') setVoice(n, '1');
          else if (stem === 'down') setVoice(n, '2');
        }
      }

      const notes = Array.from(doc.getElementsByTagNameNS('*', 'note'));
      for (let i = 0; i < notes.length; i++) {
        const note = notes[i];
        const hasGrace = note.getElementsByTagNameNS('*', 'grace').length > 0;
        const hasRest = note.getElementsByTagNameNS('*', 'rest').length > 0;
        const hasPitch = note.getElementsByTagNameNS('*', 'pitch').length > 0;
        const hasDuration = note.getElementsByTagNameNS('*', 'duration').length > 0;
        const hasChord = note.getElementsByTagNameNS('*', 'chord').length > 0;

        // Grace/cue-like artifacts are a frequent source of tiny unwanted dots/notes.
        if (hasGrace) {
          note.parentNode?.removeChild(note);
          continue;
        }
        // Invalid pitched note without duration (and not chord continuation) -> drop.
        if (hasPitch && !hasDuration && !hasChord && !hasRest) {
          note.parentNode?.removeChild(note);
          continue;
        }

        // Remove articulation/ornament clutter, keep core notation and lyric.
        const notations = Array.from(note.getElementsByTagNameNS('*', 'notations'));
        for (let j = 0; j < notations.length; j++) {
          const n = notations[j];
          const arts = Array.from(n.getElementsByTagNameNS('*', 'articulations'));
          const orns = Array.from(n.getElementsByTagNameNS('*', 'ornaments'));
          const tech = Array.from(n.getElementsByTagNameNS('*', 'technical'));
          for (let k = 0; k < arts.length; k++) arts[k].parentNode?.removeChild(arts[k]);
          for (let k = 0; k < orns.length; k++) orns[k].parentNode?.removeChild(orns[k]);
          for (let k = 0; k < tech.length; k++) tech[k].parentNode?.removeChild(tech[k]);
        }
        // Ignore lyrics completely for OMR->MIDI pipeline.
        const lyrics = Array.from(note.getElementsByTagNameNS('*', 'lyric'));
        for (let j = 0; j < lyrics.length; j++) {
          lyrics[j].parentNode?.removeChild(lyrics[j]);
        }
      }

      const overlaps = (a0, a1, b0, b1) => Math.min(a1, b1) > Math.max(a0, b0);
      const mergeIntervals = (arr) => {
        const src = (Array.isArray(arr) ? arr : [])
          .map((x) => ({ start: Number(x.start || 0), end: Number(x.end || 0) }))
          .filter((x) => x.end > x.start)
          .sort((a, b) => a.start - b.start || a.end - b.end);
        const out = [];
        for (let i = 0; i < src.length; i++) {
          const cur = src[i];
          const prev = out[out.length - 1];
          if (!prev || cur.start > prev.end) out.push(cur);
          else prev.end = Math.max(prev.end, cur.end);
        }
        return out;
      };
      const durationTypeFromDivisions = (dur, divisions) => {
        const d = Number(dur || 0);
        const div = Math.max(1, Number(divisions || 1));
        const q = d / div;
        if (Math.abs(q - 4) < 0.0001) return 'whole';
        if (Math.abs(q - 2) < 0.0001) return 'half';
        if (Math.abs(q - 1) < 0.0001) return 'quarter';
        if (Math.abs(q - 0.5) < 0.0001) return 'eighth';
        if (Math.abs(q - 0.25) < 0.0001) return '16th';
        if (Math.abs(q - 0.125) < 0.0001) return '32nd';
        return '';
      };
      const createBackupEl = (dur) => {
        const b = doc.createElement('backup');
        const d = doc.createElement('duration');
        d.textContent = String(Math.max(1, Math.round(Number(dur || 1))));
        b.appendChild(d);
        return b;
      };
      const createForwardEl = (dur) => {
        const f = doc.createElement('forward');
        const d = doc.createElement('duration');
        d.textContent = String(Math.max(1, Math.round(Number(dur || 1))));
        f.appendChild(d);
        return f;
      };
      const createRestNoteEl = (dur, voice, divisions) => {
        const note = doc.createElement('note');
        const rest = doc.createElement('rest');
        const duration = doc.createElement('duration');
        duration.textContent = String(Math.max(1, Math.round(Number(dur || 1))));
        const v = doc.createElement('voice');
        v.textContent = String(voice || '1');
        note.appendChild(rest);
        note.appendChild(duration);
        note.appendChild(v);
        const t = durationTypeFromDivisions(dur, divisions);
        if (t) {
          const type = doc.createElement('type');
          type.textContent = t;
          note.appendChild(type);
        }
        return note;
      };
      const parseMeasureVoiceEvents = (measureEl) => {
        const eventsByVoice = new Map();
        let streamPos = 0;
        const voiceStarts = new Map();
        let seq = 0;
        const kids = Array.from(measureEl.childNodes || []).filter((n) => n && n.nodeType === 1);
        for (let i = 0; i < kids.length; i++) {
          const el = kids[i];
          const ln = localNameOf(el);
          if (ln === 'backup' || ln === 'forward') {
            const d = Number((el.getElementsByTagNameNS('*', 'duration')[0]?.textContent || '').trim());
            if (Number.isFinite(d) && d > 0) {
              streamPos += (ln === 'backup' ? -d : d);
              if (streamPos < 0) streamPos = 0;
            }
            continue;
          }
          if (ln !== 'note') continue;
          const voice = getVoice(el);
          const hasChord = el.getElementsByTagNameNS('*', 'chord').length > 0;
          const hasRest = el.getElementsByTagNameNS('*', 'rest').length > 0;
          const dur = Number((el.getElementsByTagNameNS('*', 'duration')[0]?.textContent || '').trim());
          if (!(Number.isFinite(dur) && dur > 0)) continue;
          const start = hasChord ? Number(voiceStarts.get(voice) ?? streamPos) : streamPos;
          const end = start + dur;
          if (!hasChord) {
            voiceStarts.set(voice, start);
            streamPos = end;
          }
          const arr = eventsByVoice.get(voice) || [];
          arr.push({ start, end, isRest: hasRest, hasChord, node: el, seq: seq++ });
          eventsByVoice.set(voice, arr);
        }
        return eventsByVoice;
      };
      const addForwardBeforeNode = (measureEl, node, delta) => {
        const d = Math.max(0, Math.round(Number(delta || 0)));
        if (!(node && d > 0)) return;
        let prev = node.previousSibling;
        while (prev && prev.nodeType !== 1) prev = prev.previousSibling;
        if (prev && localNameOf(prev) === 'forward') {
          const dEl = prev.getElementsByTagNameNS('*', 'duration')[0] || null;
          const oldDur = Number((dEl?.textContent || '').trim());
          if (dEl && Number.isFinite(oldDur) && oldDur > 0) dEl.textContent = String(Math.round(oldDur + d));
          else {
            const nd = doc.createElement('duration');
            nd.textContent = String(d);
            if (dEl) dEl.parentNode?.replaceChild(nd, dEl);
            else prev.appendChild(nd);
          }
          return;
        }
        measureEl.insertBefore(createForwardEl(d), node);
      };
      const shiftVoiceNoteForRestAnchors = (measureEl, restAnchors, targetEvents, measureDur) => {
        const rests = Array.isArray(restAnchors) ? restAnchors : [];
        const events = Array.isArray(targetEvents) ? targetEvents : [];
        if (!rests.length || !events.length) return false;
        let changed = false;
        for (let i = 0; i < rests.length; i++) {
          const s = Number(rests[i].start || 0);
          const e = Number(rests[i].end || 0);
          const delta = e - s;
          if (!(delta > 0)) continue;
          const hit = events.find((ev) =>
            ev && !ev.isRest && !ev.hasChord &&
            Math.abs(Number(ev.start || 0) - s) < 0.0001 &&
            overlaps(s, e, Number(ev.start || 0), Number(ev.end || 0))
          );
          if (!hit || !hit.node) continue;
          const ns = Number(hit.start || 0) + delta;
          const ne = Number(hit.end || 0) + delta;
          if (ne > measureDur + 0.0001) continue;
          const blocked = events.some((ev) => {
            if (!ev || ev === hit) return false;
            return overlaps(ns, ne, Number(ev.start || 0), Number(ev.end || 0));
          });
          if (blocked) continue;
          addForwardBeforeNode(measureEl, hit.node, delta);
          changed = true;
        }
        return changed;
      };
      const normalizeMeasureTiming = (measureEl) => {
        let streamPos = 0;
        const voiceCursor = new Map();
        const kids = Array.from(measureEl.childNodes || []).filter((n) => n && n.nodeType === 1);
        for (let i = 0; i < kids.length; i++) {
          const el = kids[i];
          const ln = localNameOf(el);
          if (ln === 'backup' || ln === 'forward') {
            const timingVoices = Array.from(el.getElementsByTagNameNS('*', 'voice'));
            for (let j = 0; j < timingVoices.length; j++) timingVoices[j].parentNode?.removeChild(timingVoices[j]);
            const d = Number((el.getElementsByTagNameNS('*', 'duration')[0]?.textContent || '').trim());
            if (Number.isFinite(d) && d > 0) {
              streamPos += (ln === 'backup' ? -d : d);
              if (streamPos < 0) streamPos = 0;
            }
            continue;
          }
          if (ln !== 'note') continue;
          const hasChord = el.getElementsByTagNameNS('*', 'chord').length > 0;
          const dur = Number((el.getElementsByTagNameNS('*', 'duration')[0]?.textContent || '').trim());
          if (!(Number.isFinite(dur) && dur > 0)) continue;
          const voice = getVoice(el);
          const vCur = Number(voiceCursor.get(voice) ?? 0);
          if (!hasChord && streamPos < vCur) {
            const delta = Math.round(vCur - streamPos);
            if (delta > 0) {
              let prev = el.previousSibling;
              while (prev && prev.nodeType !== 1) prev = prev.previousSibling;
              if (prev && localNameOf(prev) === 'forward') {
                const dEl = prev.getElementsByTagNameNS('*', 'duration')[0] || null;
                const prevDur = Number((dEl?.textContent || '').trim());
                if (dEl && Number.isFinite(prevDur) && prevDur > 0) dEl.textContent = String(Math.round(prevDur + delta));
                else {
                  const nd = doc.createElement('duration');
                  nd.textContent = String(delta);
                  if (dEl) dEl.parentNode?.replaceChild(nd, dEl);
                  else prev.appendChild(nd);
                }
              } else {
                measureEl.insertBefore(createForwardEl(delta), el);
              }
              streamPos += delta;
            }
          }
          const start = streamPos;
          const end = start + dur;
          if (!hasChord) streamPos = end;
          voiceCursor.set(voice, Math.max(vCur, end));
        }
      };

      // Voice timeline normalization:
      // Keep original notation stream intact and only mirror shared rests between voice 1 and 2.
      const partEls = Array.from(doc.getElementsByTagNameNS('*', 'part'));
      for (let pi = 0; pi < partEls.length; pi++) {
        const partEl = partEls[pi];
        let divisions = 1;
        let beats = 4;
        let beatType = 4;
        const measures = Array.from(partEl.getElementsByTagNameNS('*', 'measure'));
        for (let mi = 0; mi < measures.length; mi++) {
          const measure = measures[mi];
          const children = Array.from(measure.childNodes || []).filter((n) => n && n.nodeType === 1);
          const attrs = children.filter((n) => localNameOf(n) === 'attributes');
          for (let ai = 0; ai < attrs.length; ai++) {
            const d = Number((attrs[ai].getElementsByTagNameNS('*', 'divisions')[0]?.textContent || '').trim());
            if (Number.isFinite(d) && d > 0) divisions = d;
            const timeEl = attrs[ai].getElementsByTagNameNS('*', 'time')[0];
            if (timeEl) {
              const b = Number((timeEl.getElementsByTagNameNS('*', 'beats')[0]?.textContent || '').trim());
              const bt = Number((timeEl.getElementsByTagNameNS('*', 'beat-type')[0]?.textContent || '').trim());
              if (Number.isFinite(b) && b > 0) beats = b;
              if (Number.isFinite(bt) && bt > 0) beatType = bt;
            }
          }
          normalizeMeasureTiming(measure);
          const measureDur = Math.max(1, Math.round(divisions * beats * (4 / beatType)));
          const eventsByVoice = parseMeasureVoiceEvents(measure);
          let v1 = eventsByVoice.get('1') || [];
          let v2 = eventsByVoice.get('2') || [];
          if (!(v1.length && v2.length)) continue;

          const v1AnchorRests = mergeIntervals(v1.filter((e) => e.isRest).map((e) => ({ start: e.start, end: e.end })));
          const v2AnchorRests = mergeIntervals(v2.filter((e) => e.isRest).map((e) => ({ start: e.start, end: e.end })));
          const shiftedA = shiftVoiceNoteForRestAnchors(measure, v1AnchorRests, v2, measureDur);
          const shiftedB = shiftVoiceNoteForRestAnchors(measure, v2AnchorRests, v1, measureDur);
          if (shiftedA || shiftedB) {
            normalizeMeasureTiming(measure);
            const reparsed = parseMeasureVoiceEvents(measure);
            v1 = reparsed.get('1') || [];
            v2 = reparsed.get('2') || [];
          }
          if (!(v1.length && v2.length)) continue;

          const v1Coverage = mergeIntervals(v1.map((e) => ({ start: e.start, end: e.end })));
          const v2Coverage = mergeIntervals(v2.map((e) => ({ start: e.start, end: e.end })));
          const v1Rests = mergeIntervals(v1.filter((e) => e.isRest).map((e) => ({ start: e.start, end: e.end })));
          const v2Rests = mergeIntervals(v2.filter((e) => e.isRest).map((e) => ({ start: e.start, end: e.end })));
          const mirrorToV2 = [];
          const mirrorToV1 = [];
          for (let i = 0; i < v1Rests.length; i++) {
            const r = v1Rests[i];
            const hasOverlap = v2Coverage.some((c) => overlaps(r.start, r.end, c.start, c.end));
            if (!hasOverlap) mirrorToV2.push(r);
          }
          for (let i = 0; i < v2Rests.length; i++) {
            const r = v2Rests[i];
            const hasOverlap = v1Coverage.some((c) => overlaps(r.start, r.end, c.start, c.end));
            if (!hasOverlap) mirrorToV1.push(r);
          }
          if (!mirrorToV1.length && !mirrorToV2.length) continue;

          const appendBeforeBarline = (nodes) => {
            if (!nodes.length) return;
            const firstBarline = Array.from(measure.childNodes || [])
              .find((n) => n && n.nodeType === 1 && localNameOf(n) === 'barline') || null;
            for (let i = 0; i < nodes.length; i++) {
              if (firstBarline) measure.insertBefore(nodes[i], firstBarline);
              else measure.appendChild(nodes[i]);
            }
          };
          const buildVoiceRestSegment = (voiceId, intervals) => {
            const out = [];
            if (!intervals.length) return out;
            out.push(createBackupEl(measureDur));
            let cursor = 0;
            const sorted = intervals
              .map((x) => ({ start: Number(x.start || 0), end: Number(x.end || 0) }))
              .filter((x) => x.end > x.start)
              .sort((a, b) => a.start - b.start || a.end - b.end);
            for (let i = 0; i < sorted.length; i++) {
              const s = Math.max(0, Math.min(measureDur, sorted[i].start));
              const e = Math.max(0, Math.min(measureDur, sorted[i].end));
              if (!(e > s)) continue;
              if (s > cursor) out.push(createForwardEl(s - cursor));
              out.push(createRestNoteEl(e - s, voiceId, divisions));
              cursor = e;
            }
            if (cursor < measureDur) out.push(createForwardEl(measureDur - cursor));
            return out;
          };

          appendBeforeBarline(buildVoiceRestSegment('1', mirrorToV1));
          appendBeforeBarline(buildVoiceRestSegment('2', mirrorToV2));
        }
      }

      return new XMLSerializer().serializeToString(doc);
    } catch {
      return raw;
    }
  }

  function renumberPartMeasures(doc) {
    const partEls = Array.from(doc.getElementsByTagNameNS('*', 'part'));
    for (let i = 0; i < partEls.length; i++) {
      const measures = Array.from(partEls[i].getElementsByTagNameNS('*', 'measure'));
      for (let m = 0; m < measures.length; m++) {
        measures[m].setAttribute('number', String(m + 1));
      }
    }
  }

  function mergeMusicXmlDocs(xmlTexts) {
    const docs = (Array.isArray(xmlTexts) ? xmlTexts : [])
      .map((t) => new DOMParser().parseFromString(String(t || ''), 'application/xml'))
      .filter((d) => d && !d.getElementsByTagName('parsererror').length);
    if (!docs.length) return '';
    if (docs.length === 1) return new XMLSerializer().serializeToString(docs[0]);

    const base = docs[0];
    const baseRoot = base.getElementsByTagNameNS('*', 'score-partwise')[0] || base.documentElement;
    if (!baseRoot) return '';
    const basePartList = baseRoot.getElementsByTagNameNS('*', 'part-list')[0] || null;
    const baseParts = Array.from(baseRoot.children).filter((n) => localNameOf(n) === 'part');
    const basePartById = new Map(baseParts.map((p) => [String(p.getAttribute('id') || ''), p]));

    const getPartMeasures = (partEl) => Array.from(partEl?.children || []).filter((n) => localNameOf(n) === 'measure');
    const computeMeasureDuration = (measureEl) => {
      if (!measureEl) return 1;
      const divisionsEl = measureEl.getElementsByTagNameNS('*', 'divisions')[0];
      const beatsEl = measureEl.getElementsByTagNameNS('*', 'beats')[0];
      const beatTypeEl = measureEl.getElementsByTagNameNS('*', 'beat-type')[0];
      const divisions = Math.max(1, Number(divisionsEl?.textContent || 1));
      const beats = Math.max(1, Number(beatsEl?.textContent || 4));
      const beatType = Math.max(1, Number(beatTypeEl?.textContent || 4));
      const dur = Math.round(divisions * beats * (4 / beatType));
      return Math.max(1, Number.isFinite(dur) ? dur : divisions * 4);
    };
    const buildRestMeasure = (templateMeasure = null) => {
      const m = templateMeasure ? base.importNode(templateMeasure, true) : base.createElement('measure');
      const kids = Array.from(m.children || []);
      for (let i = 0; i < kids.length; i++) {
        const ln = localNameOf(kids[i]);
        if (ln === 'note' || ln === 'backup' || ln === 'forward' || ln === 'direction' || ln === 'harmony' || ln === 'figured-bass') {
          kids[i].parentNode?.removeChild(kids[i]);
        }
      }
      const dur = computeMeasureDuration(m);
      const note = base.createElement('note');
      const rest = base.createElement('rest');
      const duration = base.createElement('duration');
      duration.textContent = String(dur);
      const voice = base.createElement('voice');
      voice.textContent = '1';
      const type = base.createElement('type');
      type.textContent = 'whole';
      note.appendChild(rest);
      note.appendChild(duration);
      note.appendChild(voice);
      note.appendChild(type);
      m.appendChild(note);
      return m;
    };
    const appendRestMeasures = (dstPart, count, templateMeasure = null) => {
      const n = Math.max(0, Number(count || 0));
      for (let i = 0; i < n; i++) {
        const restMeasure = buildRestMeasure(templateMeasure);
        dstPart.appendChild(restMeasure);
      }
    };

    let totalMeasuresSoFar = 0;
    for (let i = 0; i < baseParts.length; i++) {
      totalMeasuresSoFar = Math.max(totalMeasuresSoFar, getPartMeasures(baseParts[i]).length);
    }

    for (let di = 1; di < docs.length; di++) {
      const doc = docs[di];
      const root = doc.getElementsByTagNameNS('*', 'score-partwise')[0] || doc.documentElement;
      if (!root) continue;
      const partList = root.getElementsByTagNameNS('*', 'part-list')[0] || null;
      const parts = Array.from(root.children).filter((n) => localNameOf(n) === 'part');
      const srcPartById = new Map(parts.map((p) => [String(p.getAttribute('id') || ''), p]));
      let blockMeasures = 0;
      for (let i = 0; i < parts.length; i++) {
        blockMeasures = Math.max(blockMeasures, getPartMeasures(parts[i]).length);
      }

      for (let pi = 0; pi < parts.length; pi++) {
        const srcPart = parts[pi];
        const pid = String(srcPart.getAttribute('id') || '');
        let dstPart = basePartById.get(pid);

        if (!dstPart) {
          if (basePartList && partList) {
            const scorePart = Array.from(partList.getElementsByTagNameNS('*', 'score-part'))
              .find((sp) => String(sp.getAttribute('id') || '') === pid);
            if (scorePart) basePartList.appendChild(base.importNode(scorePart, true));
          }
          dstPart = base.importNode(srcPart, false);
          baseRoot.appendChild(dstPart);
          basePartById.set(pid, dstPart);

          // Backfill earlier systems so this late-appearing part stays aligned.
          const srcTemplate = getPartMeasures(srcPart)[0] || null;
          appendRestMeasures(dstPart, totalMeasuresSoFar, srcTemplate);
        }
      }

      const allPartIds = Array.from(basePartById.keys());
      for (let i = 0; i < allPartIds.length; i++) {
        const pid = allPartIds[i];
        const dstPart = basePartById.get(pid);
        const srcPart = srcPartById.get(pid) || null;
        const srcMeasures = srcPart ? getPartMeasures(srcPart) : [];
        if (srcMeasures.length) {
          for (let mi = 0; mi < srcMeasures.length; mi++) {
            dstPart.appendChild(base.importNode(srcMeasures[mi], true));
          }
        }
        const missing = Math.max(0, blockMeasures - srcMeasures.length);
        if (missing > 0) {
          const template = srcMeasures[0] || getPartMeasures(dstPart).slice(-1)[0] || null;
          appendRestMeasures(dstPart, missing, template);
        }
      }

      totalMeasuresSoFar += blockMeasures;
    }

    renumberPartMeasures(base);
    const merged = new XMLSerializer().serializeToString(base);
    return merged;
  }

  async function buildContinuousMusicXmlFromSystems(systemItems) {
    if (!Array.isArray(systemItems) || !systemItems.length) return null;
    const texts = [];
    for (let i = 0; i < systemItems.length; i++) {
      const url = systemItems[i]?.data?.musicXmlUrl;
      if (!url) continue;
      try {
        const xmlText = await fetchMusicXmlRawTextFromUrl(url);
        if (xmlText) texts.push(xmlText);
      } catch (e) {
        console.warn(`MusicXML fetch failed for system ${i + 1}:`, e);
      }
    }
    if (!texts.length) return null;
    const mergedXml = mergeMusicXmlDocs(texts);
    if (!mergedXml) return null;
    const published = await publishMergedMusicXmlText(mergedXml);
    if (published?.xmlUrl) {
      return {
        url: String(published.xmlUrl || ''),
        name: String(published.xmlName || 'omr-continuous.musicxml'),
        totalSystems: texts.length
      };
    }
    const blob = new Blob([mergedXml], { type: 'application/vnd.recordare.musicxml+xml;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    return {
      url,
      name: 'omr-continuous.musicxml',
      totalSystems: texts.length
    };
  }

  function estimatePitchBandFromStaffLines(rect) {
    try {
      if (!rect || !ctx) return null;
      const sx = Math.max(0, Math.floor(rect.x));
      const sy = Math.max(0, Math.floor(rect.y));
      const sw = Math.max(1, Math.floor(rect.w));
      const sh = Math.max(1, Math.floor(rect.h));
      const img = ctx.getImageData(sx, sy, sw, sh).data;
      const density = new Array(sh).fill(0);
      const longestRunRatio = new Array(sh).fill(0);

      for (let row = 0; row < sh; row++) {
        let dark = 0;
        let run = 0;
        let maxRun = 0;
        const rowOffset = row * sw * 4;
        for (let col = 0; col < sw; col++) {
          const i = rowOffset + col * 4;
          const r = img[i], g = img[i + 1], b = img[i + 2];
          const lum = 0.2126 * r + 0.7152 * g + 0.0722 * b;
          if (lum < 145) {
            dark++;
            run++;
            if (run > maxRun) maxRun = run;
          } else {
            run = 0;
          }
        }
        density[row] = dark / sw;
        longestRunRatio[row] = maxRun / sw;
      }

      const mean = density.reduce((s, v) => s + v, 0) / density.length;
      const variance = density.reduce((s, v) => s + ((v - mean) ** 2), 0) / density.length;
      const std = Math.sqrt(variance);
      const lineDensityThreshold = Math.max(0.035, mean + std * 0.65);
      const lineRunThreshold = 0.42; // Staff lines have long horizontal runs; lyrics do not.

      const lineRuns = [];
      let runStart = -1;
      for (let i = 0; i < sh; i++) {
        const on = density[i] >= lineDensityThreshold && longestRunRatio[i] >= lineRunThreshold;
        if (on && runStart === -1) runStart = i;
        if (!on && runStart !== -1) {
          lineRuns.push({ y0: runStart, y1: i - 1 });
          runStart = -1;
        }
      }
      if (runStart !== -1) lineRuns.push({ y0: runStart, y1: sh - 1 });

      const lineCenters = lineRuns.map((r) => Math.round((r.y0 + r.y1) / 2));
      if (lineCenters.length < 6) {
        const systems = detectSystemsInRect(rect);
        if (systems && systems.length) {
          const s = systems[0];
          return {
            yTop: Math.round(s.y + s.h * 0.08),
            yBottom: Math.round(s.y + s.h * 0.82),
            interline: Math.max(5, Math.round(s.h / 18))
          };
        }
        return null;
      }

      // Restrict to top ~62% to avoid lyric text affecting staff detection.
      const topCap = Math.floor(sh * 0.62);
      const topLines = lineCenters.filter((y) => y <= topCap);
      if (topLines.length < 6) {
        const systems = detectSystemsInRect(rect);
        if (systems && systems.length) {
          const s = systems[0];
          return {
            yTop: Math.round(s.y + s.h * 0.08),
            yBottom: Math.round(s.y + s.h * 0.82),
            interline: Math.max(5, Math.round(s.h / 18))
          };
        }
        return null;
      }

      const diffs = [];
      for (let i = 1; i < topLines.length; i++) {
        const d = topLines[i] - topLines[i - 1];
        if (d >= 2 && d <= 30) diffs.push(d);
      }
      diffs.sort((a, b) => a - b);
      const interline = diffs.length ? diffs[Math.floor(diffs.length / 2)] : Math.max(5, Math.round(sh * 0.015));

      const top = Math.max(0, Math.min(...topLines) - Math.round(interline * 1.8));
      const bottomFromLines = Math.max(...topLines) + Math.round(interline * 2.0);
      const hardBottomCap = Math.floor(sh * 0.60);
      const bottom = Math.min(sh - 1, Math.min(hardBottomCap, bottomFromLines));
      if (bottom - top < 20) return null;

      return { yTop: sy + top, yBottom: sy + bottom, interline };
    } catch {
      return null;
    }
  }

  function mergeMidiTimingWithNodeMap(midiNotes, nodeMap, rect) {
    if (!midiNotes.length || !nodeMap.length || !rect) return [];
    const sortedMidi = [...midiNotes].sort((a, b) => a.startTick - b.startTick || a.noteNumber - b.noteNumber);
    const minPitch = Math.min(...sortedMidi.map((n) => Number(n.noteNumber || 0)));
    const maxPitch = Math.max(...sortedMidi.map((n) => Number(n.noteNumber || 0)));
    const pitchSpan = Math.max(1, maxPitch - minPitch);
    const staffBand = estimatePitchBandFromStaffLines(rect);
    const yTop = staffBand?.yTop ?? (rect.y + rect.h * 0.07);
    const yBottom = staffBand?.yBottom ?? (rect.y + rect.h * 0.34);
    const interline = Math.max(5, Number(staffBand?.interline || (rect.h / 18)));
    const bandH = Math.max(24, yBottom - yTop);
    const boxH = Math.max(6, Math.min(14, Math.round(interline * 1.25)));
    const boxW = Math.max(6, Math.min(14, Math.round(interline * 1.3)));
    const lyricGuardBottom = rect.y + rect.h * 0.52;

    let idx = 0;
    const out = [];
    for (let i = 0; i < sortedMidi.length && idx < nodeMap.length; i++) {
      const m = sortedMidi[i];
      let bestIdx = idx;
      let bestScore = Number.POSITIVE_INFINITY;

      // Match in order, but allow a small lookahead to improve polyphonic alignment.
      const lookahead = Math.min(nodeMap.length - 1, idx + 8);
      for (let j = idx; j <= lookahead; j++) {
        const n = nodeMap[j];
        const xBias = (j - idx) * 0.35;
        const pitchBias = (Number.isFinite(n.noteNumber) && Number.isFinite(m.noteNumber))
          ? Math.abs(n.noteNumber - m.noteNumber)
          : 4;
        const score = pitchBias + xBias;
        if (score < bestScore) {
          bestScore = score;
          bestIdx = j;
        }
      }
      const n = nodeMap[bestIdx];
      idx = bestIdx + 1;
      const xCenter = Number(n.x || 0) + Number(n.w || 0) / 2;

      const pNorm = (Number(m.noteNumber) - minPitch) / pitchSpan;
      const yCenter = yBottom - Math.max(0, Math.min(1, pNorm)) * bandH;
      const y = Math.round(yCenter - boxH / 2);
      const clampedY = Math.max(
        Math.round(yTop - boxH * 0.3),
        Math.min(Math.round(Math.min(yBottom - boxH * 0.7, lyricGuardBottom - boxH)), y)
      );
      const x = Math.round(Math.max(rect.x, Math.min(rect.x + rect.w - boxW, xCenter - boxW / 2)));
      out.push({
        ...m,
        x,
        y: clampedY,
        w: boxW,
        h: boxH,
        partId: n.partId,
        measure: n.measure,
        timeBeats: Number.isFinite(Number(n.timeBeats)) ? Number(n.timeBeats) : null,
        timeBeatType: Number.isFinite(Number(n.timeBeatType)) ? Number(n.timeBeatType) : null,
        xmlOrder: n.order,
        mapSource: 'xml'
      });
    }
    return out;
  }

  async function buildPlaybackMapFromMidiUrl(url, name, musicXmlNodes = []) {
    if (!window.MidiPlayer || !getActiveRect()) return;
    try {
      const res = await fetch(url);
      if (!res.ok) return;
      const buf = await res.arrayBuffer();
      const parser = new MidiPlayer.Player(() => {});
      parser.loadArrayBuffer(buf);
      const tracks = parser.getEvents();
      const notes = extractNoteEventsFromTracks(tracks);
      playbackHasAudibleNotes = notes.length > 0;
      if (notes.length) {
        const durations = notes.map((n) => Math.max(0, Number(n.endTick || 0) - Number(n.startTick || 0))).sort((a, b) => a - b);
        const medianDur = durations[Math.floor(durations.length * 0.5)] || 1;
        const minDur = Math.max(2, Math.floor(medianDur * 0.22));
        const usable = notes.filter((n) => {
          const start = Number(n.startTick || 0);
          const end = Number(n.endTick || 0);
          const dur = Math.max(0, end - start);
          const pitch = Number(n.noteNumber || 0);
          return dur >= minDur && pitch >= 24 && pitch <= 108;
        });
        const base = usable.length ? usable : notes;
        playbackAudibleStartTick = Math.min(...base.map((n) => Number(n.startTick || 0)));
        playbackAudibleEndTick = Math.max(...base.map((n) => Number(n.endTick || 0)));
      } else {
        playbackHasAudibleNotes = false;
        playbackAudibleStartTick = 0;
        playbackAudibleEndTick = Math.max(1, Number(playbackTotalTicks || 1));
      }
      const usePreparedMergedMap = name === preparedMergedName && Array.isArray(preparedMergedNoteMap) && preparedMergedNoteMap.length > 0;
      if (usePreparedMergedMap) {
        playbackNoteMap = preparedMergedNoteMap.map((n) => ({ ...n }));
        preparedMergedNoteMap = null;
        preparedMergedName = '';
      } else {
        const sortedNotes = [...notes].sort((a, b) => a.startTick - b.startTick || a.noteNumber - b.noteNumber);
        const rect = getActiveRect();
        const xmlNodes = Array.isArray(musicXmlNodes) ? musicXmlNodes : [];
        if (xmlNodes.length && rect) {
          const xmlMap = mergeMidiTimingWithNodeMap(sortedNotes, xmlNodes, rect);
          if (Array.isArray(xmlMap) && xmlMap.length) {
            playbackNoteMap = xmlMap;
          } else {
            const strictScanMap = buildExactScanNoteMapFromEvents(sortedNotes, rect);
            playbackNoteMap = strictScanMap;
          }
        } else {
          const strictScanMap = buildExactScanNoteMapFromEvents(sortedNotes, rect);
          playbackNoteMap = strictScanMap;
        }
      }
      xmlNoteNodes = Array.isArray(musicXmlNodes) ? musicXmlNodes : [];
      playbackMapMeta = {
        name,
        createdAt: Date.now(),
        selection: getActiveRect()
      };
      localStorage.setItem('omr4all-note-map', JSON.stringify({ meta: playbackMapMeta, notes: playbackNoteMap }));
      playbackVisualCache = null;
      buildPlaybackVisualCache();
      updateNodeInfo();
      updateNoteLocationInfo();
      enableVisualLocationOverlay();
      refreshOverlay();
      if (playbackNoteMap.length) {
        setStatus(`Highlight map ready (${playbackNoteMap.length} notes).`);
      } else {
        setStatus('Exact scan map unavailable for this crop. No fallback used.');
        writeLog('Exact location mode: scanner could not confidently match noteheads to MIDI. Try selecting only one clean staff/system with less lyric overlap.');
      }
    } catch (e) {
      console.warn('Note map build failed:', e);
    }
  }

  async function runSingleOmrFlow(blob, fastMode, force4Enabled) {
    let attempt = await runOmrRequest(blob, force4Enabled);
    let data = attempt.data;

    // Auto-retry once with safer settings for better consistency.
    if (!fastMode && !attempt.ok && !attempt.hard) {
      attempt = await runOmrRequest(blob, false);
      data = attempt.data;
    }
    if (USE_CUSTOM_MIDI_CLEANUP && attempt.ok && data?.midiUrl) {
      data = await sanitizeNoisyOmrMidi(data);
    }
    return { attempt, data };
  }

  function bindPlaybackHighlight(playerBox) {
    if (activePlaybackBind?.cleanup) activePlaybackBind.cleanup();
    if (playbackPollTimer) {
      clearInterval(playbackPollTimer);
      playbackPollTimer = null;
    }
    const onLoaded = (e) => { playbackTotalTicks = Number(e.detail?.totalTicks || 1); };
    const onPlaying = (e) => {
      playbackLastEventAt = Date.now();
      playbackTotalTicks = Number(e.detail?.totalTicks || playbackTotalTicks || 1);
    };
    const onEnded = () => {
      stopPlaybackVisualLoop();
      clearPlaybackHighlight();
      playbackLastDrawTick = -1;
      playbackLastSystemIndex = -1;
      playbackLastLinearPos = NaN;
      playbackClockTick = NaN;
      if (manualSystemChainActive && Array.isArray(scannedSystemEntries) && scannedSystemEntries.length > 1) {
        const nextIdx = Number(activeScannedSystemIndex || 0) + 1;
        if (nextIdx < scannedSystemEntries.length) {
          (async () => {
            for (let i = nextIdx; i < scannedSystemEntries.length; i++) {
              await loadScannedSystemEntry(
                scannedSystemEntries[i],
                i + 1,
                scannedSystemEntries.length,
                true
              );
              if (playbackHasAudibleNotes) return;
              writeLog(`System ${i + 1}/${scannedSystemEntries.length}: no audible notes, skipped.`);
            }
            manualSystemChainActive = false;
          })().catch((e) => {
            console.error(e);
            writeLog(`System ${nextIdx + 1}/${scannedSystemEntries.length} load failed: ${e.message}`);
            manualSystemChainActive = false;
          });
          return;
        }
      }
      manualSystemChainActive = false;
      if (!autoSplitPlaybackActive) return;
      advanceAutoSplitPlayback('midi-ended');
    };
    const onPaused = () => {
      stopPlaybackVisualLoop();
      clearPlaybackHighlight();
      playbackLastDrawTick = -1;
      playbackLastSystemIndex = -1;
      playbackLastLinearPos = NaN;
      playbackClockTick = NaN;
      manualSystemChainActive = false;
    };
    const onStarted = (e) => {
      autoSplitWasPlaying = true;
      playbackLastDrawTick = -1;
      playbackLastSystemIndex = -1;
      playbackLastLinearPos = NaN;
      playbackLastEventAt = Date.now();
      manualSystemChainActive = Array.isArray(scannedSystemEntries) && scannedSystemEntries.length > 1;
      const tick = Number(e.detail?.tick || 0);
      const total = Number(e.detail?.totalTicks || playbackTotalTicks || 1);
      playbackClockTick = tick;
      drawPlaybackHighlight(tick, total);
      startPlaybackVisualLoop();
    };
    playerBox.addEventListener('midi-loaded', onLoaded);
    playerBox.addEventListener('midi-playing', onPlaying);
    playerBox.addEventListener('midi-ended', onEnded);
    playerBox.addEventListener('midi-paused', onPaused);
    playerBox.addEventListener('midi-started', onStarted);
    // Fallback: poll active player tick in case custom events do not bubble reliably.
    playbackPollTimer = setInterval(() => {
      const p = window._activeMidiPlayer;
      if (!p || typeof p.isPlaying !== 'function') return;
      const playing = !!p.isPlaying();
      if (autoSplitPlaybackActive) {
        if (playing) {
          autoSplitWasPlaying = true;
        } else if (autoSplitWasPlaying) {
          autoSplitWasPlaying = false;
          advanceAutoSplitPlayback('poll');
        }
      }
      if (!playing) return;
      if (Date.now() - playbackLastEventAt < 220) return;
      const tick = typeof p.getCurrentTick === 'function' ? p.getCurrentTick() : 0;
      const total = Number(p.totalTicks || playbackTotalTicks || 1);
      playbackTotalTicks = total;
      drawPlaybackHighlight(Number(tick || 0), total);
    }, 80);
    activePlaybackBind = {
      cleanup() {
        stopPlaybackVisualLoop();
        playerBox.removeEventListener('midi-loaded', onLoaded);
        playerBox.removeEventListener('midi-playing', onPlaying);
        playerBox.removeEventListener('midi-ended', onEnded);
        playerBox.removeEventListener('midi-paused', onPaused);
        playerBox.removeEventListener('midi-started', onStarted);
        if (playbackPollTimer) {
          clearInterval(playbackPollTimer);
          playbackPollTimer = null;
        }
      }
    };
  }

  async function playMidiFromBase64(base64, name = 'omr.mid', musicXmlNodes = []) {
    const published = await publishMergedMidiBase64(base64);
    if (published?.midiUrl) {
      await playMidiUrl(published.midiUrl, name || published.midiName || 'omr.mid', musicXmlNodes);
      return;
    }
    const bytes = Uint8Array.from(atob(base64), c => c.charCodeAt(0));
    const blob = new Blob([bytes], { type: 'audio/midi' });
    releaseLocalMidiObjectUrl();
    const url = URL.createObjectURL(blob);
    lastLocalMidiObjectUrl = url;
    setLatestMidiSource(url, name);
    try {
      localStorage.setItem('omr4all-last-midi-b64', base64);
      localStorage.setItem('omr4all-last-midi-name', name);
      localStorage.removeItem('omr4all-last-midi-url');
    } catch {}
    await buildPlaybackMapFromMidiUrl(url, name, musicXmlNodes);
    await renderMidiPlayerInTest(url, name, true);
  }

  async function playMidiUrl(url, name = 'omr.mid', musicXmlNodes = []) {
    releaseLocalMidiObjectUrl();
    setLatestMidiSource(url, name);
    try {
      localStorage.setItem('omr4all-last-midi-url', url);
      localStorage.setItem('omr4all-last-midi-name', name);
      localStorage.removeItem('omr4all-last-midi-b64');
    } catch {}
    await buildPlaybackMapFromMidiUrl(url, name, musicXmlNodes);
    await renderMidiPlayerInTest(url, name, false);
  }

  async function renderMidiPlayerInTest(url, name, canDownload) {
    player.style.display = 'block';
    player.innerHTML = '';
    const wrap = document.createElement('div');
    wrap.className = 'musicPanel-item';
    wrap.dataset.type = 'midi';
    wrap.dataset.name = name;
    wrap.dataset.url = url;

    const header = document.createElement('div');
    header.className = 'musicPanel-header';
    const title = document.createElement('div');
    title.className = 'musicPanel-title';
    title.textContent = name;
    header.appendChild(title);

    const playerBox = document.createElement('div');
    playerBox.className = 'musicPlayerBox';
    playerBox.style.display = 'block';

    wrap.appendChild(header);
    wrap.appendChild(playerBox);
    player.appendChild(wrap);
    writeLog('Rendering compact MIDI player…');
    const isBlobUrl = typeof url === 'string' && url.startsWith('blob:');
    let usedCompact = false;

    try {
      if (!isBlobUrl && typeof window.renderCompactMidiPlayer === 'function') {
        // Use the shared multichannel player only.
        await window.renderCompactMidiPlayer(playerBox, 'omr-live', name, url);
        usedCompact = true;
      } else {
        throw new Error('Compact player unavailable for this source.');
      }
    } catch (e) {
      console.error(e);
      writeLog(`Compact MIDI render failed: ${e.message}`);
      playerBox.innerHTML = '<div style="color:#b91c1c;padding:8px;">Multichannel player unavailable for this MIDI source.</div>';
    }
    bindPlaybackHighlight(playerBox);
    if (canDownload && usedCompact) {
      const dl = document.createElement('a');
      dl.href = url;
      dl.download = name;
      dl.textContent = 'Download MIDI';
      dl.style.display = 'inline-block';
      dl.style.marginTop = '6px';
      playerBox.appendChild(dl);
    }
  }

  document.getElementById('extractBtn').addEventListener('click', async () => {
    const extractBtn = document.getElementById('extractBtn');
    if (!imgReady) {
      writeLog('Load a PDF or image first.');
      return;
    }
    const runRect = selection || { x: 0, y: 0, w: source.width, h: source.height };
    const usingFullPage = !selection;
    extractBtn.disabled = true;
    updateMusicXmlDownload('', 'omr.xml');
    enableVisualLocationOverlay();
    startScanAnimation(runRect);
    startScanProgress('Preparing scan…', 2);
    player.style.display = 'block';
    player.innerHTML = '';
    const placeholder = document.createElement('div');
    placeholder.className = 'musicPanel-item';
    placeholder.innerHTML = `<div class="musicPanel-header"><div class="musicPanel-title">Processing scan…</div></div>`;
    player.appendChild(placeholder);
    writeLog(usingFullPage ? 'No selection: using full page.' : 'Cropping region…');
    setStatus(usingFullPage ? 'Processing full page…' : 'Processing selection…', true);
    setScanProgress(6, usingFullPage ? 'Processing full page…' : 'Processing selection…');
    let fastMode = !!fastToggle.checked;
    // Manual selection should remain a single intended system/region by default.
    // Auto-split applies only to full-page scans.
    const useAutoSplit = false;
    let systemsForAuto = useAutoSplit ? detectSystemsForAuto(runRect) : [];
    if (useAutoSplit && systemsForAuto.length >= 6) {
      const hs = systemsForAuto.map((s) => Math.max(1, Number(s?.h || 1))).sort((a, b) => a - b);
      const ws = systemsForAuto.map((s) => Math.max(1, Number(s?.w || 1))).sort((a, b) => a - b);
      const medianH = hs[Math.floor(hs.length * 0.5)] || 1;
      const medianW = ws[Math.floor(ws.length * 0.5)] || 1;
      const similarWidthCount = systemsForAuto.filter((s) => Math.abs(Number(s?.w || 0) - medianW) <= Math.max(24, medianW * 0.14)).length;
      const mostlyAlignedWidth = similarWidthCount >= Math.ceil(systemsForAuto.length * 0.75);
      const likelyFragmented = medianH <= Number(runRect?.h || 1) * 0.18 && mostlyAlignedWidth;
      if (likelyFragmented) {
        writeLog(`Auto split looked over-fragmented (${systemsForAuto.length} blocks); switching to single-pass.`);
        systemsForAuto = [];
      }
    }
