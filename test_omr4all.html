<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OMR4all Test – Scan</title>
  <link rel="icon" href="/favicon.ico" />
  <link rel="stylesheet" href="/musicPanel.css" />
  <style>
    :root {
      --bg: #f3f4f6;
      --ink: #111827;
      --muted: #4b5563;
      --accent: #0f766e;
      --panel: #ffffff;
      --border: #d1d5db;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      color: var(--ink);
      background: var(--bg);
    }
    header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      background: #fff;
    }
    header h1 {
      margin: 0 0 4px;
      font-size: 20px;
    }
    header p { margin: 0; color: var(--muted); font-size: 13px; }
    .wrap {
      display: grid;
      grid-template-columns: minmax(280px, 340px) 1fr;
      gap: 14px;
      padding: 14px 18px 18px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
    .section-title {
      margin: 0 0 6px;
      font-size: 12px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .controls label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .controls input[type="file"] {
      width: 100%;
      margin-bottom: 10px;
    }
    .controls select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px;
      background: #fff;
      margin-bottom: 8px;
    }
    .controls button {
      width: 100%;
      border: 0;
      background: var(--accent);
      color: white;
      padding: 9px 12px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      margin-bottom: 8px;
    }
    .controls button.secondary {
      background: #e5e7eb;
      color: #111827;
    }
    .controls .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .controls .row button { flex: 1 1 calc(50% - 8px); }
    .controls details {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px;
      margin: 8px 0 10px;
      background: #fafafa;
    }
    .controls summary {
      cursor: pointer;
      font-size: 13px;
      color: #111827;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .controls .toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--muted);
      margin: 6px 0;
    }
    .canvas-wrap {
      position: relative;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 8px;
      min-height: 420px;
      overflow: hidden;
    }
    canvas {
      display: block;
      max-width: 100%;
      height: auto;
    }
    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
    }
    #playOverlay {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
    }
    .log {
      font-family: "Courier New", monospace;
      font-size: 12px;
      white-space: pre-wrap;
      color: #2b2b2b;
      background: #f9fafb;
      border-radius: 6px;
      padding: 8px;
      border: 1px solid var(--border);
      min-height: 64px;
    }
    .log-locations {
      max-height: 220px;
      overflow: auto;
      font-size: 11px;
      line-height: 1.35;
    }
    .player {
      margin-top: 10px;
      display: none;
      border: 1px dashed var(--border);
      border-radius: 6px;
      padding: 8px;
      background: #1e1e1e;
    }
    .player .musicPanel-item {
      max-width: 100%;
      width: 100%;
      margin: 0;
    }
    .xml-viewer {
      margin-top: 8px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #fff;
      min-height: 120px;
      max-height: 440px;
      overflow: auto;
      padding: 8px;
      display: none;
    }
    .xml-viewer.active {
      display: block;
    }
    .status {
      font-size: 12px;
      color: var(--muted);
      margin-top: 6px;
    }
    .scan-progress {
      margin: 6px 0 10px;
      display: none;
      align-items: center;
      gap: 10px;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #f8fafc;
    }
    .scan-progress.active { display: flex; }
    .scan-ring {
      width: 52px;
      height: 52px;
      flex: 0 0 52px;
      transform: rotate(-90deg);
    }
    .scan-ring-bg {
      fill: none;
      stroke: #dbe3ea;
      stroke-width: 5;
    }
    .scan-ring-fg {
      fill: none;
      stroke: #0f766e;
      stroke-width: 5;
      stroke-linecap: round;
      stroke-dasharray: 157.08;
      stroke-dashoffset: 157.08;
      transition: stroke-dashoffset 120ms linear;
    }
    .scan-progress-meta {
      min-width: 0;
    }
    .scan-progress-pct {
      font-size: 18px;
      line-height: 1;
      font-weight: 700;
      color: #0f766e;
      margin-bottom: 4px;
    }
    .scan-progress-label {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 210px;
    }
    .scan-overlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      background: rgba(255, 255, 255, 0.35);
      backdrop-filter: blur(1px);
      z-index: 4;
    }
    .scan-overlay.active { display: flex; }
    .scan-overlay-card {
      width: 170px;
      height: 170px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid #cfd8e3;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .scan-overlay-ring {
      width: 146px;
      height: 146px;
      transform: rotate(-90deg);
    }
    .scan-overlay-text {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 12px;
    }
    .scan-overlay-pct {
      font-size: 34px;
      line-height: 1;
      font-weight: 800;
      color: #0f766e;
      margin-bottom: 8px;
    }
    .scan-overlay-label {
      font-size: 12px;
      color: #4b5563;
      max-width: 120px;
      line-height: 1.25;
    }
    .busy {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1s infinite ease-in-out;
    }
    @keyframes pulse {
      0% { opacity: 0.2; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1); }
      100% { opacity: 0.2; transform: scale(0.8); }
    }
    @media (max-width: 920px) {
      .wrap { grid-template-columns: 1fr; }
    }
  </style>
  <script src="/assets/pdf.min.js"></script>
  <script src="/assets/lucide.min.js"></script>
  <script src="/assets/Tone.min.js"></script>
  <script src="/assets/MidiPlayerJS-master/browser/midiplayer.js"></script>
  <script src="/assets/compactMidiPlayer.js?v=20260207piano15"></script>
</head>
<body>
  <header>
    <h1>OMR4all Test</h1>
    <p>Upload score, select region, scan with OMR4all only.</p>
  </header>

  <div class="wrap">
    <div class="panel controls">
      <h3 class="section-title">Input</h3>
      <label>PDF or image</label>
      <input id="fileInput" type="file" accept="application/pdf,image/*" />

      <div class="row">
        <button id="clearBtn" class="secondary">Clear</button>
        <button id="fitBtn" class="secondary">Fit Width</button>
      </div>

      <button id="extractBtn">Scan</button>
      <div id="scanProgress" class="scan-progress" aria-live="polite">
        <svg class="scan-ring" viewBox="0 0 56 56" aria-hidden="true">
          <circle class="scan-ring-bg" cx="28" cy="28" r="25"></circle>
          <circle id="scanProgressRing" class="scan-ring-fg" cx="28" cy="28" r="25"></circle>
        </svg>
        <div class="scan-progress-meta">
          <div id="scanProgressPct" class="scan-progress-pct">0%</div>
          <div id="scanProgressLabel" class="scan-progress-label">Preparing…</div>
        </div>
      </div>

      <details>
        <summary>Advanced</summary>
        <label>Upscale crop (OMR)</label>
        <select id="upscaleFactor">
          <option value="1">1x (fast)</option>
          <option value="2" selected>2x (recommended)</option>
          <option value="3">3x (slow)</option>
        </select>
        <label>OMR preset</label>
        <select id="omrPreset">
          <option value="normal">Normal</option>
          <option value="lyric-safe-fast" selected>Lyric-safe fast (recommended)</option>
          <option value="lyric-safe-plus">Lyric-safe + clean (slower)</option>
        </select>
        <label class="toggle">
          <input id="fastToggle" type="checkbox" checked />
          Fast mode
        </label>
        <label class="toggle">
          <input id="autoSplitToggle" type="checkbox" checked />
          Auto split systems
        </label>
        <label class="toggle">
          <input id="noteOverlayToggle" type="checkbox" checked />
          Show note-node overlay
        </label>
        <label class="toggle">
          <input id="dotOnlyToggle" type="checkbox" checked />
          Dot mode (no boxes)
        </label>
        <label class="toggle">
          <input id="noteLabelToggle" type="checkbox" checked />
          Show note index labels
        </label>
        <label class="toggle">
          <input id="noteVisualToggle" type="checkbox" checked />
          Show coordinate tags
        </label>
        <label class="toggle">
          <input id="force4Toggle" type="checkbox" />
          Force 4 channels (SATB)
        </label>
        <label class="toggle">
          <input id="mockToggle" type="checkbox" />
          Use mock MIDI
        </label>
        <button id="unlockAudio" class="secondary" style="margin-top:6px;">Unlock Audio</button>
        <div id="debug" class="status"></div>
      </details>

      <div style="margin-top: 12px;">
        <h3 class="section-title">Selection</h3>
        <div id="selInfo" class="log">No region selected.</div>
      </div>
      <div style="margin-top: 12px;">
        <h3 class="section-title">Node Map</h3>
        <div id="nodeInfo" class="log">No note-node map yet.</div>
      </div>
      <div style="margin-top: 12px;">
        <h3 class="section-title">Note Locations</h3>
        <div id="noteLocInfo" class="log log-locations">No note locations yet.</div>
        <button id="copyNoteLocBtn" class="secondary" style="margin-top:6px;">Copy JSON</button>
      </div>

      <div class="player" id="player"></div>

      <div style="margin-top: 12px;">
        <h3 class="section-title">Output</h3>
        <div class="row">
          <button id="downloadXmlBtn" class="secondary" style="display:none;">Download MusicXML</button>
          <button id="viewXmlBtn" class="secondary" disabled>View MusicXML</button>
          <button id="downloadMidiBtn" class="secondary" disabled>Download MIDI</button>
          <button id="recreateMidiBtn" class="secondary">Recreate MIDI from JSON</button>
          <button id="dumpMidiBtn" class="secondary" disabled>Dump MIDI debug</button>
        </div>
        <input id="recreateMidiJsonInput" type="file" accept="application/json,.json" style="display:none;" />
        <div id="xmlViewer" class="xml-viewer"></div>
        <div id="log" class="log">Waiting for input…</div>
        <div id="status" class="status"></div>
      </div>
    </div>

    <div class="panel">
      <div class="canvas-wrap" id="canvasWrap">
        <canvas id="source"></canvas>
        <canvas id="overlay"></canvas>
        <canvas id="playOverlay"></canvas>
        <div id="scanOverlay" class="scan-overlay" aria-live="polite">
          <div class="scan-overlay-card">
            <svg class="scan-overlay-ring" viewBox="0 0 56 56" aria-hidden="true">
              <circle class="scan-ring-bg" cx="28" cy="28" r="25"></circle>
              <circle id="scanOverlayRing" class="scan-ring-fg" cx="28" cy="28" r="25"></circle>
            </svg>
            <div class="scan-overlay-text">
              <div id="scanOverlayPct" class="scan-overlay-pct">0%</div>
              <div id="scanOverlayLabel" class="scan-overlay-label">Preparing…</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
  const fileInput = document.getElementById('fileInput');
  const source = document.getElementById('source');
  const overlay = document.getElementById('overlay');
  const playOverlay = document.getElementById('playOverlay');
  const ctx = source.getContext('2d');
  const octx = overlay.getContext('2d');
  const poctx = playOverlay.getContext('2d');
  const log = document.getElementById('log');
  const statusEl = document.getElementById('status');
  const debugEl = document.getElementById('debug');
  const unlockBtn = document.getElementById('unlockAudio');
  const selInfo = document.getElementById('selInfo');
  const player = document.getElementById('player');
  const mockToggle = document.getElementById('mockToggle');
  const force4Toggle = document.getElementById('force4Toggle');
  const fastToggle = document.getElementById('fastToggle');
  const autoSplitToggle = document.getElementById('autoSplitToggle');
  const noteOverlayToggle = document.getElementById('noteOverlayToggle');
  const dotOnlyToggle = document.getElementById('dotOnlyToggle');
  const noteLabelToggle = document.getElementById('noteLabelToggle');
  const noteVisualToggle = document.getElementById('noteVisualToggle');
  const upscaleFactor = document.getElementById('upscaleFactor');
  const omrPreset = document.getElementById('omrPreset');
  const nodeInfo = document.getElementById('nodeInfo');
  const noteLocInfo = document.getElementById('noteLocInfo');
  const copyNoteLocBtn = document.getElementById('copyNoteLocBtn');
  let downloadXmlBtn = document.getElementById('downloadXmlBtn');
  let viewXmlBtn = document.getElementById('viewXmlBtn');
  let downloadMidiBtn = document.getElementById('downloadMidiBtn');
  let recreateMidiBtn = document.getElementById('recreateMidiBtn');
  let recreateMidiJsonInput = document.getElementById('recreateMidiJsonInput');
  let dumpMidiBtn = document.getElementById('dumpMidiBtn');
  let xmlViewer = document.getElementById('xmlViewer');
  const scanProgressEl = document.getElementById('scanProgress');
  const scanProgressRing = document.getElementById('scanProgressRing');
  const scanProgressPctEl = document.getElementById('scanProgressPct');
  const scanProgressLabelEl = document.getElementById('scanProgressLabel');
  const scanOverlayEl = document.getElementById('scanOverlay');
  const scanOverlayRing = document.getElementById('scanOverlayRing');
  const scanOverlayPctEl = document.getElementById('scanOverlayPct');
  const scanOverlayLabelEl = document.getElementById('scanOverlayLabel');
  const MAX_OMR_UPLOAD_BYTES = 900 * 1024; // Keep under common nginx 1MB defaults.
  const SHOW_APPROX_DOTS = false;
  const VISUAL_PROGRESS_GAIN = 1.10;
  const SCAN_RING_CIRCUMFERENCE = 2 * Math.PI * 25;
  const OMR_CLIENT_BUILD = '20260221-omr4all-only-v1';
  const USE_CUSTOM_MIDI_CLEANUP = false;
  const IGNORE_LYRICS_IN_CROP = false;
  const ENABLE_LYRIC_NOISE_FILTER = false;
  const INPUT_CACHE_DB = 'tw-omr-cache';
  const INPUT_CACHE_STORE = 'files';
  const INPUT_CACHE_KEY = 'test_omr4all_last_input';

  let imgReady = false;
  let selection = null; // {x,y,w,h} in canvas coords
  let activeOmrRect = null;
  let playbackNoteMap = [];
  let xmlNoteNodes = [];
  let playbackMapMeta = null;
  let activePlaybackBind = null;
  let playbackTotalTicks = 1;
  let playbackAudibleStartTick = 0;
  let playbackAudibleEndTick = 1;
  let playbackPollTimer = null;
  let playbackSystems = [];
  let lastPlaybackTick = 0;
  let playbackReassessTick = -1;
  let playbackSmoothedPx = null;
  let playbackLastDrawTick = -1;
  let playbackLastSystemIndex = -1;
  let playbackLastLinearPos = NaN;
  let playbackVisualCache = null;
  let playbackLastEventAt = 0;
  let playbackClockTick = NaN;
  let playbackRenderRaf = 0;
  let playbackVisualRunning = false;
  let playbackHasAudibleNotes = false;
  let noteLocationPayload = [];
  let instantNoteDots = [];
  let systemPreviewRects = [];
  let autoSplitPlaybackQueue = [];
  let autoSplitPlaybackActive = false;
  let autoSplitPlaybackTransitioning = false;
  let autoSplitWasPlaying = false;
  let scannedSystemEntries = [];
  let activeScannedSystemIndex = -1;
  let manualSystemChainActive = false;
  let preparedMergedNoteMap = null;
  let preparedMergedName = '';
  let scanAnimFrame = null;
  let scanAnimRect = null;
  let scanAnimStart = 0;
  let scanProgressTimer = null;
  let scanProgressValue = 0;
  let scanProgressAutoCap = 0;
  let latestMusicXmlUrl = '';
  let latestMusicXmlName = 'omr.xml';
  let latestMidiUrl = '';
  let latestMidiName = 'omr.mid';
  let latestMusicXmlObjectUrl = '';
  let musicXmlViewerLoading = null;
  let osmdInstance = null;
  let jsZipLoading = null;
  let lastLocalMidiObjectUrl = '';

  pdfjsLib.GlobalWorkerOptions.workerSrc = '/assets/pdf.worker.min.js';

  function writeLog(msg) {
    log.textContent = msg;
  }
  function appendLog(msg) {
    const cur = String(log?.textContent || '').trim();
    const add = String(msg || '').trim();
    if (!add) return;
    log.textContent = cur ? `${cur}\n${add}` : add;
  }
  function releaseLocalMidiObjectUrl() {
    if (!lastLocalMidiObjectUrl) return;
    try { URL.revokeObjectURL(lastLocalMidiObjectUrl); } catch {}
    lastLocalMidiObjectUrl = '';
    updateMidiDumpButtonState();
  }
  function updateMidiDumpButtonState() {
    if (!dumpMidiBtn && !downloadMidiBtn) return;
    let hasMidi = !!(latestMidiUrl || lastLocalMidiObjectUrl);
    if (!hasMidi) {
      try {
        hasMidi = !!String(localStorage.getItem('omr4all-last-midi-url') || '');
      } catch {}
    }
    if (dumpMidiBtn) dumpMidiBtn.disabled = !hasMidi;
    if (downloadMidiBtn) downloadMidiBtn.disabled = !hasMidi;
  }
  function setLatestMidiSource(url, name = 'omr.mid') {
    latestMidiUrl = String(url || '');
    latestMidiName = String(name || 'omr.mid');
    updateMidiDumpButtonState();
  }
  function getCurrentMidiSource() {
    let url = String(latestMidiUrl || '');
    let name = String(latestMidiName || 'omr.mid');
    if (!url && lastLocalMidiObjectUrl) url = String(lastLocalMidiObjectUrl);
    try {
      if (!url) url = String(localStorage.getItem('omr4all-last-midi-url') || '');
      if (!name || name === 'omr.mid') name = String(localStorage.getItem('omr4all-last-midi-name') || name);
    } catch {}
    return { url, name };
  }
  async function uploadMidiDebugDump(payload) {
    const res = await fetch('/api/omr_debug_dump.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    let out = null;
    try { out = await res.json(); } catch {}
    if (!res.ok || !out || out.status !== 'ok' || !out.debugUrl) {
      const msg = String(out?.error || `HTTP ${res.status}`);
      throw new Error(msg);
    }
    return out;
  }
  function ensureXmlControls() {
    if (downloadXmlBtn && viewXmlBtn && downloadMidiBtn && recreateMidiBtn && dumpMidiBtn && recreateMidiJsonInput && xmlViewer) return;
    const outputTitle = Array.from(document.querySelectorAll('.section-title'))
      .find((el) => String(el.textContent || '').trim().toLowerCase() === 'output');
    const outputBlock = outputTitle ? outputTitle.parentElement : null;
    if (!outputBlock) return;

    let row = outputBlock.querySelector('.row');
    if (!row) {
      row = document.createElement('div');
      row.className = 'row';
      outputTitle.insertAdjacentElement('afterend', row);
    }

    if (!downloadXmlBtn) {
      downloadXmlBtn = document.createElement('button');
      downloadXmlBtn.id = 'downloadXmlBtn';
      downloadXmlBtn.className = 'secondary';
      downloadXmlBtn.style.display = 'none';
      downloadXmlBtn.textContent = 'Download MusicXML';
      row.appendChild(downloadXmlBtn);
    }
    if (!viewXmlBtn) {
      viewXmlBtn = document.createElement('button');
      viewXmlBtn.id = 'viewXmlBtn';
      viewXmlBtn.className = 'secondary';
      viewXmlBtn.disabled = true;
      viewXmlBtn.textContent = 'View MusicXML';
      row.appendChild(viewXmlBtn);
    }
    if (!downloadMidiBtn) {
      downloadMidiBtn = document.createElement('button');
      downloadMidiBtn.id = 'downloadMidiBtn';
      downloadMidiBtn.className = 'secondary';
      downloadMidiBtn.disabled = true;
      downloadMidiBtn.textContent = 'Download MIDI';
      row.appendChild(downloadMidiBtn);
    }
    if (!recreateMidiBtn) {
      recreateMidiBtn = document.createElement('button');
      recreateMidiBtn.id = 'recreateMidiBtn';
      recreateMidiBtn.className = 'secondary';
      recreateMidiBtn.textContent = 'Recreate MIDI from JSON';
      row.appendChild(recreateMidiBtn);
    }
    if (!dumpMidiBtn) {
      dumpMidiBtn = document.createElement('button');
      dumpMidiBtn.id = 'dumpMidiBtn';
      dumpMidiBtn.className = 'secondary';
      dumpMidiBtn.disabled = true;
      dumpMidiBtn.textContent = 'Dump MIDI debug';
      row.appendChild(dumpMidiBtn);
    }
    if (!recreateMidiJsonInput) {
      recreateMidiJsonInput = document.createElement('input');
      recreateMidiJsonInput.id = 'recreateMidiJsonInput';
      recreateMidiJsonInput.type = 'file';
      recreateMidiJsonInput.accept = 'application/json,.json';
      recreateMidiJsonInput.style.display = 'none';
      outputBlock?.appendChild(recreateMidiJsonInput);
    }
    if (!xmlViewer) {
      xmlViewer = document.createElement('div');
      xmlViewer.id = 'xmlViewer';
      xmlViewer.className = 'xml-viewer';
      const firstLog = outputBlock.querySelector('#log');
      if (firstLog && firstLog.parentElement === outputBlock) outputBlock.insertBefore(xmlViewer, firstLog);
      else outputBlock.appendChild(xmlViewer);
    }
  }

  function bindMusicXmlButtons() {
    downloadXmlBtn?.addEventListener('click', () => {
      if (!latestMusicXmlUrl) {
        setStatus('No MusicXML to download yet.');
        return;
      }
      try {
        const a = document.createElement('a');
        a.href = latestMusicXmlUrl;
        a.download = latestMusicXmlName || 'omr.musicxml';
        a.rel = 'noopener';
        a.target = '_blank';
        document.body.appendChild(a);
        a.click();
        a.remove();
        setStatus('MusicXML download started.');
      } catch (e) {
        console.warn('MusicXML download failed:', e);
        setStatus('MusicXML download failed.');
      }
    });

    viewXmlBtn?.addEventListener('click', async () => {
      if (!latestMusicXmlUrl) {
        setStatus('No MusicXML to view yet.');
        return;
      }
      let midiUrl = '';
      let midiName = 'omr.mid';
      try {
        midiUrl = String(localStorage.getItem('omr4all-last-midi-url') || '');
        midiName = String(localStorage.getItem('omr4all-last-midi-name') || midiName);
      } catch {}
      const opened = await openMusicXmlInNewWindow(latestMusicXmlUrl, midiUrl, midiName);

  function isZipBytes(buf) {
    const b = new Uint8Array(buf || new ArrayBuffer(0));
    return b.length >= 4 && b[0] === 0x50 && b[1] === 0x4b && (b[2] === 0x03 || b[2] === 0x05 || b[2] === 0x07) && (b[3] === 0x04 || b[3] === 0x06 || b[3] === 0x08);
  }

  async function extractXmlFromMxl(buffer) {
    const ok = await ensureJsZipLib();
    if (!ok || !window.JSZip) return null;
    const zip = await window.JSZip.loadAsync(buffer);
    const containerEntry = zip.file('META-INF/container.xml');
    if (containerEntry) {
      const containerText = await containerEntry.async('string');
      const m = containerText.match(/full-path\s*=\s*"([^"]+)"/i);
      if (m?.[1] && zip.file(m[1])) {
        return await zip.file(m[1]).async('string');
      }
    }
    const allNames = Object.keys(zip.files || {});
    const xmlCandidates = allNames.filter((n) => /\.xml$/i.test(n) && !/^META-INF\//i.test(n));
    if (xmlCandidates.length && zip.file(xmlCandidates[0])) {
      return await zip.file(xmlCandidates[0]).async('string');
    }
    return null;
  }

  function startScanProgress(label = 'Preparing…', initial = 1) {
    scanProgressValue = Math.max(0, Math.min(100, Number(initial || 0)));
    scanProgressAutoCap = Math.max(scanProgressValue, 99);
    if (scanProgressLabelEl) scanProgressLabelEl.textContent = label;
    if (scanOverlayLabelEl) scanOverlayLabelEl.textContent = label;

      if (scanProgressValue < scanProgressAutoCap) {
        const remain = scanProgressAutoCap - scanProgressValue;
        const step = remain > 18 ? 1.2 : (remain > 8 ? 0.7 : 0.35);
        scanProgressValue = Math.min(scanProgressAutoCap, scanProgressValue + step);

    }, 140);

  function openInputCacheDb() {
    return new Promise((resolve, reject) => {
      if (!('indexedDB' in window)) {
        reject(new Error('IndexedDB unavailable'));
        return;
      }
      const req = indexedDB.open(INPUT_CACHE_DB, 1);
      req.onupgradeneeded = () => {
        const db = req.result;
        if (!db.objectStoreNames.contains(INPUT_CACHE_STORE)) {
          db.createObjectStore(INPUT_CACHE_STORE);
        }
      };
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error || new Error('Failed to open input cache DB'));
    });
  }

  async function cacheInputFile(file) {
    if (!file) return;
    try {
      const db = await openInputCacheDb();
      await new Promise((resolve, reject) => {
        const tx = db.transaction(INPUT_CACHE_STORE, 'readwrite');
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error || new Error('Cache write failed'));
        tx.objectStore(INPUT_CACHE_STORE).put({
          file,
          name: String(file.name || ''),
          type: String(file.type || ''),
          size: Number(file.size || 0),
          savedAt: Date.now()
        }, INPUT_CACHE_KEY);
      });
      db.close();
    } catch (e) {
      console.warn('Input cache write failed:', e);
    }
  }

  async function readCachedInputFile() {
    try {
      const db = await openInputCacheDb();
      const result = await new Promise((resolve, reject) => {
        const tx = db.transaction(INPUT_CACHE_STORE, 'readonly');
        const req = tx.objectStore(INPUT_CACHE_STORE).get(INPUT_CACHE_KEY);
        req.onsuccess = () => resolve(req.result || null);
        req.onerror = () => reject(req.error || new Error('Cache read failed'));
      });
      db.close();
      return result && result.file ? result : null;
    } catch (e) {
      console.warn('Input cache read failed:', e);
      return null;
    }
  }

  let dragging = false;

  function getPos(evt) {
    const rect = source.getBoundingClientRect();
    const touch = evt?.touches?.[0] || evt?.changedTouches?.[0] || null;
    const clientX = touch ? touch.clientX : evt?.clientX;
    const clientY = touch ? touch.clientY : evt?.clientY;
    if (!Number.isFinite(clientX) || !Number.isFinite(clientY) || rect.width <= 0 || rect.height <= 0) {
      return null;
    }
    const x = (clientX - rect.left) * (source.width / rect.width);
    const y = (clientY - rect.top) * (source.height / rect.height);
    if (!Number.isFinite(x) || !Number.isFinite(y)) return null;
    return { x, y };
  }

  function clampRectToSource(rect) {
    if (!rect) return null;
    const x = Math.max(0, Math.min(source.width, Number(rect.x || 0)));
    const y = Math.max(0, Math.min(source.height, Number(rect.y || 0)));
    const maxW = Math.max(0, source.width - x);
    const maxH = Math.max(0, source.height - y);
    const w = Math.max(0, Math.min(maxW, Number(rect.w || 0)));
    const h = Math.max(0, Math.min(maxH, Number(rect.h || 0)));
    if (w < 1 || h < 1) return null;
    return { x, y, w, h };
  }

  function normalizeSystemPreviewRects(rects, baseRect = null) {
    const src = (Array.isArray(rects) ? rects : [])
      .map((r) => clampRectToSource(r))
      .filter((r) => r && r.w >= 8 && r.h >= 8)
      .sort((a, b) => Number(a.y || 0) - Number(b.y || 0));
    if (src.length < 2) return src;

    const heights = src.map((r) => Math.max(1, Number(r.h || 1))).sort((a, b) => a - b);
    const medianH = heights[Math.floor(heights.length * 0.5)] || 1;
    const rectH = Math.max(1, Number(baseRect?.h || source.height || 1));
    const alreadySystemLike = src.length <= 2 || (src.length <= 3 && medianH >= rectH * 0.16);
    if (alreadySystemLike) return src;

    const gaps = [];
    for (let i = 1; i < src.length; i++) {
      const prev = src[i - 1];
      const cur = src[i];
      const gap = Number(cur.y || 0) - (Number(prev.y || 0) + Number(prev.h || 0));
      if (Number.isFinite(gap) && gap >= 0) gaps.push(gap);
    }
    const sortedGaps = gaps.slice().sort((a, b) => a - b);
    const refGap = sortedGaps.length
      ? sortedGaps[Math.floor((sortedGaps.length - 1) * 0.35)]
      : medianH * 1.4;
    const maxGap = Math.min(
      Math.max(medianH * 6.2, 28),
      Math.max(32, rectH * 0.28)
    );
    const mergeGap = Math.max(20, Math.min(maxGap, refGap * 1.85));

    const grouped = [];
    let current = { ...src[0] };
    for (let i = 1; i < src.length; i++) {
      const next = src[i];
      const cTop = Number(current.y || 0);
      const cBottom = cTop + Number(current.h || 0);
      const cLeft = Number(current.x || 0);
      const cRight = cLeft + Number(current.w || 0);
      const nTop = Number(next.y || 0);
      const nBottom = nTop + Number(next.h || 0);
      const nLeft = Number(next.x || 0);
      const nRight = nLeft + Number(next.w || 0);
      const gap = nTop - cBottom;
      const overlapW = Math.max(0, Math.min(cRight, nRight) - Math.max(cLeft, nLeft));
      const minW = Math.max(1, Math.min(Number(current.w || 1), Number(next.w || 1)));
      const overlapRatio = overlapW / minW;
      const widthDelta = Math.abs(Number(current.w || 0) - Number(next.w || 0));
      const aligned = overlapRatio >= 0.64;
      const similarWidth = widthDelta <= Math.max(30, minW * 0.24);
      const closeEnough = gap >= -4 && gap <= mergeGap;

      if (aligned && similarWidth && closeEnough) {
        current.x = Math.min(cLeft, nLeft);
        current.y = Math.min(cTop, nTop);
        current.w = Math.max(cRight, nRight) - current.x;
        current.h = Math.max(cBottom, nBottom) - current.y;
      } else {
        grouped.push(current);
        current = { ...next };
      }
    }
    grouped.push(current);

    const reclusterByGap = (items) => {
      const src2 = (Array.isArray(items) ? items : [])
        .filter((r) => r && Number.isFinite(r.x) && Number.isFinite(r.y) && Number.isFinite(r.w) && Number.isFinite(r.h))
        .sort((a, b) => Number(a.y || 0) - Number(b.y || 0));
      if (src2.length < 3) return src2;

      const localGaps = [];
      for (let i = 1; i < src2.length; i++) {
        const a = src2[i - 1];
        const b = src2[i];
        const gap = Number(b.y || 0) - (Number(a.y || 0) + Number(a.h || 0));
        if (Number.isFinite(gap) && gap >= 0) localGaps.push(gap);
      }
      const sortedLocal = localGaps.slice().sort((a, b) => a - b);
      const medianGap = sortedLocal.length
        ? sortedLocal[Math.floor(sortedLocal.length * 0.5)]
        : Math.max(20, medianH * 1.6);
      let breakGap = Math.max(32, Math.min(rectH * 0.22, medianGap * 3.2));
      if (sortedLocal.length >= 2) {
        let bestIdx = -1;
        let bestJump = -1;
        for (let i = 0; i < sortedLocal.length - 1; i++) {
          const a = sortedLocal[i];
          const b = sortedLocal[i + 1];
          const jump = b - a;
          if (jump > bestJump) {
            bestJump = jump;
            bestIdx = i;
          }
        }
        if (bestIdx >= 0) {
          const a = sortedLocal[bestIdx];
          const b = sortedLocal[bestIdx + 1];
          const strongJump = bestJump >= Math.max(8, a * 0.45);
          if (strongJump) {
            breakGap = Math.max(20, Math.min(rectH * 0.30, (a + b) * 0.5));
          }
        }
      }

      const out = [];
      let acc = { ...src2[0] };
      for (let i = 1; i < src2.length; i++) {
        const n = src2[i];
        const aTop = Number(acc.y || 0);
        const aBottom = aTop + Number(acc.h || 0);
        const aLeft = Number(acc.x || 0);
        const aRight = aLeft + Number(acc.w || 0);
        const nTop = Number(n.y || 0);
        const nBottom = nTop + Number(n.h || 0);
        const nLeft = Number(n.x || 0);
        const nRight = nLeft + Number(n.w || 0);
        const gap = nTop - aBottom;
        const overlapW = Math.max(0, Math.min(aRight, nRight) - Math.max(aLeft, nLeft));
        const minW = Math.max(1, Math.min(Number(acc.w || 1), Number(n.w || 1)));
        const overlapRatio = overlapW / minW;
        const widthDelta = Math.abs(Number(acc.w || 0) - Number(n.w || 0));
        const similarWidth = widthDelta <= Math.max(40, minW * 0.38);
        const aligned = overlapRatio >= 0.48;
        const shouldMerge = gap >= -4 && gap <= breakGap && aligned && similarWidth;

        if (shouldMerge) {
          acc.x = Math.min(aLeft, nLeft);
          acc.y = Math.min(aTop, nTop);
          acc.w = Math.max(aRight, nRight) - acc.x;
          acc.h = Math.max(aBottom, nBottom) - acc.y;
        } else {
          out.push(acc);
          acc = { ...n };
        }
      }
      out.push(acc);
      return out;
    };

    const reclustered = reclusterByGap(grouped);
    const finalOut = (reclustered.length >= 2 && reclustered.length < grouped.length)
      ? reclustered
      : grouped;
    return finalOut.slice(0, 16);
  }

  function getSystemPreviewBaseRect() {
    if (!imgReady || source.width < 2 || source.height < 2) return null;
    if (selection) return clampRectToSource(selection);
    if (autoSplitToggle?.checked) {
      return { x: 0, y: 0, w: source.width, h: source.height };
    }
    return null;
  }

  function drawOverlayCanvas(rect = selection, previewRects = systemPreviewRects) {
    octx.clearRect(0, 0, overlay.width, overlay.height);
    const frames = Array.isArray(previewRects) ? previewRects : [];
    if (frames.length) {
      octx.save();
      octx.lineWidth = 2;
      octx.strokeStyle = 'rgba(209, 67, 13, 0.95)';
      octx.fillStyle = 'rgba(209, 67, 13, 0.09)';
      octx.font = 'bold 13px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace';
      for (let i = 0; i < frames.length; i++) {
        const r = frames[i];
        octx.fillRect(r.x, r.y, r.w, r.h);
        octx.strokeRect(r.x, r.y, r.w, r.h);
        const tx = Math.max(2, r.x + 6);
        const ty = Math.max(14, r.y + 16);
        octx.fillStyle = 'rgba(209, 67, 13, 0.98)';
        octx.fillText(`S${i + 1}`, tx, ty);
        octx.fillStyle = 'rgba(209, 67, 13, 0.09)';
      }
      octx.restore();
    }
    const r = clampRectToSource(rect);
    if (!r) return;
    octx.save();
    octx.strokeStyle = '#1d7a6d';
    octx.lineWidth = 2;
    octx.setLineDash([6, 4]);
    octx.strokeRect(r.x, r.y, r.w, r.h);
    octx.restore();
  }

  function drawRect(x, y, w, h) {
    drawOverlayCanvas({ x, y, w, h }, []);
  }

  function refreshSystemPreview() {
    const baseRect = getSystemPreviewBaseRect();
    if (!baseRect) {
      systemPreviewRects = [];
      drawOverlayCanvas(selection, []);
      return;
    }
    if (selection) {
      const one = clampRectToSource(selection);
      systemPreviewRects = one ? [one] : [];
      drawOverlayCanvas(selection, systemPreviewRects);
      return;
    }
    const scoreCandidate = (items) => {
      const src = (Array.isArray(items) ? items : [])
        .filter((r) => r && Number.isFinite(r.h) && Number.isFinite(r.w) && Number(r.h) >= 10 && Number(r.w) >= 10);
      if (!src.length) return -1;
      const hs = src.map((r) => Number(r.h || 0)).sort((a, b) => a - b);
      const medianH = hs[Math.floor(hs.length * 0.5)] || 0;
      const rectH = Math.max(1, Number(baseRect?.h || 1));
      const thinPenalty = medianH < rectH * 0.045 ? 4 : 0;
      const count = Math.min(12, src.length);
      const countBonus = (count >= 2 && count <= 8) ? 6 : 0;
      return count * 10 + countBonus - thinPenalty;
    };
    const c1 = detectSystemsForAuto(baseRect) || [];
    const c2 = detectSystemsByWhitespace(baseRect) || [];
    const c3 = detectSystemsByProjection(baseRect) || [];
    const c4 = detectSystemsByLeftStrip(baseRect) || [];
    let detected = [];
    if (c4.length >= 2) {
      detected = c4;
    } else {
      detected = c1;
      if (scoreCandidate(c2) > scoreCandidate(detected)) detected = c2;
      if (scoreCandidate(c3) > scoreCandidate(detected)) detected = c3;
    }
    systemPreviewRects = normalizeSystemPreviewRects(detected, baseRect);
    drawOverlayCanvas(selection, systemPreviewRects);
  }

  async function seekPlaybackFromCanvasPos(pos, autoplay = false) {
    manualSystemChainActive = false;
    const y0 = Number(pos?.y || 0);
    if (Array.isArray(scannedSystemEntries) && scannedSystemEntries.length > 1) {
      const wanted = findScannedSystemIndexByY(y0);
      if (wanted >= 0 && wanted !== activeScannedSystemIndex) {
        const loaded = await loadScannedSystemEntry(
          scannedSystemEntries[wanted],
          wanted + 1,
          scannedSystemEntries.length,
          false
        );
        if (!loaded) return false;
      }
    }

    const player = window._activeMidiPlayer;
    if (!player || typeof player.skipToTick !== 'function') return false;
    const anchor = getActiveRect() || { x: 0, y: 0, w: source.width, h: source.height };
    const x = Math.max(anchor.x, Math.min(anchor.x + anchor.w, Number(pos?.x || anchor.x)));
    const y = Number(pos?.y || anchor.y);

    let targetTick = null;
    const mapped = (Array.isArray(playbackNoteMap) ? playbackNoteMap : [])
      .filter((n) => Number.isFinite(Number(n.startTick)) && Number.isFinite(Number(n.endTick)));
    if (mapped.length) {
      let candidates = mapped;
      if (Array.isArray(playbackSystems) && playbackSystems.length > 1) {
        let sysIdx = 0;
        let bestDist = Number.POSITIVE_INFINITY;
        for (let i = 0; i < playbackSystems.length; i++) {
          const s = playbackSystems[i];
          const cy = Number(s.y || 0) + Number(s.h || 0) * 0.5;
          const d = Math.abs(y - cy);
          if (d < bestDist) {
            bestDist = d;
            sysIdx = i;
          }
        }
        const sys = playbackSystems[sysIdx];
        const top = Number(sys.y || 0) - 8;
        const bottom = Number(sys.y || 0) + Number(sys.h || 0) + 8;
        const sysNotes = mapped.filter((n) => {
          const cy = Number(n.y || 0) + Number(n.h || 0) * 0.5;
          return cy >= top && cy <= bottom;
        });
        if (sysNotes.length) candidates = sysNotes;
      }

      let best = null;
      let bestScore = Number.POSITIVE_INFINITY;
      for (let i = 0; i < candidates.length; i++) {
        const n = candidates[i];
        const cx = Number(n.x || 0) + Number(n.w || 0) * 0.5;
        const cy = Number(n.y || 0) + Number(n.h || 0) * 0.5;
        const dx = Math.abs(cx - x);
        const dy = Math.abs(cy - y);
        const score = dx + dy * 0.35;
        if (score < bestScore) {
          bestScore = score;
          best = n;
        }
      }
      if (best) targetTick = Math.max(0, Number(best.startTick || 0));
    }

    if (!Number.isFinite(targetTick)) {
      const total = Math.max(1, Number(player.totalTicks || playbackTotalTicks || 1));
      const startTick = Number.isFinite(playbackAudibleStartTick) ? Number(playbackAudibleStartTick) : 0;
      const endTick = Number.isFinite(playbackAudibleEndTick) ? Number(playbackAudibleEndTick) : total;
      const pct = Math.max(0, Math.min(1, (x - anchor.x) / Math.max(1, anchor.w)));
      targetTick = Math.round(startTick + pct * Math.max(1, endTick - startTick));
    }

    const total = Math.max(1, Number(player.totalTicks || playbackTotalTicks || 1));
    targetTick = Math.max(0, Math.min(total, Math.round(targetTick)));
    try {
      if (window.Tone?.start) await window.Tone.start();
      if (typeof player.stop === 'function') player.stop();
      player.skipToTick(targetTick);
      if (autoplay && typeof player.play === 'function') player.play();
      drawPlaybackHighlight(targetTick, total);
      setStatus(autoplay ? `Jumped to tick ${targetTick}.` : `Set position to tick ${targetTick}. Press Play.`);
      return true;
    } catch (e) {
      console.warn('Seek from canvas failed:', e);
      return false;
    }
  }

  function startDrag(evt) {
    if (!imgReady) return;
    const pos = getPos(evt);
    if (!pos) return;
    dragging = true;
    start = pos;
    drawRect(start.x, start.y, 1, 1);
  }

  function moveDrag(evt) {
    if (!dragging || !start) return;
    const pos = getPos(evt);
    if (!pos) return;
    const x = Math.min(start.x, pos.x);
    const y = Math.min(start.y, pos.y);
    const w = Math.abs(pos.x - start.x);
    const h = Math.abs(pos.y - start.y);
    drawRect(x, y, w, h);
  }

  async function endDrag(evt) {
    if (!dragging || !start) return;
    dragging = false;
    const pos = getPos(evt);
    if (!pos) {
      start = null;
      return;
    }
    const dragStart = start;
    start = null;
    const x = Math.min(dragStart.x, pos.x);
    const y = Math.min(dragStart.y, pos.y);
    const w = Math.abs(pos.x - dragStart.x);
    const h = Math.abs(pos.y - dragStart.y);
    if (w < 12 || h < 12) {
      if (await seekPlaybackFromCanvasPos(pos, false)) return;
      clearSelection();
      return;
    }
    selection = { x, y, w, h };
    detectPlaybackSystems();
    const hint = h < 150 ? ' | tip: include full two-staff height for better OMR' : '';
    const sys = playbackSystems.length ? ` | systems:${playbackSystems.length}` : '';
    selInfo.textContent = `x:${x.toFixed(1)} y:${y.toFixed(1)} w:${w.toFixed(1)} h:${h.toFixed(1)}${sys}${hint}`;
    updateInstantScanPreview();
  }

  const wrap = document.getElementById('canvasWrap');
  wrap.addEventListener('mousedown', startDrag);
  wrap.addEventListener('mousemove', moveDrag);
  wrap.addEventListener('mouseup', endDrag);
  wrap.addEventListener('mouseleave', (e) => { if (dragging) endDrag(e); });
  wrap.addEventListener('touchstart', (e) => { startDrag(e); e.preventDefault(); }, { passive: false });
  wrap.addEventListener('touchmove', (e) => { moveDrag(e); e.preventDefault(); }, { passive: false });
  wrap.addEventListener('touchend', (e) => { endDrag(e); e.preventDefault(); }, { passive: false });

  document.getElementById('clearBtn').addEventListener('click', clearSelection);
  document.getElementById('fitBtn').addEventListener('click', () => {
    source.style.width = '100%';
    source.style.height = 'auto';
    resizeOverlay();
  });

  async function canvasToBlob(canvas, type = 'image/png', quality = 0.92) {
    return new Promise((resolve) => canvas.toBlob(resolve, type, quality));
  }
  function applyOmrPresetToCrop(off, offCtx, srcRect, factor, preferSpeed) {
    const preset = String(omrPreset?.value || 'normal');
    if (preset === 'normal') return;

    const sx = Number(srcRect?.x || 0);
    const sy = Number(srcRect?.y || 0);
    const sw = Number(srcRect?.w || 0);
    const sh = Number(srcRect?.h || 0);

    // Fast lyric-safe mode: white out lower text-heavy band under staff.
    try {
      const band = estimatePitchBandFromStaffLines({ x: sx, y: sy, w: sw, h: sh });
      if (band && Number.isFinite(Number(band.yBottom))) {
        const interline = Math.max(4, Number(band.interline || 6));
        // Keep enough space for lower voice notes/stems; only remove deeper lyric band.
        const localCutY = Number(band.yBottom) - sy + interline * 3.8;
        const minCutByHeight = sh * (preset === 'lyric-safe-plus' ? 0.64 : 0.70);
        const cutY = Math.max(0, Math.min(sh - 1, Math.max(localCutY, minCutByHeight)));
        const cutYScaled = Math.max(0, Math.min(off.height, Math.floor(cutY * factor)));
        if (cutYScaled < off.height - 2) {
          offCtx.save();
          offCtx.fillStyle = '#ffffff';
          offCtx.fillRect(0, cutYScaled, off.width, off.height - cutYScaled);
          offCtx.restore();
        }
      }
    } catch {}

    // Optional extra cleanup; still single-pass and lightweight.
    if (preset === 'lyric-safe-plus') {
      try {
        const img = offCtx.getImageData(0, 0, off.width, off.height);
        const d = img.data;
        const blackTh = preferSpeed ? 122 : 132;
        const whiteTh = preferSpeed ? 228 : 236;
        for (let i = 0; i < d.length; i += 4) {
          const lum = 0.2126 * d[i] + 0.7152 * d[i + 1] + 0.0722 * d[i + 2];
          let v = lum;
          if (lum <= blackTh) v = 0;
          else if (lum >= whiteTh) v = 255;
          d[i] = v; d[i + 1] = v; d[i + 2] = v;
        }
        offCtx.putImageData(img, 0, 0);
      } catch {}
    }
  }

  async function cropRect(rect, factorOverride = null, preferSpeed = false) {
    if (!rect) return null;
    const { x, y, w, h } = rect;
    const uiFactor = Math.max(1, parseInt(upscaleFactor.value || '1', 10));
    const factor = Math.max(1, parseInt(factorOverride || uiFactor, 10));
    const pad = preferSpeed ? 6 : Math.max(8, Math.round(Math.min(w, h) * 0.04));
    const sx = Math.max(0, Math.floor(x - pad));
    const sy = Math.max(0, Math.floor(y - pad));
    const sw = Math.min(source.width - sx, Math.ceil(w + pad * 2));
    const sh = Math.min(source.height - sy, Math.ceil(h + pad * 2));
    const off = document.createElement('canvas');
    off.width = Math.max(1, Math.floor(sw * factor));
    off.height = Math.max(1, Math.floor(sh * factor));
    const offCtx = off.getContext('2d');
    offCtx.imageSmoothingEnabled = false;
    offCtx.drawImage(source, sx, sy, sw, sh, 0, 0, off.width, off.height);
    applyOmrPresetToCrop(off, offCtx, { x: sx, y: sy, w: sw, h: sh }, factor, preferSpeed);
    if (IGNORE_LYRICS_IN_CROP) {
      try {
        const band = estimatePitchBandFromStaffLines({ x: sx, y: sy, w: sw, h: sh });
        if (band && Number.isFinite(Number(band.yBottom))) {
          const interline = Math.max(4, Number(band.interline || 6));
          const localCutY = Number(band.yBottom) - sy + interline * 1.3;
          const cutY = Math.max(0, Math.min(sh - 1, localCutY));
          const cutYScaled = Math.max(0, Math.min(off.height, Math.floor(cutY * factor)));
          if (cutYScaled < off.height - 2) {
            offCtx.save();
            offCtx.fillStyle = '#ffffff';
            offCtx.fillRect(0, cutYScaled, off.width, off.height - cutYScaled);
            offCtx.restore();
          }
        }
      } catch {}
    }

    // Keep sharp notation edges when possible; only move to JPEG when payload is too large.
    let blob = await canvasToBlob(off, 'image/png');
    if (!blob) return null;
    if (blob.size <= MAX_OMR_UPLOAD_BYTES) return blob;

    let quality = preferSpeed ? 0.78 : 0.92;
    blob = await canvasToBlob(off, 'image/jpeg', quality);
    if (!blob) return null;

    // If payload is too large for nginx defaults, progressively shrink quality/size.
    let attempts = 0;
    while (blob.size > MAX_OMR_UPLOAD_BYTES && attempts < (preferSpeed ? 4 : 7)) {
      attempts += 1;
      quality = Math.max(0.45, quality - (preferSpeed ? 0.1 : 0.08));

      const scaled = document.createElement('canvas');
      const scale = blob.size > 2 * MAX_OMR_UPLOAD_BYTES ? (preferSpeed ? 0.7 : 0.75) : (preferSpeed ? 0.84 : 0.88);
      scaled.width = Math.max(1, Math.floor(off.width * scale));
      scaled.height = Math.max(1, Math.floor(off.height * scale));
      const sctx = scaled.getContext('2d');
      sctx.imageSmoothingEnabled = true;
      sctx.drawImage(off, 0, 0, off.width, off.height, 0, 0, scaled.width, scaled.height);

      off.width = scaled.width;
      off.height = scaled.height;
      offCtx.clearRect(0, 0, off.width, off.height);
      offCtx.drawImage(scaled, 0, 0);
      blob = await canvasToBlob(off, 'image/jpeg', quality);
      if (!blob) return null;
    }

    if (blob.size > MAX_OMR_UPLOAD_BYTES) {
      writeLog('Selection still too large after compression. Select a smaller area or lower upscale.');
      return null;
    }

    return blob;
  }

  async function cropSelection(factorOverride = null, preferSpeed = false) {
    if (!selection) return null;
    return cropRect(selection, factorOverride, preferSpeed);
  }

  async function runOmrRequest(blob, force4Enabled) {
    const formData = new FormData();
    formData.append('image', blob, 'region.png');
    formData.append('mock', mockToggle.checked ? '1' : '0');
    formData.append('force4', force4Enabled ? '1' : '0');

    const res = await fetch('/api/omr_extract_omr4all.php', { method: 'POST', body: formData });
    if (res.status === 413) {
      return { ok: false, hard: true, message: 'OMR error: upload too large (413). Try smaller selection or set upscale to 1x.' };
    }

    const raw = await res.text();
    if (!res.ok) {
      const trimmed = (raw || '').trim();
      if (res.status === 500 && !trimmed) {
        return {
          ok: false,
          message: 'OMR error: backend failed before returning JSON (likely timeout or process crash).'
        };
      }
      return {
        ok: false,
        message: `OMR error HTTP ${res.status}.\n\n${trimmed.slice(0, 2000) || '(empty response)'}`
      };
    }

    let data = null;
    try {
      data = JSON.parse(raw);
    } catch (e) {
      return { ok: false, hard: true, message: 'OMR error: invalid JSON response.\n\n' + raw.slice(0, 2000) };
    }

    if (data.status !== 'ok') {
      const detail = data.detail || data.log || '';
      const msg = (data.error || 'OMR error') + (detail ? `\n\n${detail}` : '');
      return { ok: false, message: msg, data };
    }

    return { ok: true, data };
  }

  function clearPlaybackHighlight() {
    poctx.clearRect(0, 0, playOverlay.width, playOverlay.height);
  }

  function startScanAnimation(rect) {
    if (!rect) return;
    stopScanAnimation();
    scanAnimRect = { ...rect };
    scanAnimStart = performance.now();
    const loop = (ts) => {
      if (!scanAnimRect) return;
      const r = scanAnimRect;
      const durationMs = 1600;
      const t = ((ts - scanAnimStart) % durationMs) / durationMs;
      const y = r.y + r.h * t;
      poctx.clearRect(0, 0, playOverlay.width, playOverlay.height);
      const topBand = toDisplayRect(r.x, y - Math.max(4, r.h * 0.018), r.w, Math.max(6, r.h * 0.04));
      const line = toDisplayRect(r.x, y, r.w, 0);
      poctx.save();
      poctx.fillStyle = 'rgba(20, 120, 220, 0.10)';
      poctx.fillRect(topBand.x, topBand.y, topBand.w, topBand.h);
      poctx.strokeStyle = 'rgba(20, 120, 220, 0.95)';
      poctx.lineWidth = 2;
      poctx.beginPath();
      poctx.moveTo(line.x, line.y);
      poctx.lineTo(line.x + line.w, line.y);
      poctx.stroke();
      poctx.restore();
      scanAnimFrame = requestAnimationFrame(loop);
    };
    scanAnimFrame = requestAnimationFrame(loop);
  }

  function stopScanAnimation() {
    if (scanAnimFrame) {
      cancelAnimationFrame(scanAnimFrame);
      scanAnimFrame = null;
    }
    scanAnimRect = null;
    poctx.clearRect(0, 0, playOverlay.width, playOverlay.height);
  }

  function resetAutoSplitPlaybackQueue() {
    autoSplitPlaybackQueue = [];
    autoSplitPlaybackActive = false;
    autoSplitPlaybackTransitioning = false;
    autoSplitWasPlaying = false;
    manualSystemChainActive = false;
  }

  function findScannedSystemIndexByY(y) {
    if (!Array.isArray(scannedSystemEntries) || !scannedSystemEntries.length) return -1;
    const yy = Number(y || 0);
    let insideIdx = -1;
    let bestIdx = 0;
    let bestDist = Number.POSITIVE_INFINITY;
    for (let i = 0; i < scannedSystemEntries.length; i++) {
      const rect = scannedSystemEntries[i]?.rect;
      if (!rect) continue;
      const top = Number(rect.y || 0);
      const bottom = top + Number(rect.h || 0);
      if (yy >= top && yy <= bottom) {
        insideIdx = i;
        break;
      }
      const cy = top + Number(rect.h || 0) * 0.5;
      const d = Math.abs(yy - cy);
      if (d < bestDist) {
        bestDist = d;
        bestIdx = i;
      }
    }
    return insideIdx >= 0 ? insideIdx : bestIdx;
  }

  async function loadScannedSystemEntry(entry, index = 1, total = 1, autoplay = false) {
    if (!entry || !entry.data || !entry.rect) return false;
    activeOmrRect = entry.rect;
    playbackSystems = [{ ...entry.rect }];
    playbackVisualCache = null;
    activeScannedSystemIndex = Math.max(0, Number(index) - 1);

    let musicXmlNodes = Array.isArray(entry.musicXmlNodes) ? entry.musicXmlNodes : [];
    if (!musicXmlNodes.length && entry.data.musicXmlUrl) {
      musicXmlNodes = await buildMusicXmlNodeMap(entry.data.musicXmlUrl, entry.rect);
      entry.musicXmlNodes = musicXmlNodes;
    }

    const safeName = `omr-system-${index}-of-${total}.mid`;
    if (entry.data.midiUrl) {
      await playMidiUrl(entry.data.midiUrl, entry.data.midiName || safeName, musicXmlNodes);
    } else if (entry.data.midiBase64) {
      await playMidiFromBase64(entry.data.midiBase64, entry.data.midiName || safeName, musicXmlNodes);
    } else {
      return false;
    }

    const p = window._activeMidiPlayer;
    if (p) {
      if (!autoplay) {
        if (typeof p.pause === 'function') p.pause();
        else if (typeof p.stop === 'function') p.stop();
        drawPlaybackHighlight(0, Number(p.totalTicks || playbackTotalTicks || 1));
      } else if (playbackHasAudibleNotes && typeof p.play === 'function') {
        if (window.Tone?.start) await window.Tone.start();
        const startTick = Math.max(0, Number(playbackAudibleStartTick || 0));
        const hardRestart = () => {
          try {
            if (typeof p.stop === 'function') p.stop();
            if (typeof p.skipToTick === 'function') p.skipToTick(startTick);
            p.play();
          } catch {}
        };
        // Force stop/start cycle on handoff (same behavior as manual fix).
        hardRestart();
        // Retry once when the player doesn't transition to audible playback immediately.
        setTimeout(() => {
          try {
            const active = window._activeMidiPlayer;
            if (active && typeof active.play === 'function') {
              if (typeof active.stop === 'function') active.stop();
              if (typeof active.skipToTick === 'function') active.skipToTick(startTick);
              active.play();
            }
          } catch {}
        }, 140);
      }
    }
    return true;
  }

  async function playAutoSplitQueueEntry(entry, total = 1, position = 1) {
    if (!entry || !entry.data || !entry.rect) return;
    activeOmrRect = entry.rect;
    playbackSystems = [{ ...entry.rect }];
    playbackVisualCache = null;

    let musicXmlNodes = Array.isArray(entry.musicXmlNodes) ? entry.musicXmlNodes : [];
    if (!musicXmlNodes.length && entry.data.musicXmlUrl) {
      musicXmlNodes = await buildMusicXmlNodeMap(entry.data.musicXmlUrl, entry.rect);
      entry.musicXmlNodes = musicXmlNodes;
    }

    const label = `system ${position}/${total}`;
    const safeName = `omr-system-${position}-of-${total}.mid`;
    if (entry.data.midiUrl) {
      await playMidiUrl(entry.data.midiUrl, entry.data.midiName || safeName, musicXmlNodes);
      writeLog(`Playing ${label}.`);
      setStatus(`Playing ${label}…`);
      return;
    }
    if (entry.data.midiBase64) {
      await playMidiFromBase64(entry.data.midiBase64, entry.data.midiName || safeName, musicXmlNodes);
      writeLog(`Playing ${label}.`);
      setStatus(`Playing ${label}…`);
      return;
    }
    writeLog(`${label}: no MIDI output.`);
  }

  async function advanceAutoSplitPlayback(reason = 'event') {
    if (!autoSplitPlaybackActive || autoSplitPlaybackTransitioning) return;
    autoSplitPlaybackTransitioning = true;
    try {
      const next = autoSplitPlaybackQueue.shift();
      if (!next) {
        resetAutoSplitPlaybackQueue();
        setStatus('Done.');
        return;
      }
      const total = Number(next.total || 1);
      const index = Number(next.index || 1);
      await playAutoSplitQueueEntry(next, total, index);
      autoSplitWasPlaying = false;
    } catch (e) {
      console.error(e);
      writeLog(`Auto-split handoff failed (${reason}): ${e.message}`);
      setStatus('');
      resetAutoSplitPlaybackQueue();
    } finally {
      autoSplitPlaybackTransitioning = false;
    }
  }

  function getActiveRect() {
    return activeOmrRect || selection;
  }

  function updateNodeInfo() {
    const rect = getActiveRect();
    if (!rect || (!playbackNoteMap.length && !instantNoteDots.length)) {
      nodeInfo.textContent = 'No note-node map yet.';
      return;
    }
    const mode = String(playbackNoteMap[0]?.mapSource || '');
    let source = 'MIDI-approx';
    if (mode === 'xml') source = 'MusicXML+MIDI';
    else if (mode === 'scan') source = 'ImageScan+MIDI';
    else if (mode === 'exact-scan') source = 'ExactScan+MIDI';
    else if (!playbackNoteMap.length && instantNoteDots.length) source = 'InstantScan';
    else if (xmlNoteNodes.length) source = 'MusicXML+MIDI';
    const count = playbackNoteMap.length || instantNoteDots.length;
    nodeInfo.textContent = `source:${source} | notes:${count} | rect x:${rect.x.toFixed(1)} y:${rect.y.toFixed(1)} w:${rect.w.toFixed(1)} h:${rect.h.toFixed(1)}`;
  }

  function updateNoteLocationInfo() {
    const rect = getActiveRect();
    const sourceNotes = (Array.isArray(playbackNoteMap) && playbackNoteMap.length)
      ? playbackNoteMap
      : (Array.isArray(instantNoteDots) ? instantNoteDots : []);
    if (!rect || sourceNotes.length === 0) {
      noteLocInfo.textContent = 'No note locations yet.';
      noteLocationPayload = [];
      return;
    }
    noteLocationPayload = sourceNotes.map((n, i) => {
      const cx = Number(n.x || 0) + Number(n.w || 0) / 2;
      const cy = Number(n.y || 0) + Number(n.h || 0) / 2;
      const nx = rect.w > 0 ? (cx - rect.x) / rect.w : 0;
      const ny = rect.h > 0 ? (cy - rect.y) / rect.h : 0;
      return {
        index: i + 1,
        startTick: Number.isFinite(Number(n.startTick)) ? Math.round(Number(n.startTick)) : null,
        endTick: Number.isFinite(Number(n.endTick)) ? Math.round(Number(n.endTick)) : null,
        x: Number(cx.toFixed(2)),
        y: Number(cy.toFixed(2)),
        nx: Number(nx.toFixed(6)),
        ny: Number(ny.toFixed(6)),
        w: Number((Number(n.w || 0)).toFixed(2)),
        h: Number((Number(n.h || 0)).toFixed(2)),
        noteNumber: Number(n.noteNumber || 0),
        channel: Number(n.channel || 0),
        source: String(n.mapSource || '')
      };
    });
    const lines = noteLocationPayload.map((n) => {
      const tickPart = (n.startTick !== null && n.endTick !== null) ? ` tick:${n.startTick}-${n.endTick}` : '';
      return `${String(n.index).padStart(3, '0')}${tickPart} x:${n.x.toFixed(1)} y:${n.y.toFixed(1)} nx:${n.nx.toFixed(4)} ny:${n.ny.toFixed(4)}`;
    });
    noteLocInfo.textContent = lines.join('\n');
  }

  copyNoteLocBtn.addEventListener('click', async () => {
    if (!Array.isArray(noteLocationPayload) || noteLocationPayload.length === 0) {
      setStatus('No note locations to copy.');
      return;
    }
    const rect = getActiveRect();
    const payload = {
      rect: rect ? {
        x: Number(rect.x.toFixed(2)),
        y: Number(rect.y.toFixed(2)),
        w: Number(rect.w.toFixed(2)),
        h: Number(rect.h.toFixed(2))
      } : null,
      notes: noteLocationPayload
    };
    try {
      await navigator.clipboard.writeText(JSON.stringify(payload, null, 2));
      setStatus(`Copied ${noteLocationPayload.length} note locations.`);
    } catch (e) {
      setStatus('Clipboard copy failed.');
      console.warn('Copy note locations failed:', e);
    }
  });

  // MusicXML button handlers are bound in bindMusicXmlButtons().

  function drawNodeOverlay(tick = null) {
    if (!noteOverlayToggle.checked) return;
    const notes = (Array.isArray(playbackNoteMap) && playbackNoteMap.length)
      ? playbackNoteMap
      : (Array.isArray(instantNoteDots) ? instantNoteDots : []);
    if (!notes.length) return;
    const limit = Math.min(notes.length, 1600);
    const active = [];
    if (Array.isArray(playbackNoteMap) && playbackNoteMap.length && typeof tick === 'number') {
      for (let i = 0; i < limit; i++) {
        const n = notes[i];
        if (tick >= n.startTick && tick <= n.endTick) active.push(n);
      }
    }
    poctx.save();
    const dotOnly = !!dotOnlyToggle?.checked;
    if (!dotOnly) {
      poctx.lineWidth = 1;
      poctx.strokeStyle = 'rgba(0, 120, 210, 0.55)';
      poctx.fillStyle = 'rgba(0, 120, 210, 0.10)';
      for (let i = 0; i < limit; i++) {
        const n = notes[i];
        const r = toDisplayRect(n.x, n.y, n.w, n.h);
        poctx.fillRect(r.x, r.y, r.w, r.h);
        poctx.strokeRect(r.x, r.y, r.w, r.h);
      }
    }
    if (noteVisualToggle.checked) {
      const drawTags = limit <= 90;
      const scale = playOverlay.width > 0 && source.width > 0 ? (playOverlay.width / source.width) : 1;
      poctx.fillStyle = 'rgba(215, 38, 38, 0.95)';
      poctx.strokeStyle = 'rgba(215, 38, 38, 0.95)';
      poctx.font = `${Math.max(8, Math.min(11, Math.round(scale * 10)))}px monospace`;
      for (let i = 0; i < limit; i++) {
        const n = notes[i];
        const r = toDisplayRect(n.x, n.y, n.w, n.h);
        const cx = r.x + r.w * 0.5;
        const cy = r.y + r.h * 0.5;
        poctx.beginPath();
        poctx.arc(cx, cy, Math.max(4, Math.min(9, scale * 6.5)), 0, Math.PI * 2);
        poctx.fill();
        if (drawTags) {
          const px = Number(n.x || 0) + Number(n.w || 0) / 2;
          const py = Number(n.y || 0) + Number(n.h || 0) / 2;
          poctx.fillText(`${i + 1} (${px.toFixed(0)},${py.toFixed(0)})`, cx + 3, cy - 3);
        }
      }
    }
    if (noteLabelToggle.checked) {
      poctx.fillStyle = 'rgba(0, 90, 165, 0.95)';
      poctx.font = `${Math.max(8, Math.min(12, Math.round((playOverlay.width / Math.max(1, source.width)) * 10)))}px monospace`;
      for (let i = 0; i < limit; i++) {
        const n = notes[i];
        const r = toDisplayRect(n.x, n.y, n.w, n.h);
        poctx.fillText(String(i + 1), r.x + r.w + 2, r.y + Math.max(8, r.h * 0.9));
      }
    }
    if (active.length) {
      poctx.strokeStyle = 'rgba(255, 100, 0, 0.95)';
      poctx.fillStyle = 'rgba(255, 100, 0, 0.30)';
      poctx.lineWidth = 2;
      active.slice(0, 24).forEach((n) => {
        const r = toDisplayRect(n.x, n.y, n.w, n.h);
        poctx.fillRect(r.x, r.y, r.w, r.h);
        poctx.strokeRect(r.x, r.y, r.w, r.h);
      });
    }
    poctx.restore();
  }

  function refreshOverlay() {
    const p = window._activeMidiPlayer;
    if (p && typeof p.isPlaying === 'function' && p.isPlaying()) return;
    clearPlaybackHighlight();
    drawNodeOverlay(null);
  }

  function enableVisualLocationOverlay() {
    if (noteOverlayToggle) noteOverlayToggle.checked = true;
    if (noteLabelToggle) noteLabelToggle.checked = true;
    if (noteVisualToggle) noteVisualToggle.checked = true;
  }

  function updateInstantScanPreview() {
    if (!selection || !imgReady) {
      instantNoteDots = [];
      return;
    }
    const scanned = scanNoteHeadLocations(selection) || [];
    instantNoteDots = scanned.map((n) => ({ ...n, mapSource: 'instant-scan' }));
    updateNodeInfo();
    updateNoteLocationInfo();
    enableVisualLocationOverlay();
    refreshOverlay();
  }

  noteOverlayToggle.addEventListener('change', refreshOverlay);
  dotOnlyToggle.addEventListener('change', refreshOverlay);
  noteLabelToggle.addEventListener('change', refreshOverlay);
  noteVisualToggle.addEventListener('change', refreshOverlay);
  autoSplitToggle.addEventListener('change', refreshSystemPreview);
  omrPreset?.addEventListener('change', () => {
    updateDebug();
    setStatus(`OMR preset set to ${String(omrPreset.value || 'normal')}.`);
  });
  force4Toggle.addEventListener('change', refreshSystemPreview);

  function toDisplayRect(x, y, w = 0, h = 0) {
    const rect = source.getBoundingClientRect();
    const sx = rect.width > 0 ? playOverlay.width / source.width : 1;
    const sy = rect.height > 0 ? playOverlay.height / source.height : 1;
    return {
      x: x * sx,
      y: y * sy,
      w: w * sx,
      h: h * sy
    };
  }

  function detectSystemsInRect(rect) {
    if (!rect) return [];
    const sx = Math.max(0, Math.floor(rect.x));
    const sy = Math.max(0, Math.floor(rect.y));
    const sw = Math.max(1, Math.floor(rect.w));
    const sh = Math.max(1, Math.floor(rect.h));
    const img = ctx.getImageData(sx, sy, sw, sh).data;
    const density = new Array(sh).fill(0);
    const rowRun = new Array(sh).fill(0);

    for (let row = 0; row < sh; row++) {
      let dark = 0;
      let run = 0;
      let maxRun = 0;
      const rowOffset = row * sw * 4;
      for (let col = 0; col < sw; col++) {
        const i = rowOffset + col * 4;
        const r = img[i], g = img[i + 1], b = img[i + 2];
        const lum = 0.2126 * r + 0.7152 * g + 0.0722 * b;
        if (lum < 145) {
          dark++;
          run++;
          if (run > maxRun) maxRun = run;
        } else {
          run = 0;
        }
      }
      density[row] = dark / sw;
      rowRun[row] = maxRun / sw;
    }
    const mean = density.reduce((s, v) => s + v, 0) / density.length;
    const variance = density.reduce((s, v) => s + ((v - mean) ** 2), 0) / density.length;
    const std = Math.sqrt(variance);
    const lineThreshold = Math.max(0.03, mean + std * 0.8);

    // Candidate staff-line rows.
    const lineRuns = [];
    let runStart = -1;
    for (let i = 0; i < sh; i++) {
      const on = density[i] >= lineThreshold && rowRun[i] >= 0.40;
      if (on && runStart === -1) runStart = i;
      if (!on && runStart !== -1) {
        lineRuns.push({ y0: runStart, y1: i - 1 });
        runStart = -1;
      }
    }
    if (runStart !== -1) lineRuns.push({ y0: runStart, y1: sh - 1 });
    const lineCenters = lineRuns.map((r) => Math.round((r.y0 + r.y1) / 2));

    if (lineCenters.length < 5) {
      return [{ x: sx, y: sy, w: sw, h: sh }];
    }

    // Estimate interline distance from nearby staff-line gaps.
    const diffs = [];
    for (let i = 1; i < lineCenters.length; i++) {
      const d = lineCenters[i] - lineCenters[i - 1];
      if (d >= 2 && d <= 30) diffs.push(d);
    }
    diffs.sort((a, b) => a - b);
    const interline = diffs.length ? diffs[Math.floor(diffs.length / 2)] : 7;

    // Build true 5-line staff candidates first.
    const staffs = [];
    const tol = Math.max(1, interline * 0.55);
    for (let i = 0; i + 4 < lineCenters.length; i++) {
      const g = lineCenters.slice(i, i + 5);
      const gaps = [g[1] - g[0], g[2] - g[1], g[3] - g[2], g[4] - g[3]];
      const meanGap = gaps.reduce((s, v) => s + v, 0) / 4;
      const stable = gaps.every((d) => d >= interline * 0.45 && d <= interline * 1.9)
        && gaps.every((d) => Math.abs(d - meanGap) <= tol);
      if (!stable) continue;

      const center = Math.round((g[0] + g[4]) / 2);
      const last = staffs[staffs.length - 1];
      if (last && Math.abs(center - last.center) <= interline * 0.9) continue;
      staffs.push({
        top: g[0] - Math.round(interline * 1.25),
        bottom: g[4] + Math.round(interline * 1.25),
        center
      });
    }

    if (!staffs.length) {
      return [{ x: sx, y: sy, w: sw, h: sh }];
    }

    // Adaptive merge: supports varying numbers of staves per line in the same page.
    staffs.sort((a, b) => a.center - b.center);
    const gaps = [];
    for (let i = 0; i + 1 < staffs.length; i++) {
      gaps.push(Math.max(0, staffs[i + 1].top - staffs[i].bottom));
    }
    const sortedGaps = [...gaps].sort((a, b) => a - b);
    const medianGap = sortedGaps.length ? sortedGaps[Math.floor(sortedGaps.length / 2)] : Math.round(interline * 2.5);
    let mergeGap = Math.max(Math.round(interline * 2.0), Math.round(medianGap * 1.35));
    if (sortedGaps.length >= 2) {
      // 1D k-means (k=2) on inter-staff gaps: small cluster = within-line,
      // large cluster = between-line. This is stable for 2-staff and mixed layouts.
      let c1 = sortedGaps[0];
      let c2 = sortedGaps[sortedGaps.length - 1];
      let a = [];
      let b = [];
      for (let it = 0; it < 8; it++) {
        a = [];
        b = [];
        for (let i = 0; i < sortedGaps.length; i++) {
          const g = sortedGaps[i];
          if (Math.abs(g - c1) <= Math.abs(g - c2)) a.push(g);
          else b.push(g);
        }
        if (!a.length || !b.length) break;
        c1 = a.reduce((s, v) => s + v, 0) / a.length;
        c2 = b.reduce((s, v) => s + v, 0) / b.length;
      }
      if (a.length && b.length) {
        const low = (c1 <= c2) ? a : b;
        const high = (c1 <= c2) ? b : a;
        const lowMax = Math.max(...low);
        const highMin = Math.min(...high);
        const lowMean = low.reduce((s, v) => s + v, 0) / low.length;
        const highMean = high.reduce((s, v) => s + v, 0) / high.length;
        if (highMean > lowMean * 1.28 && highMin > lowMax) {
          mergeGap = Math.round((lowMax + highMin) * 0.5);
        } else {
          mergeGap = Math.max(Math.round(interline * 2.0), Math.round(medianGap * 1.45));
        }
      }
    }
    // Keep merge threshold conservative so separate lines never collapse into one system.
    mergeGap = Math.max(Math.round(interline * 1.8), Math.min(Math.round(interline * 9.0), mergeGap));
    const systems = [];
    let s = 0;
    while (s < staffs.length) {
      const top = staffs[s].top;
      let bottom = staffs[s].bottom;
      let e = s;
      while (e + 1 < staffs.length) {
        const gap = staffs[e + 1].top - staffs[e].bottom;
        if (gap > mergeGap) break;
        e += 1;
        bottom = staffs[e].bottom;
      }
      systems.push({
        x: sx,
        y: sy + Math.max(0, top),
        w: sw,
        h: Math.min(sh - 1, bottom) - Math.max(0, top),
        _count: (e - s + 1)
      });
      s = e + 1;
    }

    // SATB/grand-staff rescue: if a musical line was split into two 2-staff blocks,
    // merge adjacent pairs into a single 4-staff system.
    const satbMode = !!force4Toggle?.checked;
    const mostlyTwoStaff = systems.length >= 2 && systems.filter((r) => Number(r._count || 0) === 2).length >= Math.ceil(systems.length * 0.66);
    let normalized = systems;
    if (satbMode || mostlyTwoStaff) {
      const merged = [];
      for (let i = 0; i < systems.length; i++) {
        const a = systems[i];
        const b = systems[i + 1];
        const aCount = Number(a?._count || 0);
        const bCount = Number(b?._count || 0);
        if (b && aCount === 2 && bCount === 2) {
          const aTop = Number(a.y || sy);
          const aBottom = aTop + Number(a.h || 0);
          const bTop = Number(b.y || sy);
          const aH = Math.max(1, Number(a.h || 1));
          const bH = Math.max(1, Number(b.h || 1));
          const gap = bTop - aBottom;
          const closeGap = gap >= 0 && gap <= Math.max(interline * 3.8, 20);
          const similarHeights = Math.abs(aH - bH) <= Math.max(interline * 2.5, Math.min(aH, bH) * 0.35);
          const mergedH = Math.max(aBottom, bTop + Number(b.h || 0)) - Math.min(aTop, bTop);
          const plausibleFourStaffHeight = mergedH <= Math.max(interline * 22, (aH + bH) * 1.35);
          if (closeGap && similarHeights && plausibleFourStaffHeight) {
            merged.push({
              x: sx,
              y: Math.min(aTop, bTop),
              w: sw,
              h: Math.max(aBottom, bTop + Number(b.h || 0)) - Math.min(aTop, bTop),
              _count: 4
            });
            i += 1;
            continue;
          }
        }
        merged.push(a);
      }
      normalized = merged;
    }

    // Merge residual fragments that belong to the same visual line.
    // This catches cases where one line (e.g., SATB split) is over-segmented
    // into multiple adjacent blocks with the same horizontal span.
    const mergeNearbySystemFragments = (systems) => {
      const src = (Array.isArray(systems) ? systems : [])
        .filter((r) => r && Number.isFinite(r.y) && Number.isFinite(r.h) && Number.isFinite(r.x) && Number.isFinite(r.w) && r.h > 2 && r.w > 2)
        .sort((a, b) => Number(a.y || 0) - Number(b.y || 0));
      if (src.length < 2) return src;

      const merged = [Object.assign({}, src[0])];
      for (let i = 1; i < src.length; i++) {
        const cur = Object.assign({}, src[i]);
        const prev = merged[merged.length - 1];

        const prevTop = Number(prev.y || 0);
        const prevBottom = prevTop + Number(prev.h || 0);
        const curTop = Number(cur.y || 0);
        const curBottom = curTop + Number(cur.h || 0);
        const gap = curTop - prevBottom;

        const prevLeft = Number(prev.x || 0);
        const prevRight = prevLeft + Number(prev.w || 0);
        const curLeft = Number(cur.x || 0);
        const curRight = curLeft + Number(cur.w || 0);
        const overlapW = Math.max(0, Math.min(prevRight, curRight) - Math.max(prevLeft, curLeft));
        const minW = Math.max(1, Math.min(Number(prev.w || 1), Number(cur.w || 1)));
        const overlapRatio = overlapW / minW;
        const centerDelta = Math.abs((prevLeft + prevRight) * 0.5 - (curLeft + curRight) * 0.5);
        const widthDelta = Math.abs(Number(prev.w || 0) - Number(cur.w || 0));

        const maxGap = Math.max(interline * 4.2, Math.min(Number(prev.h || 1), Number(cur.h || 1)) * 0.45);
        const minGap = -interline * 1.4;
        const xAligned = overlapRatio >= 0.72 || centerDelta <= Math.max(18, minW * 0.08);
        const wSimilar = widthDelta <= Math.max(24, minW * 0.16);

        if (gap >= minGap && gap <= maxGap && xAligned && wSimilar) {
          const top = Math.min(prevTop, curTop);
          const bottom = Math.max(prevBottom, curBottom);
          const left = Math.min(prevLeft, curLeft);
          const right = Math.max(prevRight, curRight);
          prev.x = left;
          prev.y = top;
          prev.w = Math.max(1, right - left);
          prev.h = Math.max(1, bottom - top);
          prev._count = Number(prev._count || 1) + Number(cur._count || 1);
        } else {
          merged.push(cur);
        }
      }

      return merged;
    };

    normalized = mergeNearbySystemFragments(normalized);

    const out = normalized
      .filter((b) => b.h > Math.max(20, interline * 2.8))
      .slice(0, 12);

    return out.length ? out : [{ x: sx, y: sy, w: sw, h: sh }];
  }

  function detectSystemsByWhitespace(rect) {
    if (!rect) return [];
    const sx = Math.max(0, Math.floor(rect.x));
    const sy = Math.max(0, Math.floor(rect.y));
    const sw = Math.max(1, Math.floor(rect.w));
    const sh = Math.max(1, Math.floor(rect.h));
    let img;
    try {
      img = ctx.getImageData(sx, sy, sw, sh).data;
    } catch {

      x: sx,
      y: sy + Math.max(0, b.y0),

  function detectSystemsByProjection(rect) {

    const sy = Math.max(0, Math.floor(rect.y));
    const sw = Math.max(1, Math.floor(rect.w));
    const sh = Math.max(1, Math.floor(rect.h));
    let img;
    try {
      img = ctx.getImageData(sx, sy, sw, sh).data;
    } catch {
      return [];
    }

      y: sy + b.y0,
      w: sw,

  function detectSystemsByLeftStrip(rect) {

      const start = y;
      let end = y;
      let valleyRun = 0;
      for (; y < sh; y++) {

        else valleyRun = 0;
        if (valleyRun >= minValleyRun) {

        }
        end = y;
      }

      y: sy + b.y0,

  function detectSystemsForAuto(rect) {
    const normalizeDetectedSystems = (systems) => {
      const src = (Array.isArray(systems) ? systems : [])
        .filter((r) => r && Number.isFinite(r.y) && Number.isFinite(r.h) && Number.isFinite(r.x) && Number.isFinite(r.w) && Number(r.h) > 8 && Number(r.w) > 8)
        .sort((a, b) => Number(a.y || 0) - Number(b.y || 0))
        .map((r) => ({ ...r }));
      if (src.length < 2) return src;

      const mergePass = (items, aggressive = false) => {
        if (!items.length) return items;
        const hs = items.map((r) => Math.max(1, Number(r.h || 1))).sort((a, b) => a - b);
        const medianH = hs[Math.floor(hs.length * 0.5)] || 1;
        const maxGap = aggressive ? Math.max(18, medianH * 1.4) : Math.max(14, medianH * 0.9);
        const minGap = -Math.max(6, medianH * 0.22);
        const out = [Object.assign({}, items[0])];
        for (let i = 1; i < items.length; i++) {
          const cur = Object.assign({}, items[i]);
          const prev = out[out.length - 1];
          const prevTop = Number(prev.y || 0);
          const prevBottom = prevTop + Number(prev.h || 0);
          const curTop = Number(cur.y || 0);
          const curBottom = curTop + Number(cur.h || 0);
          const gap = curTop - prevBottom;

          const prevLeft = Number(prev.x || 0);
          const prevRight = prevLeft + Number(prev.w || 0);
          const curLeft = Number(cur.x || 0);
          const curRight = curLeft + Number(cur.w || 0);
          const overlapW = Math.max(0, Math.min(prevRight, curRight) - Math.max(prevLeft, curLeft));
          const minW = Math.max(1, Math.min(Number(prev.w || 1), Number(cur.w || 1)));
          const overlapRatio = overlapW / minW;
          const widthDelta = Math.abs(Number(prev.w || 0) - Number(cur.w || 0));
          const xAligned = overlapRatio >= (aggressive ? 0.64 : 0.76);
          const wSimilar = widthDelta <= Math.max(20, minW * (aggressive ? 0.20 : 0.13));

          if (gap >= minGap && gap <= maxGap && xAligned && wSimilar) {
            const top = Math.min(prevTop, curTop);
            const bottom = Math.max(prevBottom, curBottom);
            const left = Math.min(prevLeft, curLeft);
            const right = Math.max(prevRight, curRight);
            prev.x = left;
            prev.y = top;
            prev.w = Math.max(1, right - left);
            prev.h = Math.max(1, bottom - top);
            prev._count = Number(prev._count || 1) + Number(cur._count || 1);
          } else {
            out.push(cur);
          }
        }
        return out;
      };

      let out = src;
      for (let i = 0; i < 2; i++) {
        const next = mergePass(out, false);
        if (next.length === out.length) break;
        out = next;
      }

      const rectH = Math.max(1, Number(rect?.h || 1));
      const hs2 = out.map((r) => Math.max(1, Number(r.h || 1))).sort((a, b) => a - b);
      const medianH2 = hs2[Math.floor(hs2.length * 0.5)] || 1;

    if (!byStaff.length) return normalizeDetectedSystems(byWhitespace);

      .filter((r) => r && Number.isFinite(r.y) && Number.isFinite(r.h) && r.h > 8)

      const src = (Array.isArray(systems) ? systems : [])
        .filter((r) => r && Number.isFinite(r.y) && Number.isFinite(r.h) && r.h > 8)
        .sort((a, b) => Number(a.y || 0) - Number(b.y || 0));

      const allSingleStaffLike = src.every((r) => Number(r._count || 1) <= 1);
      if (!allSingleStaffLike) return src;

      const hs = src.map((r) => Math.max(1, Number(r.h || 1))).sort((a, b) => a - b);
      const medianH = hs[Math.floor(hs.length * 0.5)] || 1;
