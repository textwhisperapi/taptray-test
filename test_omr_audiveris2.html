<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OMR Audiveris2 (Raw)</title>
  <link rel="stylesheet" href="/musicPanel.css" />
  <script src="/assets/pdf.min.js"></script>
  <script src="/assets/lucide.min.js"></script>
  <script src="/assets/Tone.min.js"></script>
  <script src="/assets/MidiPlayerJS-master/browser/midiplayer.js"></script>
  <script src="/assets/compactMidiPlayer.js?v=20260207piano15"></script>
  <style>
    body { font: 14px/1.4 Arial, sans-serif; margin: 16px; background: #f4f6f8; color: #111; }
    .card { max-width: 980px; margin: 0 auto; background: #fff; border: 1px solid #d8dee4; border-radius: 10px; padding: 14px; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    button { padding: 8px 12px; border: 1px solid #aaa; border-radius: 8px; background: #fff; cursor: pointer; }
    button.primary { background: #0b6bcb; border-color: #0b6bcb; color: #fff; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .log { margin-top: 10px; white-space: pre-wrap; background: #f8fafc; border: 1px solid #e5e7eb; border-radius: 8px; padding: 10px; min-height: 44px; }
    .links a { margin-right: 10px; }
    .player {
      margin-top: 12px;
      display: none;
      border: 1px dashed #d8dee4;
      border-radius: 8px;
      padding: 8px;
      background: #1e1e1e;
    }
    .player .musicPanel-item {
      max-width: 100%;
      width: 100%;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2 style="margin:0 0 8px;">Audiveris2 (Raw Default)</h2>
    <div>One-pass scan using engine <code>audiveris</code>. No custom MIDI rewrite.</div>
    <div class="row" style="margin-top:10px;">
      <input id="fileInput" type="file" accept=".pdf,image/*" />
      <button id="scanBtn" class="primary" disabled>Scan (Audiveris)</button>
      <button id="dumpBtn" disabled>Dump MIDI debug</button>
    </div>
    <div class="row" style="margin-top:8px;">
      <label><input id="trimStartToggle" type="checkbox" /> Trim leading silence for playback</label>
    </div>
    <div id="links" class="links" style="margin-top:10px;"></div>
    <div id="status" class="log">Waiting for file…</div>
    <div id="player" class="player"></div>
  </div>

  <script>
  pdfjsLib.GlobalWorkerOptions.workerSrc = '/assets/pdf.worker.min.js';

  const fileInput = document.getElementById('fileInput');
  const scanBtn = document.getElementById('scanBtn');
  const dumpBtn = document.getElementById('dumpBtn');
  const statusEl = document.getElementById('status');
  const linksEl = document.getElementById('links');
  const playerEl = document.getElementById('player');
  const trimStartToggle = document.getElementById('trimStartToggle');

  let currentFile = null;
  let latestMidiUrl = '';
  let latestMidiName = 'omr.mid';
  let latestPlaybackMidiUrl = '';
  const CLIENT_BUILD = 'audiveris2-raw-v4';
  window.currentSurrogate = window.currentSurrogate || 'audiveris2';

  function setStatus(msg) { statusEl.textContent = String(msg || ''); }

  fileInput.addEventListener('change', () => {
    currentFile = fileInput.files?.[0] || null;
    scanBtn.disabled = !currentFile;
    setStatus(currentFile ? `Ready: ${currentFile.name}` : 'Waiting for file…');
  });

  async function fileToScanBlob(file) {
    const name = String(file?.name || '').toLowerCase();
    const isPdf = file?.type === 'application/pdf' || name.endsWith('.pdf');
    if (!isPdf) return file;

    const buf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
    const page = await pdf.getPage(1);
    const viewport = page.getViewport({ scale: 3.0 });
    const canvas = document.createElement('canvas');
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    const ctx = canvas.getContext('2d');
    await page.render({ canvasContext: ctx, viewport }).promise;
    const blob = await new Promise((resolve) => canvas.toBlob(resolve, 'image/png', 0.95));
    if (!blob) throw new Error('Failed to render PDF page.');
    return blob;
  }

  function updateLinks(data) {
    linksEl.innerHTML = '';
    if (data?.midiUrl) {
      const a = document.createElement('a');
      a.href = data.midiUrl;
      a.textContent = 'MIDI';
      a.target = '_blank';
      a.rel = 'noopener';
      linksEl.appendChild(a);
    }
    if (data?.musicXmlUrl) {
      const a = document.createElement('a');
      a.href = data.musicXmlUrl;
      a.textContent = 'MusicXML';
      a.target = '_blank';
      a.rel = 'noopener';
      linksEl.appendChild(a);
    }
  }

  function extractNoteMessagesFromTracks(tracks) {
    const out = [];
    tracks.forEach((track) => {
      track.forEach((ev) => {
        if (!ev || typeof ev.tick !== 'number' || typeof ev.noteNumber !== 'number') return;
        const tick = Math.max(0, Math.floor(Number(ev.tick || 0)));
        const noteNumber = Math.max(0, Math.min(127, Number(ev.noteNumber || 0)));
        const channel = Math.max(1, Math.min(16, Number(ev.channel || 1)));
        const vel = Math.max(0, Math.min(127, Number(ev.velocity || 0)));
        if (ev.name === 'Note on' && vel > 0) out.push({ tick, type: 'on', noteNumber, channel, velocity: vel });
        else if (ev.name === 'Note off' || (ev.name === 'Note on' && vel === 0)) out.push({ tick, type: 'off', noteNumber, channel, velocity: 0 });
      });
    });
    return out.sort((a, b) => Number(a.tick || 0) - Number(b.tick || 0) || (a.type === 'off' ? -1 : 1));
  }

  function extractNoteEventsFromTracks(tracks) {
    const active = new Map();
    const out = [];
    const key = (ch, n) => `${ch}:${n}`;
    tracks.forEach((track) => {
      track.forEach((ev) => {
        if (!ev || typeof ev.tick !== 'number' || typeof ev.noteNumber !== 'number') return;
        const ch = Math.max(1, Math.min(16, Number(ev.channel || 1)));
        const nn = Math.max(0, Math.min(127, Number(ev.noteNumber || 0)));
        const t = Math.max(0, Math.floor(Number(ev.tick || 0)));
        const k = key(ch, nn);
        if (ev.name === 'Note on' && Number(ev.velocity || 0) > 0) {
          if (!active.has(k)) active.set(k, []);
          active.get(k).push(t);
        } else if (ev.name === 'Note off' || (ev.name === 'Note on' && Number(ev.velocity || 0) === 0)) {
          const stack = active.get(k);
          if (stack && stack.length) {
            const start = stack.pop();
            out.push({ startTick: start, endTick: Math.max(start, t), noteNumber: nn, channel: ch });
          }
        }
      });
    });
    return out.sort((a, b) => Number(a.startTick || 0) - Number(b.startTick || 0) || Number(a.noteNumber || 0) - Number(b.noteNumber || 0));
  }

  function extractControlMessagesFromTracks(tracks) {
    const out = [];
    tracks.forEach((track) => {
      track.forEach((ev) => {
        if (!ev || typeof ev.tick !== 'number') return;
        if (ev.name !== 'Controller Change' && ev.name !== 'Program Change') return;
        out.push({
          tick: Math.max(0, Math.floor(Number(ev.tick || 0))),
          channel: Math.max(1, Math.min(16, Number(ev.channel || 1))),
          name: String(ev.name || ''),
          controllerType: Number(ev.controllerType || 0),
          value: Number(ev.value || ev.programNumber || 0)
        });
      });
    });
    return out.sort((a, b) => Number(a.tick || 0) - Number(b.tick || 0));
  }

  function encodeVlq(value) {
    let v = Math.max(0, Math.floor(Number(value || 0)));
    const out = [v & 0x7f];
    while ((v >>= 7) > 0) out.unshift((v & 0x7f) | 0x80);
    return out;
  }
  function u32be(n) {
    const v = Number(n >>> 0);
    return [(v >>> 24) & 0xff, (v >>> 16) & 0xff, (v >>> 8) & 0xff, v & 0xff];
  }
  function u16be(n) {
    const v = Number(n & 0xffff);
    return [(v >>> 8) & 0xff, v & 0xff];
  }
  function bytesToBase64(bytes) {
    const arr = bytes instanceof Uint8Array ? bytes : new Uint8Array(bytes || []);
    let out = '';
    const chunk = 0x8000;
    for (let i = 0; i < arr.length; i += chunk) out += String.fromCharCode(...arr.subarray(i, i + chunk));
    return btoa(out);
  }
  function buildMidiFromNoteEvents(noteEvents, division = 480, tempoBpm = 120, opts = {}) {
    if (!Array.isArray(noteEvents) || !noteEvents.length) return null;
    const trimLeading = !!opts.trimLeading;
    const gateRatio = Math.max(0.70, Math.min(0.98, Number(opts.gateRatio || 0.90)));
    const minShorten = Math.max(1, Number(opts.minShorten || 2));
    const maxShorten = Math.max(minShorten, Number(opts.maxShorten || 14));

    const src = noteEvents
      .map((n) => ({
        startTick: Math.max(0, Math.floor(Number(n.startTick || 0))),
        endTick: Math.max(0, Math.floor(Number(n.endTick || 0))),
        noteNumber: Math.max(0, Math.min(127, Number(n.noteNumber || 0))),
        channel: Math.max(1, Math.min(16, Number(n.channel || 1)))
      }))
      .filter((n) => n.endTick > n.startTick)
      .sort((a, b) => Number(a.startTick || 0) - Number(b.startTick || 0) || Number(a.noteNumber || 0) - Number(b.noteNumber || 0));
    if (!src.length) return null;

    // De-ring: shorten tail slightly so notes don't bleed into following onsets.
    const gated = src.map((n) => {
      const dur = Math.max(1, n.endTick - n.startTick);
      const targetDur = Math.max(1, Math.floor(dur * gateRatio));
      const shorten = Math.max(minShorten, Math.min(maxShorten, dur - targetDur));
      const endTick = Math.max(n.startTick + 1, n.endTick - shorten);
      return { ...n, endTick };
    });

    // Canonicalize per channel+pitch (drop stacked ons/offs).
    const events = [];
    const byStart = [...gated].sort((a, b) => Number(a.startTick || 0) - Number(b.startTick || 0));
    const activeByKey = new Map();
    for (let i = 0; i < byStart.length; i++) {
      const n = byStart[i];
      const ch0 = Math.max(0, Math.min(15, Number((n.channel || 1) - 1)));
      const key = `${ch0}:${n.noteNumber}`;
      const active = activeByKey.get(key);
      if (active && Number(n.startTick || 0) <= Number(active.endTick || 0)) {
        active.endTick = Math.max(Number(active.endTick || 0), Number(n.endTick || 0));
      } else {
        if (active) {
          events.push({ tick: Number(active.startTick || 0), type: 'on', ch: ch0, nn: Number(active.noteNumber || 0), vel: 88 });
          events.push({ tick: Number(active.endTick || 0), type: 'off', ch: ch0, nn: Number(active.noteNumber || 0), vel: 0 });
        }
        activeByKey.set(key, { ...n });
      }
    }
    activeByKey.forEach((n) => {
      const ch0 = Math.max(0, Math.min(15, Number((n.channel || 1) - 1)));
      events.push({ tick: Number(n.startTick || 0), type: 'on', ch: ch0, nn: Number(n.noteNumber || 0), vel: 88 });
      events.push({ tick: Number(n.endTick || 0), type: 'off', ch: ch0, nn: Number(n.noteNumber || 0), vel: 0 });
    });
    if (!events.length) return null;
    events.sort((a, b) => Number(a.tick || 0) - Number(b.tick || 0) || (a.type === 'off' ? -1 : 1) || Number(a.ch || 0) - Number(b.ch || 0));

    if (trimLeading) {
      const firstOn = events.find((m) => m.type === 'on');
      const shift = Math.max(0, Number(firstOn?.tick || 0));
      if (shift > 0) {
        for (let i = 0; i < events.length; i++) events[i].tick = Math.max(0, Number(events[i].tick || 0) - shift);
      }
    }

    const track = [];
    const tempoUs = Math.max(1, Math.round(60000000 / Math.max(20, Number(tempoBpm || 120))));
    track.push(0x00, 0xff, 0x51, 0x03, (tempoUs >>> 16) & 0xff, (tempoUs >>> 8) & 0xff, tempoUs & 0xff);
    for (let ch = 0; ch < 16; ch++) track.push(0x00, 0xc0 | ch, 0x00);
    let lastTick = 0;
    for (let i = 0; i < events.length; i++) {
      const m = events[i];
      const tick = Math.max(0, Math.floor(Number(m.tick || 0)));
      track.push(...encodeVlq(Math.max(0, tick - lastTick)));
      lastTick = tick;
      const note = Math.max(0, Math.min(127, Number(m.nn || 0)));
      const vel = Math.max(0, Math.min(127, Number(m.vel || 0)));
      const ch = Math.max(0, Math.min(15, Number(m.ch || 0)));
      if (m.type === 'on') track.push(0x90 | ch, note, vel > 0 ? vel : 88);
      else track.push(0x80 | ch, note, 0x00);
    }
    track.push(0x00, 0xff, 0x2f, 0x00);
    const header = [0x4d,0x54,0x68,0x64,0,0,0,6,0,0,0,1,...u16be(Math.max(1, Math.min(32767, Math.floor(division))))];
    const mtrk = [0x4d,0x54,0x72,0x6b,...u32be(track.length),...track];
    return new Uint8Array([...header, ...mtrk]);
  }
  async function publishMidiBase64(midiBase64) {
    const res = await fetch('/api/omr_publish.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ midiBase64 })
    });
    const data = await res.json();
    if (!res.ok || data?.status !== 'ok' || !data?.midiUrl) throw new Error(data?.error || `HTTP ${res.status}`);
    return data;
  }
  async function preparePlaybackMidiUrl(rawUrl) {
    const res = await fetch(rawUrl, { cache: 'no-store' });
    if (!res.ok) throw new Error(`MIDI fetch failed: ${res.status}`);
    const arr = await res.arrayBuffer();
    const parser = new MidiPlayer.Player(() => {});
    parser.loadArrayBuffer(arr);
    const tracks = parser.getEvents();
    const noteMessages = extractNoteMessagesFromTracks(tracks);
    const noteEvents = extractNoteEventsFromTracks(tracks);
    const firstOn = noteMessages.find((m) => m.type === 'on');
    const firstOnTick = Math.max(0, Number(firstOn?.tick || 0));
    const outBytes = buildMidiFromNoteEvents(
      noteEvents,
      Number(parser.division || 480),
      Number(parser.tempo || 120),
      { trimLeading: !!trimStartToggle?.checked, gateRatio: 0.88, minShorten: 2, maxShorten: 14 }
    );
    if (!outBytes) return { playbackUrl: rawUrl, firstOnTick };
    const published = await publishMidiBase64(bytesToBase64(outBytes));
    return { playbackUrl: String(published.midiUrl || rawUrl), firstOnTick };
  }

  async function dumpDebug() {
    const targetUrl = latestPlaybackMidiUrl || latestMidiUrl;
    if (!targetUrl) return;
    const res = await fetch(targetUrl, { cache: 'no-store' });
    if (!res.ok) throw new Error(`MIDI fetch failed: ${res.status}`);
    const arr = await res.arrayBuffer();
    const parser = new MidiPlayer.Player(() => {});
    parser.loadArrayBuffer(arr);
    const tracks = parser.getEvents();
    const noteMessages = extractNoteMessagesFromTracks(tracks);
    const notes = extractNoteEventsFromTracks(tracks);
    const controlMessages = extractControlMessagesFromTracks(tracks);
    const payload = {
      generatedAt: new Date().toISOString(),
      source: {
        url: targetUrl,
        name: latestMidiName,
        bytes: Number(arr.byteLength || 0),
        clientBuild: CLIENT_BUILD
      },
      summary: {
        division: Math.max(1, Number(parser.division || 480)),
        tempoBpm: Math.max(20, Number(parser.tempo || 120)),
        totalTicks: Math.max(1, Number(parser.totalTicks || 1)),
        noteMessages: noteMessages.length,
        notes: notes.length,
        controlMessages: controlMessages.length
      },
      analysis: {
        unmatchedOnKeys: [],
        sustainEvents: controlMessages.filter((m) => m.name === 'Controller Change' && Number(m.controllerType || 0) === 64),
      },
      controlMessages,
      noteMessages,
      notes
    };
    const up = await fetch('/api/omr_debug_dump.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await up.json();
    if (!up.ok || data?.status !== 'ok') throw new Error(data?.error || `HTTP ${up.status}`);
    setStatus(`Debug saved: ${data.debugUrl}`);
  }

  dumpBtn.addEventListener('click', async () => {
    dumpBtn.disabled = true;
    try {
      await dumpDebug();
    } catch (e) {
      setStatus(`Dump failed: ${e.message}`);
    } finally {
      dumpBtn.disabled = !latestMidiUrl;
    }
  });

  scanBtn.addEventListener('click', async () => {
    if (!currentFile) return;
    scanBtn.disabled = true;
    dumpBtn.disabled = true;
    playerEl.innerHTML = '';
    latestMidiUrl = '';
    latestPlaybackMidiUrl = '';
    latestMidiName = 'omr.mid';
    try {
      setStatus('Preparing image…');
      const blob = await fileToScanBlob(currentFile);
      const fd = new FormData();
      fd.append('image', blob, 'scan.png');
      fd.append('engine', 'audiveris');
      setStatus('Running Audiveris…');
      const res = await fetch('/api/omr_extract.php', { method: 'POST', body: fd });
      const data = await res.json();
      if (!res.ok || data.status !== 'ok') throw new Error(data.error || `HTTP ${res.status}`);

      updateLinks(data);
      latestMidiUrl = String(data.midiUrl || '');
      latestMidiName = String(data.midiName || 'omr.mid');
      dumpBtn.disabled = !latestMidiUrl;
      const shouldPreparePlayback = !!(latestMidiUrl && trimStartToggle?.checked);
      const prepared = shouldPreparePlayback
        ? await preparePlaybackMidiUrl(latestMidiUrl)
        : { playbackUrl: latestMidiUrl, firstOnTick: 0 };
      const playbackUrl = String(prepared.playbackUrl || latestMidiUrl);
      latestPlaybackMidiUrl = playbackUrl;
      const firstOnTick = Number(prepared.firstOnTick || 0);
      setStatus(`Done. engineUsed=${data.engineUsed || 'audiveris'} | firstOnTick=${firstOnTick}`);

      if (playbackUrl) {
        const safeName = String(latestMidiName || 'omr.mid');
        playerEl.style.display = 'block';
        playerEl.innerHTML = '';
        const wrap = document.createElement('div');
        wrap.className = 'musicPanel-item';
        const header = document.createElement('div');
        header.className = 'musicPanel-header drag-handle';
        const title = document.createElement('div');
        title.className = 'musicPanel-title';
        title.textContent = safeName;
        header.appendChild(title);
        const box = document.createElement('div');
        box.className = 'musicPlayerBox';
        box.style.display = 'block';
        wrap.appendChild(header);
        wrap.appendChild(box);
        playerEl.appendChild(wrap);
        if (typeof window.renderCompactMidiPlayer === 'function') {
          const midiWrap = document.createElement('div');
          midiWrap.className = 'midi-player-wrapper';
          box.appendChild(midiWrap);
          await window.renderCompactMidiPlayer(midiWrap, window.currentSurrogate, safeName, playbackUrl);
          try { window.lucide?.createIcons(); } catch {}
        } else {
          box.innerHTML = `<div style="margin-top:6px;">
            <a href="${playbackUrl}" target="_blank" rel="noopener">Open Playback MIDI</a>
            <a href="${playbackUrl}" download="${safeName}" style="margin-left:12px;">Download Playback MIDI</a>
          </div>`;
        }
      }
    } catch (e) {
      setStatus(`Scan failed: ${e.message}`);
    } finally {
      scanBtn.disabled = !currentFile;
    }
  });
  </script>
</body>
</html>
