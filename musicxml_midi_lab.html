<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>MusicXML to MIDI Lab</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f8fafc; color: #111827; }
    .top { position: sticky; top: 0; background: #fff; border-bottom: 1px solid #d1d5db; padding: 10px 12px; z-index: 3; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .meta { font-size: 13px; color: #4b5563; margin-right:auto; }
    button { border: 1px solid #d1d5db; background: #fff; color: #111827; border-radius: 6px; font-size: 12px; padding: 7px 10px; cursor: pointer; }
    button:hover { background: #f3f4f6; }
    button:disabled { opacity: 0.55; cursor: default; }
    #scoreWrap { position: relative; background:#fff; }
    #mount { padding: 10px; min-height: 42vh; background: #fff; }
    #midiWrap { border-top:1px solid #d1d5db; background:#f3f4f6; padding:8px 10px; }
    #timelineWrap { margin: 10px; background: #fff; border: 1px solid #d1d5db; border-radius: 6px; overflow: auto; }
    #log { margin: 10px; white-space: pre-wrap; word-break: break-word; font-size: 12px; line-height: 1.4; background: #fff; border: 1px solid #d1d5db; border-radius: 6px; padding: 10px; }
  </style>
</head>
<body>
  <div class="top">
    <div class="meta" id="meta">Loading MusicXML…</div>
    <input id="surrogateInput" type="text" inputmode="numeric" placeholder="surrogate" style="width:110px;border:1px solid #d1d5db;border-radius:6px;padding:7px 8px;font-size:12px;" />
    <button id="btnRebuild" type="button">Rebuild MIDI</button>
    <button id="btnDownloadXml" type="button" disabled>Download MusicXML</button>
    <button id="btnDownload" type="button" disabled>Download MIDI</button>
    <span id="buildVersion" style="margin-left:8px;font-size:12px;color:#6b7280;border:1px solid #d1d5db;border-radius:999px;padding:4px 8px;background:#f9fafb;">11</span>
  </div>
  <div id="scoreWrap">
    <div id="mount"></div>
  </div>
  <div id="timelineWrap"></div>
  <div id="midiWrap"></div>
  <pre id="log"></pre>

  <script>
    (async function () {
      const qs = new URLSearchParams(window.location.search);
      let xmlUrl = String(qs.get('xml') || '');
      let xmlTextLocal = String(qs.get('xmlText') || '');
      let xmlName = String(qs.get('name') || 'MusicXML');
      let surrogate = String(qs.get('surrogate') || qs.get('q') || '').replace(/[^0-9]/g, '');
      const includeMetronome = String(qs.get('met') || '1') !== '0';

      const meta = document.getElementById('meta');
      const mount = document.getElementById('mount');
      const midiWrap = document.getElementById('midiWrap');
      const timelineWrap = document.getElementById('timelineWrap');
      const logEl = document.getElementById('log');
      const surrogateInput = document.getElementById('surrogateInput');
      const btnRebuild = document.getElementById('btnRebuild');
      const btnDownloadXml = document.getElementById('btnDownloadXml');
      const btnDownload = document.getElementById('btnDownload');

      let xmlText = '';
      let midiBytes = null;
      let midiName = 'musicxml-lab.mid';
      let midiBlobUrl = '';
      let timelineMeta = null;
      let timelinePlayTick = 0;
      let timelineRaf = 0;
      let timelinePlayStartedAtMs = 0;
      let timelineStartTickAtPlay = 0;
      let timelineTempoBpm = 120;
      let detachCompactTimelineSync = null;

      const setMeta = (t) => { if (meta) meta.textContent = t; };
      const setLog = (t) => { if (logEl) logEl.textContent = String(t || ''); };
      const appendLog = (t) => { if (logEl) logEl.textContent = String(logEl.textContent || '') + (logEl.textContent ? '\n' : '') + String(t || ''); };

      const loadScript = (src) => new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = src;
        s.async = true;
        s.onload = resolve;
        s.onerror = reject;
        document.head.appendChild(s);
      });
      const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

      const isZipBytes = (buf) => {
        const b = new Uint8Array(buf || new ArrayBuffer(0));
        return b.length >= 4 && b[0] === 0x50 && b[1] === 0x4b && (b[2] === 0x03 || b[2] === 0x05 || b[2] === 0x07) && (b[3] === 0x04 || b[3] === 0x06 || b[3] === 0x08);
      };

      const bytesToBase64 = (bytes) => {
        let bin = '';
        const chunk = 0x8000;
        for (let i = 0; i < bytes.length; i += chunk) {
          const part = bytes.subarray(i, Math.min(bytes.length, i + chunk));
          bin += String.fromCharCode.apply(null, Array.from(part));
        }
        return btoa(bin);
      };

      const base64ToBytes = (b64) => {
        const bin = atob(String(b64 || ''));
        const out = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i) & 0xff;
        return out;
      };

      const u16be = (n) => [((n >>> 8) & 0xff), (n & 0xff)];
      const u32be = (n) => [((n >>> 24) & 0xff), ((n >>> 16) & 0xff), ((n >>> 8) & 0xff), (n & 0xff)];
      const readU32be = (arr, i) => (((arr[i] << 24) >>> 0) | (arr[i + 1] << 16) | (arr[i + 2] << 8) | arr[i + 3]) >>> 0;
      const encodeVlq = (n) => {
        let v = Math.max(0, Number(n || 0)) >>> 0;
        const out = [v & 0x7f];
        while ((v >>= 7) > 0) out.unshift((v & 0x7f) | 0x80);
        return out;
      };
      const readVlqAt = (arr, start) => {
        let i = start;
        let v = 0;
        for (let c = 0; c < 4; c++) {
          if (i >= arr.length) break;
          const b = arr[i++];
          v = (v << 7) | (b & 0x7f);
          if (!(b & 0x80)) break;
        }
        return { value: v >>> 0, next: i };
      };


      const parseMidiNoteEventsFromBytes = (bytes) => {
        if (!(bytes instanceof Uint8Array) || bytes.length < 14) return { notes: [], division: 480 };
        if (!(bytes[0] === 0x4d && bytes[1] === 0x54 && bytes[2] === 0x68 && bytes[3] === 0x64)) return { notes: [], division: 480 };
        const headerLen = readU32be(bytes, 4);
        const headerEnd = 8 + headerLen;
        if (bytes.length < headerEnd || headerLen < 6) return { notes: [], division: 480 };
        const division = ((bytes[12] << 8) | bytes[13]) & 0xffff;
        let pos = headerEnd;
        const out = [];

        for (let trackIndex = 0; pos + 8 <= bytes.length; trackIndex++) {
          if (!(bytes[pos] === 0x4d && bytes[pos + 1] === 0x54 && bytes[pos + 2] === 0x72 && bytes[pos + 3] === 0x6b)) break;
          const trackLen = readU32be(bytes, pos + 4);
          const tStart = pos + 8;
          const tEnd = tStart + trackLen;
          if (tEnd > bytes.length) break;
          const tr = bytes.slice(tStart, tEnd);
          pos = tEnd;

          let i = 0;
          let absTick = 0;
          let running = 0;
          const active = new Map();

          while (i < tr.length) {
            const d = readVlqAt(tr, i);
            i = d.next;
            absTick += Number(d.value || 0);
            if (i >= tr.length) break;
            const b0 = tr[i++];
            if (b0 === 0xff) {
              if (i >= tr.length) break;
              i++;
              const lv = readVlqAt(tr, i);
              i = lv.next + lv.value;
              continue;
            }
            if (b0 === 0xf0 || b0 === 0xf7) {
              const lv = readVlqAt(tr, i);
              i = lv.next + lv.value;
              continue;
            }

            let status = b0;
            let d1;
            if (b0 < 0x80) {
              if (running < 0x80) break;
              status = running;
              d1 = b0;
            } else {
              running = status;
              if (i >= tr.length) break;
              d1 = tr[i++];
            }

            const hi = status & 0xf0;
            const ch = (status & 0x0f) + 1;
            if (hi === 0xc0 || hi === 0xd0) continue;
            if (i >= tr.length) break;
            const d2 = tr[i++];

            if (hi === 0x90 && d2 > 0) {
              const key = `${ch}:${d1}`;
              if (!active.has(key)) active.set(key, []);
              active.get(key).push(absTick);
            } else if (hi === 0x80 || (hi === 0x90 && d2 === 0)) {
              const key = `${ch}:${d1}`;
              const arr = active.get(key);
              if (!arr || !arr.length) continue;
              const startTick = Number(arr.pop());
              if (!arr.length) active.delete(key);
              if (absTick > startTick) {
                out.push({
                  startTick,
                  endTick: absTick,
                  noteNumber: Number(d1),
                  channel: ch,
                  partId: `TR${trackIndex + 1}`,
                  staff: String(trackIndex + 1),
                  voice: String(ch)
                });
              }
            }
          }
        }
        return { notes: out, division: (division > 0 && division < 0x8000) ? division : 480 };
      };

      const localNameOf = (el) => {
        const n = String(el?.localName || el?.nodeName || '').toLowerCase();
        const i = n.indexOf(':');
        return i >= 0 ? n.slice(i + 1) : n;
      };

      const musicXmlPitchToMidi = (noteEl) => {
        const pitch = noteEl.getElementsByTagNameNS('*', 'pitch')[0] || null;
        if (!pitch) return null;
        const step = String(pitch.getElementsByTagNameNS('*', 'step')[0]?.textContent || '').trim().toUpperCase();
        const alter = Number((pitch.getElementsByTagNameNS('*', 'alter')[0]?.textContent || '').trim()) || 0;
        const octave = Number((pitch.getElementsByTagNameNS('*', 'octave')[0]?.textContent || '').trim());
        const base = ({ C:0, D:2, E:4, F:5, G:7, A:9, B:11 })[step];
        if (!Number.isFinite(base) || !Number.isFinite(octave)) return null;
        return Math.max(0, Math.min(127, Math.round((octave + 1) * 12 + base + alter)));
      };

      const xmlDurationRawFromNote = (noteEl, divisions = 1) => {
        const raw = Number((noteEl?.getElementsByTagNameNS('*', 'duration')[0]?.textContent || '').trim());
        if (Number.isFinite(raw) && raw > 0) return Math.max(1, Math.round(raw));
        if (noteEl?.getElementsByTagNameNS('*', 'grace')?.length) return 0;

        const typeText = String(noteEl?.getElementsByTagNameNS('*', 'type')[0]?.textContent || '').trim().toLowerCase();
        const quarterMultByType = {
          longa: 16,
          breve: 8,
          whole: 4,
          half: 2,
          quarter: 1,
          eighth: 0.5,
          '16th': 0.25,
          '32nd': 0.125,
          '64th': 0.0625,
          '128th': 0.03125
        };
        const baseMult = quarterMultByType[typeText];
        if (!Number.isFinite(baseMult) || baseMult <= 0) return 0;

        const dotCount = Math.max(0, noteEl.getElementsByTagNameNS('*', 'dot').length || 0);
        let dotFactor = 1;
        let add = 0.5;
        for (let i = 0; i < dotCount; i++) {
          dotFactor += add;
          add *= 0.5;
        }

        let tupletFactor = 1;
        const tm = noteEl.getElementsByTagNameNS('*', 'time-modification')[0] || null;
        if (tm) {
          const actual = Number((tm.getElementsByTagNameNS('*', 'actual-notes')[0]?.textContent || '').trim());
          const normal = Number((tm.getElementsByTagNameNS('*', 'normal-notes')[0]?.textContent || '').trim());
          if (Number.isFinite(actual) && Number.isFinite(normal) && actual > 0 && normal > 0) {
            tupletFactor = normal / actual;
          }
        }

        return Math.max(1, Math.round(Number(divisions || 1) * baseMult * dotFactor * tupletFactor));
      };

      const parseMusicXmlToNoteEvents = (xml, targetDivision = 480) => {
        const text = String(xml || '');
        if (!text.trim()) return { notes: [], rests: [] };
        const doc = new DOMParser().parseFromString(text, 'application/xml');
        if (doc.getElementsByTagName('parsererror').length) return { notes: [], rests: [] };

        const out = [];
        const partVoiceToChannel = new Map();
        const getChannel = (partId, staff, voice) => {
          const key = `${partId}::${staff}::${voice}`;
          if (!partVoiceToChannel.has(key)) {
            partVoiceToChannel.set(key, Math.max(1, Math.min(16, partVoiceToChannel.size + 1)));
          }
          return partVoiceToChannel.get(key);
        };

        const activeTies = new Map();
        const restWindows = [];
        const partEls = Array.from(doc.getElementsByTagNameNS('*', 'part'));
        for (let pi = 0; pi < partEls.length; pi++) {
          const partEl = partEls[pi];
          const partId = String(partEl.getAttribute('id') || '').trim() || `P${pi + 1}`;
          let partCursor = 0;
          let divisions = Math.max(1, Number(targetDivision || 480));
          const voiceStarts = new Map();
          const voiceLastDur = new Map();
          const measureEls = Array.from(partEl.getElementsByTagNameNS('*', 'measure'));

          for (let mi = 0; mi < measureEls.length; mi++) {
            const measureEl = measureEls[mi];
            const children = Array.from(measureEl.childNodes || []).filter((n) => n && n.nodeType === 1);
            for (let ci = 0; ci < children.length; ci++) {
              const el = children[ci];
              const name = localNameOf(el);
              if (name === 'attributes') {
                const divText = (el.getElementsByTagNameNS('*', 'divisions')[0]?.textContent || '').trim();
                const d = Number(divText);
                if (Number.isFinite(d) && d > 0) divisions = d;
                continue;
              }
              if (name === 'backup' || name === 'forward') {
                const dur = Number((el.getElementsByTagNameNS('*', 'duration')[0]?.textContent || '').trim());
                if (Number.isFinite(dur) && dur > 0) {
                  const delta = Math.round((dur * Number(targetDivision || 480)) / Math.max(1, divisions));
                  partCursor += (name === 'backup' ? -delta : delta);
                  if (!Number.isFinite(partCursor) || partCursor < 0) partCursor = 0;
                  if (name === 'forward' && delta > 0) {
                    // Time jump is a hard barrier for active ties in this part.
                    const prefix = `${partId}::`;
                    for (const k of Array.from(activeTies.keys())) {
                      if (String(k).startsWith(prefix)) activeTies.delete(k);
                    }
                  }
                }
                continue;
              }
              if (name !== 'note') continue;

              const hasGrace = el.getElementsByTagNameNS('*', 'grace').length > 0;
              const hasRest = el.getElementsByTagNameNS('*', 'rest').length > 0;
              const hasChord = el.getElementsByTagNameNS('*', 'chord').length > 0;
              // Treat malformed "grace rest" exports as normal rests so time still advances.
              const isGraceTiming = hasGrace && !hasRest;
              // Some MusicXML/OMR exports incorrectly attach <chord/> to rests.
              // Rests must still advance timeline position.
              const isChordTiming = hasChord && !hasRest;
              const voice = (el.getElementsByTagNameNS('*', 'voice')[0]?.textContent || '').trim() || '1';
              const staff = (el.getElementsByTagNameNS('*', 'staff')[0]?.textContent || '').trim() || '1';
              const voiceKey = `${staff}::${voice}`;
              let durRaw = xmlDurationRawFromNote(el, divisions);
              if (!(Number.isFinite(durRaw) && durRaw > 0) && isChordTiming) {
                const dPrev = Number(voiceLastDur.get(voiceKey) || 0);
                if (Number.isFinite(dPrev) && dPrev > 0) durRaw = dPrev;
              }
              if (!(Number.isFinite(durRaw) && durRaw > 0) && hasRest && !isGraceTiming) {
                const dPrev = Number(voiceLastDur.get(voiceKey) || 0);
                durRaw = (Number.isFinite(dPrev) && dPrev > 0)
                  ? dPrev
                  : Math.max(1, Math.round(divisions * 0.5));
              }
              const dur = Number.isFinite(durRaw) && durRaw > 0
                ? Math.max(1, Math.round((durRaw * Number(targetDivision || 480)) / Math.max(1, divisions)))
                : 0;
              if (!isChordTiming && durRaw > 0) voiceLastDur.set(voiceKey, Number(durRaw));
              const startTick = isChordTiming ? Number(voiceStarts.get(voiceKey) ?? partCursor) : partCursor;
              if (!isChordTiming) voiceStarts.set(voiceKey, startTick);

              // A rest is a hard barrier for ties in this exact voice.
              if (!isGraceTiming && hasRest) {
                if (dur > 0) {
                  restWindows.push({
                    partId,
                    staff,
                    voice,
                    startTick,
                    endTick: startTick + dur
                  });
                }
                const prefix = `${partId}::${staff}::${voice}::`;
                for (const k of Array.from(activeTies.keys())) {
                  if (String(k).startsWith(prefix)) activeTies.delete(k);
                }
              }

              if (!isGraceTiming && !hasRest && dur > 0) {
                const nn = musicXmlPitchToMidi(el);
                if (Number.isFinite(nn)) {
                  const noteNumber = Math.max(0, Math.min(127, Math.round(nn)));
                  const tieEls = Array.from(el.getElementsByTagNameNS('*', 'tie'));
                  const tiedEls = Array.from(el.getElementsByTagNameNS('*', 'tied'));
                  const tieTypes = new Set(tieEls.map((t) => String(t.getAttribute('type') || '').toLowerCase()));
                  const tiedTypes = new Set(tiedEls.map((t) => String(t.getAttribute('type') || '').toLowerCase()));
                  const hasTieStart = tieTypes.has('start') || tiedTypes.has('start');
                  const hasTieStop = tieTypes.has('stop') || tiedTypes.has('stop');
                  const tieKey = `${partId}::${staff}::${voice}::${noteNumber}`;
                  const active = activeTies.get(tieKey) || null;

                  const tieJoinTol = Math.max(1, Math.round(Number(targetDivision || 480) * 0.02));
                  const pushStandalone = () => out.push({
                    startTick,
                    endTick: startTick + dur,
                    noteNumber,
                    channel: getChannel(partId, staff, voice),
                    partId,
                    staff,
                    voice
                  });

                  if (hasTieStop && active) {
                    const contiguous = startTick <= (Number(active.endTick || 0) + tieJoinTol);
                    if (contiguous) {
                      active.endTick = Math.max(Number(active.endTick || 0), startTick + dur);
                      if (!hasTieStart) activeTies.delete(tieKey);
                    } else if (hasTieStart) {
                      const ev = { startTick, endTick: startTick + dur, noteNumber, channel: getChannel(partId, staff, voice), partId, staff, voice };
                      out.push(ev);
                      activeTies.set(tieKey, ev);
                    } else {
                      activeTies.delete(tieKey);
                      pushStandalone();
                    }
                  } else if (hasTieStart) {
                    const ev = { startTick, endTick: startTick + dur, noteNumber, channel: getChannel(partId, staff, voice), partId, staff, voice };
                    out.push(ev);
                    activeTies.set(tieKey, ev);
                  } else {
                    pushStandalone();
                  }
                }
              }

              if (!isChordTiming && dur > 0) partCursor += dur;
            }
          }
        }

        const notes = out.filter((n) => Number(n.endTick || 0) > Number(n.startTick || 0));
        const rests = restWindows.filter((r) => Number(r.endTick || 0) > Number(r.startTick || 0));
        return { notes, rests };
      };

      const buildMidiFromNoteEventsBasic = (noteEvents, division = 480, tempoBpm = 120, includeMetronome = true) => {
        if (!Array.isArray(noteEvents) || !noteEvents.length) return null;
        const src = noteEvents
          .map((n) => ({
            startTick: Math.max(0, Math.floor(Number(n.startTick || 0))),
            endTick: Math.max(0, Math.floor(Number(n.endTick || 0))),
            noteNumber: Math.max(0, Math.min(127, Math.floor(Number(n.noteNumber || 0)))),
            channel: Math.max(1, Math.min(16, Math.floor(Number(n.channel || 1))))
          }))
          .filter((n) => n.endTick > n.startTick)
          .sort((a, b) => a.startTick - b.startTick || a.channel - b.channel || a.noteNumber - b.noteNumber);
        if (!src.length) return null;

        const musicEvents = [];
        for (let i = 0; i < src.length; i++) {
          const n = src[i];
          const ch = Math.max(0, Math.min(15, n.channel - 1));
          musicEvents.push({ tick: n.startTick, type: 'on', ch, nn: n.noteNumber, vel: 92 });
          musicEvents.push({ tick: n.endTick, type: 'off', ch, nn: n.noteNumber, vel: 0 });
        }

        const metEvents = [];
        if (includeMetronome) {
          const maxTick = Math.max(0, ...src.map((n) => Number(n.endTick || 0)));
          const beat = Math.max(1, Math.round(Number(division || 480))); // quarter-note beat
          const clickDur = Math.max(1, Math.round(beat * 0.22));
          const metCh = 15; // dedicated metronome channel
          for (let t = 0, beatIx = 0; t <= maxTick; t += beat, beatIx++) {
            const strong = (beatIx % 4) === 0;
            const hi = strong ? 96 : 84; // C7 / C6
            const lo = strong ? 48 : 43; // C3 / G2
            const hiVel = strong ? 118 : 92;
            const loVel = strong ? 112 : 86;
            metEvents.push({ tick: t, type: 'on', ch: metCh, nn: hi, vel: hiVel });
            metEvents.push({ tick: t + clickDur, type: 'off', ch: metCh, nn: hi, vel: 0 });
            metEvents.push({ tick: t, type: 'on', ch: metCh, nn: lo, vel: loVel });
            metEvents.push({ tick: t + clickDur, type: 'off', ch: metCh, nn: lo, vel: 0 });
          }
        }

        const sortEvents = (events) => events.sort((a, b) => {
          if (a.tick !== b.tick) return a.tick - b.tick;
          if (a.type !== b.type) return a.type === 'off' ? -1 : 1;
          if (a.ch !== b.ch) return a.ch - b.ch;
          return a.nn - b.nn;
        });
        sortEvents(musicEvents);
        sortEvents(metEvents);

        const firstOn = musicEvents.find((e) => e.type === 'on');
        const shift = Math.max(0, Number(firstOn?.tick || 0));
        if (shift > 0) {
          for (let i = 0; i < musicEvents.length; i++) musicEvents[i].tick = Math.max(0, Number(musicEvents[i].tick || 0) - shift);
          for (let i = 0; i < metEvents.length; i++) metEvents[i].tick = Math.max(0, Number(metEvents[i].tick || 0) - shift);
        }

        const buildTrackChunk = (events, includeTempo = false) => {
          const track = [];
          if (includeTempo) {
            const tempoUs = Math.max(1, Math.round(60000000 / Math.max(20, Number(tempoBpm || 120))));
            track.push(0x00, 0xff, 0x51, 0x03, (tempoUs >>> 16) & 0xff, (tempoUs >>> 8) & 0xff, tempoUs & 0xff);
          }
          for (let ch = 0; ch < 16; ch++) track.push(0x00, 0xc0 | ch, 0x00);

          let lastTick = 0;
          for (let i = 0; i < events.length; i++) {
            const ev = events[i];
            const delta = Math.max(0, Number(ev.tick || 0) - lastTick);
            lastTick = Math.max(0, Number(ev.tick || 0));
            track.push(...encodeVlq(delta));
            if (ev.type === 'on') track.push(0x90 | ev.ch, ev.nn, ev.vel > 0 ? ev.vel : 88);
            else track.push(0x80 | ev.ch, ev.nn, 0x00);
          }
          for (let ch = 0; ch < 16; ch++) {
            track.push(0x00, 0xB0 | ch, 64, 0);
            track.push(0x00, 0xB0 | ch, 123, 0);
          }
          track.push(0x00, 0xff, 0x2f, 0x00);
          return [0x4d, 0x54, 0x72, 0x6b, ...u32be(track.length), ...track];
        };

        const musicChunk = buildTrackChunk(musicEvents, true);
        const metChunk = metEvents.length ? buildTrackChunk(metEvents, false) : null;

        const chunks = metChunk ? [...musicChunk, ...metChunk] : [...musicChunk];
        const nTracks = metChunk ? 2 : 1;

        const formatType = metChunk ? 1 : 0;
        const header = [
          0x4d, 0x54, 0x68, 0x64,
          0x00, 0x00, 0x00, 0x06,
          ...u16be(formatType),
          ...u16be(nTracks),
          ...u16be(Math.max(1, Math.min(32767, Math.floor(division))))
        ];
        return new Uint8Array([...header, ...chunks]);
      };

      const readMusicXml = async () => {
        if (xmlTextLocal) return String(xmlTextLocal);
        const res = await fetch(xmlUrl, { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const buf = await res.arrayBuffer();
        if (isZipBytes(buf)) {
          await loadScript('https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js');
          const zip = await window.JSZip.loadAsync(buf);
          const container = zip.file('META-INF/container.xml');
          let xml = '';
          if (container) {
            const cText = await container.async('string');
            const m = cText.match(/full-path\s*=\s*"([^"]+)"/i);
            if (m && m[1] && zip.file(m[1])) xml = await zip.file(m[1]).async('string');
          }
          if (!xml) {
            const names = Object.keys(zip.files || {}).filter((n) => /\.xml$/i.test(n) && !/^META-INF\//i.test(n));
            if (names[0] && zip.file(names[0])) xml = await zip.file(names[0]).async('string');
          }
          if (!xml) throw new Error('Could not extract XML from MXL');
          return xml;
        }
        return new TextDecoder('utf-8', { fatal: false }).decode(new Uint8Array(buf));
      };

      const sha256Hex = async (text) => {
        if (!window.crypto || !window.crypto.subtle) {
          let h = 2166136261;
          for (let i = 0; i < text.length; i++) {
            h ^= text.charCodeAt(i);
            h += (h << 1) + (h << 4) + (h << 7) + (h << 8) + (h << 24);
          }
          return 'fnv-' + (h >>> 0).toString(16);
        }
        const data = new TextEncoder().encode(text);
        const hash = await crypto.subtle.digest('SHA-256', data);
        return Array.from(new Uint8Array(hash)).map((b) => b.toString(16).padStart(2, '0')).join('');
      };

      const cachePut = (key, value) => {
        try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
      };

      const cacheGet = (key) => {
        try {
          const raw = localStorage.getItem(key);
          if (!raw) return null;
          const obj = JSON.parse(raw);
          return obj && typeof obj === 'object' ? obj : null;
        } catch {
          return null;
        }
      };

      const escHtml = (s) => String(s || '').replace(/[&<>"]/g, (c) => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;' })[c] || c);

      const stopPlayheadAnimation = () => {
        if (timelineRaf) {
          cancelAnimationFrame(timelineRaf);
          timelineRaf = 0;
        }
      };

      const setTimelinePlayheadTick = (tick) => {
        if (!timelineMeta) return;
        const t = Math.max(0, Math.min(Number(tick || 0), Number(timelineMeta.maxTick || 0)));
        timelinePlayTick = t;
        const line = document.getElementById('timelinePlayhead');
        if (!line) return;
        const x = Number(timelineMeta.labelW || 160) + Math.round(t * Number(timelineMeta.pxPerTick || 0.15)) + 0.5;
        line.setAttribute('x1', String(x));
        line.setAttribute('x2', String(x));
      };

      const startPlayheadAnimation = () => {
        if (!timelineMeta) return;
        stopPlayheadAnimation();
        timelinePlayStartedAtMs = performance.now();
        timelineStartTickAtPlay = Number(timelinePlayTick || 0);
        const ticksPerSecond = Math.max(1, Number(timelineMeta.division || 480) * (Math.max(20, Number(timelineTempoBpm || 120)) / 60));
        const step = () => {
          const elapsedSec = Math.max(0, (performance.now() - timelinePlayStartedAtMs) / 1000);
          const tick = timelineStartTickAtPlay + elapsedSec * ticksPerSecond;
          setTimelinePlayheadTick(tick);
          if (tick >= Number(timelineMeta.maxTick || 0)) {
            stopPlayheadAnimation();
            return;
          }
          timelineRaf = requestAnimationFrame(step);
        };
        timelineRaf = requestAnimationFrame(step);
      };

      const wireAudioToTimeline = (audioEl) => {
        if (!audioEl || !timelineMeta) return;
        const onPlay = () => startPlayheadAnimation();
        const onPause = () => stopPlayheadAnimation();
        const onEnded = () => { stopPlayheadAnimation(); setTimelinePlayheadTick(Number(timelineMeta.maxTick || 0)); };
        const onSeek = () => {
          const sec = Number(audioEl.currentTime || 0);
          const ticksPerSecond = Math.max(1, Number(timelineMeta.division || 480) * (Math.max(20, Number(timelineTempoBpm || 120)) / 60));
          setTimelinePlayheadTick(sec * ticksPerSecond);
        };
        audioEl.addEventListener('play', onPlay);
        audioEl.addEventListener('pause', onPause);
        audioEl.addEventListener('ended', onEnded);
        audioEl.addEventListener('seeked', onSeek);
        audioEl.addEventListener('timeupdate', onSeek);
      };

      const wireCompactTimeline = (el) => {
        if (!el) return;
        if (typeof detachCompactTimelineSync === 'function') {
          try { detachCompactTimelineSync(); } catch {}
          detachCompactTimelineSync = null;
        }
        const onStarted = (ev) => {
          const tick = Number(ev?.detail?.tick || 0);
          setTimelinePlayheadTick(tick);
          startPlayheadAnimation();
        };
        const onPlaying = (ev) => {
          const tick = Number(ev?.detail?.tick || 0);
          stopPlayheadAnimation();
          setTimelinePlayheadTick(tick);
        };
        const onPaused = (ev) => {
          const tick = Number(ev?.detail?.tick || 0);
          stopPlayheadAnimation();
          setTimelinePlayheadTick(tick);
        };
        const onEnded = () => {
          stopPlayheadAnimation();
          if (timelineMeta) setTimelinePlayheadTick(Number(timelineMeta.maxTick || 0));
        };
        el.addEventListener('midi-started', onStarted);
        el.addEventListener('midi-playing', onPlaying);
        el.addEventListener('midi-paused', onPaused);
        el.addEventListener('midi-ended', onEnded);
        detachCompactTimelineSync = () => {
          el.removeEventListener('midi-started', onStarted);
          el.removeEventListener('midi-playing', onPlaying);
          el.removeEventListener('midi-paused', onPaused);
          el.removeEventListener('midi-ended', onEnded);
        };
      };

      const buildMetronomeNoteEvents = (maxTick, division = 480) => {
        const out = [];
        const beat = Math.max(1, Math.round(Number(division || 480)));
        const clickDur = Math.max(1, Math.round(beat * 0.22));
        for (let t = 0, beatIx = 0; t <= maxTick; t += beat, beatIx++) {
          const strong = (beatIx % 4) === 0;
          out.push({
            startTick: t,
            endTick: t + clickDur,
            noteNumber: strong ? 96 : 84,
            channel: 16,
            partId: 'MET',
            staff: '1',
            voice: strong ? 'downbeat' : 'beat'
          });
        }
        return out;
      };

      const renderTimeline = (noteEvents, division = 480, showMetronome = false, restWindows = []) => {
        if (!timelineWrap) return;
        const baseNotes = Array.isArray(noteEvents) ? noteEvents.filter((n) => Number(n.endTick || 0) > Number(n.startTick || 0)) : [];
        const safeRests = Array.isArray(restWindows) ? restWindows.filter((r) => Number(r.endTick || 0) > Number(r.startTick || 0)) : [];
        const maxFromNotes = baseNotes.length ? Math.max(1, ...baseNotes.map((n) => Number(n.endTick || 0))) : 0;
        const maxFromRests = safeRests.length ? Math.max(1, ...safeRests.map((r) => Number(r.endTick || 0))) : 0;
        const maxBase = Math.max(maxFromNotes, maxFromRests, Math.max(1, Number(division || 480) * 4));
        const metNotes = showMetronome ? buildMetronomeNoteEvents(maxBase, division) : [];
        const notes = baseNotes.concat(metNotes);
        if (!notes.length && !safeRests.length) {
          timelineWrap.innerHTML = '<div style="padding:10px;font-size:12px;color:#6b7280;">Timeline: no note events.</div>';
          return;
        }
        const laneMap = new Map();
        for (let i = 0; i < notes.length; i++) {
          const n = notes[i];
          const laneId = `${n.partId || 'P?'}|${n.staff || '1'}|${n.voice || '1'}|${n.channel || 1}`;
          if (!laneMap.has(laneId)) laneMap.set(laneId, {
            id: laneId,
            label: String(n.partId) === 'MET'
              ? 'METRONOME'
              : `P:${n.partId || '?'} S:${n.staff || '1'} V:${n.voice || '1'} Ch:${n.channel || 1}`,
            notes: [],
            rests: [],
            partId: String(n.partId || ''),
            staff: String(n.staff || '1')
          });
          laneMap.get(laneId).notes.push(n);
        }
        for (let i = 0; i < safeRests.length; i++) {
          const r = safeRests[i];
          const laneId = `REST|${r.partId || 'P?'}|${r.staff || '1'}`;
          if (!laneMap.has(laneId)) laneMap.set(laneId, {
            id: laneId,
            label: `P:${r.partId || '?'} S:${r.staff || '1'} REST`,
            notes: [],
            rests: [],
            partId: String(r.partId || ''),
            staff: String(r.staff || '1')
          });
          laneMap.get(laneId).rests.push(r);
        }
        const lanes = Array.from(laneMap.values()).sort((a, b) => a.label.localeCompare(b.label));
        const maxTick = Math.max(1, maxBase);
        const pxPerTick = 72 / Math.max(1, Number(division || 480));
        const headerH = 30;
        const laneH = 26;
        const labelW = 160;
        const laneGap = 4;
        const rightPad = 20;
        const timelineW = Math.max(960, Math.ceil(maxTick * pxPerTick) + rightPad);
        const svgW = labelW + timelineW;
        const svgH = headerH + lanes.length * (laneH + laneGap) + 8;
        const beat = Math.max(1, Number(division || 480));
        let grid = '';
        for (let t = 0; t <= maxTick; t += beat) {
          const x = labelW + Math.round(t * pxPerTick) + 0.5;
          const isBar = (Math.round(t / beat) % 4) === 0;
          grid += `<line x1="${x}" y1="0" x2="${x}" y2="${svgH}" stroke="${isBar ? '#9ca3af' : '#e5e7eb'}" stroke-width="${isBar ? 1.2 : 1}" />`;
          if (isBar) {
            const m = Math.floor(t / (beat * 4)) + 1;
            grid += `<text x="${x + 4}" y="12" font-size="10" fill="#6b7280">m${m}</text>`;
          }
        }
        let rows = '';
        for (let li = 0; li < lanes.length; li++) {
          const lane = lanes[li];
          const y = headerH + li * (laneH + laneGap);
          rows += `<rect x="0" y="${y}" width="${labelW}" height="${laneH}" fill="${li % 2 ? '#fafafa' : '#f3f4f6'}" stroke="#e5e7eb" />`;
          rows += `<text x="6" y="${y + 17}" font-size="11" fill="#374151">${escHtml(lane.label)}</text>`;
          rows += `<rect x="${labelW}" y="${y}" width="${timelineW}" height="${laneH}" fill="${li % 2 ? '#ffffff' : '#fcfcfd'}" stroke="#f3f4f6" />`;
          for (let ri = 0; ri < lane.rests.length; ri++) {
            const r = lane.rests[ri];
            const rx = labelW + Math.round(Number(r.startTick || 0) * pxPerTick);
            const rw = Math.max(1, Math.round((Number(r.endTick || 0) - Number(r.startTick || 0)) * pxPerTick));
            rows += `<rect x="${rx}" y="${y + 4}" width="${rw}" height="${laneH - 8}" rx="2" fill="#dc2626" opacity="0.28">` +
              `<title>${escHtml(`rest ${r.startTick} -> ${r.endTick}`)}</title></rect>`;
          }
          for (let ni = 0; ni < lane.notes.length; ni++) {
            const n = lane.notes[ni];
            const x = labelW + Math.round(Number(n.startTick || 0) * pxPerTick);
            const w = Math.max(1, Math.round((Number(n.endTick || 0) - Number(n.startTick || 0)) * pxPerTick));
            const noteY = y + 5;
            const isMet = String(n.partId) === 'MET';
            rows += `<rect x="${x}" y="${noteY}" width="${w}" height="${laneH - 10}" rx="2" fill="${isMet ? '#ef4444' : '#2563eb'}" opacity="0.86">` +
              `<title>${escHtml(`nn ${n.noteNumber} | ${n.startTick} -> ${n.endTick}`)}</title></rect>`;
            rows += `<line x1="${x + 0.5}" y1="${noteY - 1}" x2="${x + 0.5}" y2="${noteY + (laneH - 8)}" stroke="#16a34a" stroke-width="1.4" />`;
          }
        }
        timelineWrap.innerHTML =
          `<div style="padding:8px 10px;border-bottom:1px solid #e5e7eb;font-size:12px;color:#374151;display:flex;align-items:center;gap:8px;flex-wrap:wrap;">` +
          `<span>Timeline (${notes.length} note events, ${safeRests.length} rests, division ${division}, metronome ${showMetronome ? 'on' : 'off'})</span>` +
          `<span style="margin-left:auto;display:flex;gap:6px;">` +
          `<button id="btnTlPlay" type="button" style="font-size:11px;padding:4px 8px;">Play Bar</button>` +
          `<button id="btnTlPause" type="button" style="font-size:11px;padding:4px 8px;">Pause</button>` +
          `<button id="btnTlReset" type="button" style="font-size:11px;padding:4px 8px;">Reset</button>` +
          `</span>` +
          `</div>` +
          `<svg width="${svgW}" height="${svgH}" viewBox="0 0 ${svgW} ${svgH}" xmlns="http://www.w3.org/2000/svg">` +
          `${grid}${rows}` +
          `<line id="timelinePlayhead" x1="${labelW + 0.5}" y1="0" x2="${labelW + 0.5}" y2="${svgH}" stroke="#f97316" stroke-width="2" opacity="0.95" />` +
          `</svg>`;
        timelineMeta = { labelW, pxPerTick, maxTick, division, svgH };
        setTimelinePlayheadTick(timelinePlayTick);
        const btnTlPlay = document.getElementById('btnTlPlay');
        const btnTlPause = document.getElementById('btnTlPause');
        const btnTlReset = document.getElementById('btnTlReset');
        if (btnTlPlay) btnTlPlay.addEventListener('click', () => startPlayheadAnimation());
        if (btnTlPause) btnTlPause.addEventListener('click', () => stopPlayheadAnimation());
        if (btnTlReset) btnTlReset.addEventListener('click', () => { stopPlayheadAnimation(); setTimelinePlayheadTick(0); });
      };

      const renderNativeAudio = (url, name) => {
        const safeName = String(name || 'musicxml-lab.mid');
        midiWrap.innerHTML = '';
        const box = document.createElement('div');
        box.style.fontSize = '12px';
        box.style.color = '#374151';
        box.innerHTML = `
          <div style="margin-bottom:6px;">Browser default media player:</div>
          <audio controls preload="metadata" src="${String(url || '').replace(/\"/g, '&quot;')}" style="width:100%;max-width:720px;"></audio>
          <div style="margin-top:6px;"><a href="${String(url || '').replace(/\"/g, '&quot;')}" download="${safeName.replace(/\"/g, '&quot;')}">Download ${safeName}</a></div>
        `;
        midiWrap.appendChild(box);
        const audioEl = box.querySelector('audio');
        if (audioEl) wireAudioToTimeline(audioEl);
      };

      const renderPlayer = async (url, name) => {
        if (/^(blob:|data:)/i.test(String(url || ''))) {
          appendLog('server URL missing; using browser media player');
          renderNativeAudio(url, name);
          return;
        }
        try {
          await loadScript('/assets/lucide.min.js');
          await loadScript('/assets/Tone.min.js');
          await loadScript('/assets/MidiPlayerJS-master/browser/midiplayer.js');
          await loadScript('/assets/compactMidiPlayer.js?v=20260207piano10');
          if (typeof window.renderCompactMidiPlayer !== 'function') throw new Error('compact player unavailable');
          midiWrap.innerHTML = '';
          await window.renderCompactMidiPlayer(midiWrap, surrogate || 'xml-midi-lab', name || 'musicxml-lab.mid', url);
          wireCompactTimeline(midiWrap);
        } catch (e) {
          appendLog('on-screen MIDI player unavailable, using browser audio: ' + String(e && e.message ? e.message : e));
          renderNativeAudio(url, name);
        }
      };

      let verovioReadyPromise = null;
      const ensureVerovioReady = async () => {
        if (verovioReadyPromise) return verovioReadyPromise;
        verovioReadyPromise = (async () => {
          if (!(window.verovio && window.verovio.toolkit)) {
            await loadScript('https://www.verovio.org/javascript/latest/verovio-toolkit-wasm.js');
          }
          for (let i = 0; i < 80; i++) {
            if (window.verovio && window.verovio.toolkit) return;
            await sleep(100);
          }
          throw new Error('Verovio toolkit not ready');
        })();
        return verovioReadyPromise;
      };

      const buildMidiFromXmlVerovio = async (xmlTextInput) => {
        await ensureVerovioReady();
        const tk = new window.verovio.toolkit();
        tk.loadData(String(xmlTextInput || ''));
        let midi = tk.renderToMIDI();
        if (midi instanceof Uint8Array) return midi;
        if (typeof midi !== 'string') throw new Error('Verovio MIDI output invalid');
        midi = midi.trim();
        if (/^data:/i.test(midi)) {
          const p = midi.indexOf(',');
          midi = p >= 0 ? midi.slice(p + 1) : midi;
        }
        return base64ToBytes(midi);
      };

      const uploadMidiToServer = async (bytes, name) => {
        const res = await fetch('/api/omr_publish.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ midiBase64: bytesToBase64(bytes) })
        });
        let j = null;
        try { j = await res.json(); } catch {}
        if (!res.ok || !j || j.status !== 'ok' || !j.midiUrl) {
          throw new Error(String(j?.error || `Publish failed HTTP ${res.status}`));
        }
        return {
          serveUrl: String(j.midiUrl || ''),
          savedName: String(j.midiName || name || 'musicxml-lab.mid')
        };
      };

      const runBuild = async () => {
        if (!xmlText) throw new Error('Missing MusicXML text');
        surrogate = String((surrogateInput?.value || surrogate || '')).replace(/[^0-9]/g, '');
        if (surrogateInput) surrogateInput.value = surrogate;
        setLog('Building MIDI from MusicXML only...');
        btnRebuild.disabled = true;
        btnDownload.disabled = true;

        const xmlHash = await sha256Hex(xmlText);
        const cacheKey = `musicxml_midi_cache_v2:${xmlHash}:mettrack`;
        const division = 480;
        const tempoBpm = 120;
        timelineTempoBpm = tempoBpm;
        const parsed = parseMusicXmlToNoteEvents(xmlText, division);
        const notes = Array.isArray(parsed?.notes) ? parsed.notes : [];
        const rests = Array.isArray(parsed?.rests) ? parsed.rests : [];
        appendLog(`parsed notes: ${notes.length}`);
        appendLog(`parsed rests: ${rests.length}`);
        appendLog(`rest barrier: off (refactor)`);
        try {
          midiBytes = await buildMidiFromXmlVerovio(xmlText);
          appendLog('midi engine: verovio');
        } catch (e) {
          appendLog('midi engine fallback: internal parser (' + String(e && e.message ? e.message : e) + ')');
          midiBytes = buildMidiFromNoteEventsBasic(notes, division, tempoBpm, includeMetronome);
        }
        let midiTimeline = parseMidiNoteEventsFromBytes(midiBytes);
        appendLog(`timeline source: midi (${midiTimeline.notes.length} notes)`);
        renderTimeline(midiTimeline.notes, midiTimeline.division, false, []);
        setTimelinePlayheadTick(0);
        appendLog(`metronome: ${includeMetronome ? 'on' : 'off'}`);
        if (!(midiBytes instanceof Uint8Array) || !midiBytes.length) throw new Error('MIDI build failed');
        cachePut(cacheKey, {
          createdAt: new Date().toISOString(),
          noteCount: notes.length,
          bytes: midiBytes.length,
          base64: bytesToBase64(midiBytes)
        });
        appendLog(`rebuilt fresh: ${cacheKey}`);

        if (midiBlobUrl) {
          try { URL.revokeObjectURL(midiBlobUrl); } catch {}
          midiBlobUrl = '';
        }
        midiBlobUrl = URL.createObjectURL(new Blob([midiBytes], { type: 'audio/midi' }));
        const baseName = (String(xmlName || 'musicxml-lab').replace(/\.(xml|mxl)$/i, '') || 'musicxml-lab');
        midiName = baseName.replace(/[^A-Za-z0-9_.-]+/g, '_').replace(/^_+|_+$/g, '') || 'musicxml-lab';
        if (!/\.mid$/i.test(midiName)) midiName += '.mid';
        let playUrl = midiBlobUrl;

        try {
          const uploaded = await uploadMidiToServer(midiBytes, midiName);
          playUrl = uploaded.serveUrl;
          midiName = String(uploaded.savedName || midiName);
          appendLog(`published: ${playUrl}`);
        } catch (e) {
          appendLog('server publish failed, using local blob: ' + String(e && e.message ? e.message : e));
        }

        cachePut('musicxml_midi_lab_last', {
          name: midiName,
          xmlName,
          xmlUrl,
          base64: bytesToBase64(midiBytes),
          createdAt: new Date().toISOString()
        });

        await renderPlayer(playUrl, midiName);
        appendLog(`midi bytes: ${midiBytes.length}`);
        appendLog(`ready: ${midiName}`);
        btnDownload.disabled = false;
        btnRebuild.disabled = false;
      };

      btnRebuild.addEventListener('click', async () => {
        try {
          await runBuild();
        } catch (e) {
          setLog('Rebuild failed: ' + String(e && e.message ? e.message : e));
          btnRebuild.disabled = false;
        }
      });

      btnDownload.addEventListener('click', () => {
        if (!(midiBytes instanceof Uint8Array) || !midiBytes.length) return;
        const a = document.createElement('a');
        a.href = midiBlobUrl || URL.createObjectURL(new Blob([midiBytes], { type: 'audio/midi' }));
        a.download = midiName || 'musicxml-lab.mid';
        document.body.appendChild(a);
        a.click();
        a.remove();
      });

      btnDownloadXml.addEventListener('click', () => {
        if (!xmlText) return;
        const baseName = (String(xmlName || 'musicxml-lab').replace(/\.(xml|mxl|musicxml)$/i, '') || 'musicxml-lab');
        let outName = baseName.replace(/[^A-Za-z0-9_.-]+/g, '_').replace(/^_+|_+$/g, '') || 'musicxml-lab';
        if (!/\.musicxml$/i.test(outName)) outName += '.musicxml';
        const blob = new Blob([xmlText], { type: 'application/vnd.recordare.musicxml+xml;charset=utf-8' });
        const u = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = u;
        a.download = outName;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => { try { URL.revokeObjectURL(u); } catch {} }, 500);
      });

      try {
        try {
          const raw = String(localStorage.getItem('omr_musicxml_viewer_payload') || '');
          if (raw) {
            const payload = JSON.parse(raw);
            if (!xmlUrl) xmlUrl = String(payload?.xml || '');
            if (!xmlTextLocal) xmlTextLocal = String(payload?.xmlText || '');
            if (!xmlName) xmlName = String(payload?.name || 'MusicXML');
            if (!surrogate) surrogate = String(payload?.surrogate || '').replace(/[^0-9]/g, '');
          }
        } catch {}

        if (!surrogate && document.referrer) {
          try {
            const ref = new URL(document.referrer);
            surrogate = String(ref.searchParams.get('q') || ref.searchParams.get('surrogate') || '').replace(/[^0-9]/g, '');
          } catch {}
        }
        if (surrogateInput) surrogateInput.value = surrogate;

        if (!xmlUrl && !xmlTextLocal) {
          throw new Error('No MusicXML payload found. Use ?xml=... or set omr_musicxml_viewer_payload in localStorage.');
        }

        xmlText = await readMusicXml();
        setMeta(`${xmlName} | XML→MIDI Lab`);
        setLog(`loaded XML chars: ${xmlText.length}`);
        btnDownloadXml.disabled = !xmlText;

        try {
          await loadScript('https://cdn.jsdelivr.net/npm/opensheetmusicdisplay@1.8.9/build/opensheetmusicdisplay.min.js');
          if (window.opensheetmusicdisplay && window.opensheetmusicdisplay.OpenSheetMusicDisplay) {
            const osmd = new window.opensheetmusicdisplay.OpenSheetMusicDisplay(mount, {
              autoResize: true,
              drawingParameters: 'compacttight',
              drawTitle: true
            });
            await osmd.load(xmlText);
            await osmd.render();
          } else {
            mount.textContent = 'OSMD unavailable in this browser.';
          }
        } catch (e) {
          mount.textContent = 'Score render failed: ' + String(e && e.message ? e.message : e);
        }

        await runBuild();
      } catch (e) {
        setMeta('MusicXML→MIDI Lab failed');
        setLog(String(e && e.message ? e.message : e));
        midiWrap.innerHTML = '<div style="font-size:12px;color:#b91c1c;">' + String(e && e.message ? e.message : e) + '</div>';
      }
    })();
  </script>
</body>
</html>
