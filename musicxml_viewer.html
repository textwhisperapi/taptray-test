<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MusicXML Score</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f8fafc; color: #111827; }
    .top { position: sticky; top: 0; background: #fff; border-bottom: 1px solid #d1d5db; padding: 10px 12px; z-index: 2; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
    .meta { font-size: 13px; color: #4b5563; margin-right:auto; }
    #scoreWrap { position: relative; background:#fff; }
    #mount { padding: 10px; min-height: 70vh; background: #fff; }
    #playLine { position:absolute; top:0; bottom:0; width:2px; background:rgba(255,120,0,0.92); pointer-events:none; transform:translateX(-1px); display:none; }
    #midiWrap { border-top:1px solid #d1d5db; background:#f3f4f6; padding:8px 10px; }
    pre { margin: 10px; white-space: pre-wrap; word-break: break-word; font-size: 12px; line-height: 1.4; background: #fff; border: 1px solid #d1d5db; border-radius: 6px; padding: 10px; display: none; }
  </style>
</head>
<body>
  <div class="top">
    <div class="meta" id="meta">Loading MusicXML score…</div>
  </div>
  <div id="scoreWrap">
    <div id="playLine"></div>
    <div id="mount"></div>
  </div>
  <div id="midiWrap"></div>
  <pre id="xml"></pre>

  <script>
    (async function () {
      const qs = new URLSearchParams(window.location.search);
      let xmlUrl = String(qs.get('xml') || '');
      let xmlTextLocal = String(qs.get('xmlText') || '');
      let xmlName = String(qs.get('name') || 'MusicXML');
      let midiUrl = String(qs.get('midi') || '');
      let midiName = String(qs.get('midiName') || 'omr.mid');
      if (!xmlUrl) {
        try {
          const raw = String(localStorage.getItem('omr_musicxml_viewer_payload') || '');
          if (raw) {
            const payload = JSON.parse(raw);
            if (payload && typeof payload === 'object') {
              xmlUrl = String(payload.xml || '');
              xmlTextLocal = String(payload.xmlText || xmlTextLocal || '');
              xmlName = String(payload.name || xmlName || 'MusicXML');
              midiUrl = String(payload.midi || midiUrl || '');
              midiName = String(payload.midiName || midiName || 'omr.mid');
            }
          }
        } catch {
          try {
            const raw = String(sessionStorage.getItem('omr_musicxml_viewer_payload') || '');
            if (raw) {
              const payload = JSON.parse(raw);
              if (payload && typeof payload === 'object') {
                xmlUrl = String(payload.xml || '');
                xmlTextLocal = String(payload.xmlText || xmlTextLocal || '');
                xmlName = String(payload.name || xmlName || 'MusicXML');
                midiUrl = String(payload.midi || midiUrl || '');
                midiName = String(payload.midiName || midiName || 'omr.mid');
              }
            }
          } catch {}
        }
      }

      const meta = document.getElementById('meta');
      const mount = document.getElementById('mount');
      const scoreWrap = document.getElementById('scoreWrap');
      const playLine = document.getElementById('playLine');
      const midiWrap = document.getElementById('midiWrap');
      const pre = document.getElementById('xml');
      const setMeta = (t) => { if (meta) meta.textContent = t; };
      const showText = (txt, reason) => {
        if (mount) mount.innerHTML = '';
        if (pre) { pre.style.display = 'block'; pre.textContent = txt || ''; }
        setMeta(reason || xmlName);
      };
      const isZipBytes = (buf) => {
        const b = new Uint8Array(buf || new ArrayBuffer(0));
        return b.length >= 4 && b[0] === 0x50 && b[1] === 0x4b && (b[2] === 0x03 || b[2] === 0x05 || b[2] === 0x07) && (b[3] === 0x04 || b[3] === 0x06 || b[3] === 0x08);
      };
      const loadScript = (src) => new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = src;
        s.async = true;
        s.onload = resolve;
        s.onerror = reject;
        document.head.appendChild(s);
      });

      const xmlIsBlob = typeof xmlUrl === 'string' && xmlUrl.startsWith('blob:');
      if (xmlIsBlob) {
        try {
          const raw = String(localStorage.getItem('omr_musicxml_viewer_payload') || '');
          if (raw) {
            const payload = JSON.parse(raw);
            const fallbackXml = String(payload?.xml || '');
            if (fallbackXml && !fallbackXml.startsWith('blob:')) {
              xmlUrl = fallbackXml;
              xmlTextLocal = String(payload?.xmlText || xmlTextLocal || '');
              xmlName = String(payload?.name || xmlName || 'MusicXML');
              midiUrl = String(payload?.midi || midiUrl || '');
              midiName = String(payload?.midiName || midiName || 'omr.mid');
            }
          }
        } catch {}
      }

      if ((!xmlUrl && !xmlTextLocal) || (typeof xmlUrl === 'string' && xmlUrl.startsWith('blob:') && !xmlTextLocal)) {
        showText('No MusicXML payload found. Run Scan, then click View MusicXML.', 'MusicXML URL missing');
        return;
      }

      let lastLineX = 0;
      let lastBandIdx = -1;
      let tickMax = 1;
      let systemBands = [];

      const detectSystemBands = () => {
        try {
          const svg = mount ? mount.querySelector('svg') : null;
          if (!svg || typeof svg.getBBox !== 'function') return [];
          const svgBox = svg.getBoundingClientRect();
          const paths = Array.from(svg.querySelectorAll('path, line'));
          const lines = [];
          for (let i = 0; i < paths.length; i++) {
            const el = paths[i];
            if (typeof el.getBBox !== 'function') continue;
            const b = el.getBBox();
            if (!b || !Number.isFinite(b.width) || !Number.isFinite(b.height)) continue;
            if (b.width < 120) continue;
            if (b.height > 2.8) continue;
            const y = b.y + b.height * 0.5;
            lines.push({ y, x0: b.x, x1: b.x + b.width });
          }
          if (!lines.length) return [];
          lines.sort((a, b) => a.y - b.y);
          const groups = [];
          const yTol = 4.2;
          for (let i = 0; i < lines.length; i++) {
            const l = lines[i];
            const g = groups[groups.length - 1];
            if (!g || Math.abs(l.y - g.yMean) > yTol) groups.push({ items: [l], yMean: l.y });
            else {
              g.items.push(l);
              g.yMean = g.items.reduce((s, it) => s + it.y, 0) / g.items.length;
            }
          }
          const rows = groups.map((g) => ({
            y: g.items.reduce((s, it) => s + it.y, 0) / g.items.length,
            x0: Math.min(...g.items.map((it) => it.x0)),
            x1: Math.max(...g.items.map((it) => it.x1))
          })).sort((a, b) => a.y - b.y);

          const diffs = [];
          for (let i = 1; i < rows.length; i++) {
            const d = rows[i].y - rows[i - 1].y;
            if (d >= 2 && d <= 24) diffs.push(d);
          }
          diffs.sort((a, b) => a - b);
          const interline = diffs.length ? diffs[Math.floor(diffs.length / 2)] : 8;
          const tol = Math.max(1.8, interline * 0.55);

          const staffs = [];
          for (let i = 0; i + 4 < rows.length; i++) {
            const g = rows.slice(i, i + 5);
            const gDiffs = [g[1].y - g[0].y, g[2].y - g[1].y, g[3].y - g[2].y, g[4].y - g[3].y];
            const mean = gDiffs.reduce((s, v) => s + v, 0) / gDiffs.length;
            const ok = gDiffs.every((d) => d >= interline * 0.45 && d <= interline * 1.9) &&
              gDiffs.every((d) => Math.abs(d - mean) <= tol);
            if (!ok) continue;
            const center = (g[0].y + g[4].y) * 0.5;
            const prev = staffs[staffs.length - 1];
            if (prev && Math.abs(center - prev.center) <= interline * 0.9) continue;
            staffs.push({
              top: g[0].y - interline * 1.1,
              bottom: g[4].y + interline * 1.1,
              x0: Math.min(...g.map((r) => r.x0)),
              x1: Math.max(...g.map((r) => r.x1)),
              center
            });
          }
          if (!staffs.length) return [];

          staffs.sort((a, b) => a.center - b.center);
          const staffGaps = [];
          for (let i = 0; i + 1 < staffs.length; i++) staffGaps.push(Math.max(0, staffs[i + 1].top - staffs[i].bottom));
          const sortedStaffGaps = [...staffGaps].sort((a, b) => a - b);
          const gapMedian = sortedStaffGaps.length ? sortedStaffGaps[Math.floor(sortedStaffGaps.length / 2)] : interline * 2.6;
          let splitGap = Math.max(interline * 2.0, Math.min(interline * 14, gapMedian * 1.45));
          if (sortedStaffGaps.length >= 2) {
            let c1 = sortedStaffGaps[0];
            let c2 = sortedStaffGaps[sortedStaffGaps.length - 1];
            let a = [];
            let b = [];
            for (let it = 0; it < 8; it++) {
              a = [];
              b = [];
              for (let i = 0; i < sortedStaffGaps.length; i++) {
                const g = sortedStaffGaps[i];
                if (Math.abs(g - c1) <= Math.abs(g - c2)) a.push(g);
                else b.push(g);
              }
              if (!a.length || !b.length) break;
              c1 = a.reduce((s, v) => s + v, 0) / a.length;
              c2 = b.reduce((s, v) => s + v, 0) / b.length;
            }
            if (a.length && b.length) {
              const low = (c1 <= c2) ? a : b;
              const high = (c1 <= c2) ? b : a;
              const lowMax = Math.max(...low);
              const highMin = Math.min(...high);
              const lowMean = low.reduce((s, v) => s + v, 0) / low.length;
              const highMean = high.reduce((s, v) => s + v, 0) / high.length;
              if (highMean > lowMean * 1.25 && highMin > lowMax) splitGap = (lowMax + highMin) * 0.5;
            }
          }
          const merged = [];
          let s = 0;
          while (s < staffs.length) {
            let top = staffs[s].top;
            let bottom = staffs[s].bottom;
            let x0 = staffs[s].x0;
            let x1 = staffs[s].x1;
            let e = s;
            while (e + 1 < staffs.length) {
              const gap = staffs[e + 1].top - staffs[e].bottom;
              if (gap > splitGap) break;
              e += 1;
              top = Math.min(top, staffs[e].top);
              bottom = Math.max(bottom, staffs[e].bottom);
              x0 = Math.min(x0, staffs[e].x0);
              x1 = Math.max(x1, staffs[e].x1);
            }
            merged.push({ top, bottom, x0, x1 });
            s = e + 1;
          }
          const wrapRect = scoreWrap.getBoundingClientRect();
          return merged.map((b) => ({
            top: Math.max(0, Math.round((svgBox.top - wrapRect.top) + b.top)),
            bottom: Math.max(0, Math.round((svgBox.top - wrapRect.top) + b.bottom)),
            x0: Math.round((svgBox.left - wrapRect.left) + b.x0),
            x1: Math.round((svgBox.left - wrapRect.left) + b.x1)
          }));
        } catch {
          return [];
        }
      };

      const updateLine = (tick, total) => {
        if (!scoreWrap || !playLine) return;
        const pct = Math.max(0, Math.min(1, Number(tick || 0) / Math.max(1, Number(total || tickMax || 1))));
        let x = 0;
        let idx = 0;
        if (Array.isArray(systemBands) && systemBands.length) {
          idx = Math.max(0, Math.min(systemBands.length - 1, Math.floor(pct * systemBands.length)));
          const band = systemBands[idx];
          const localStart = idx / systemBands.length;
          const localEnd = (idx + 1) / systemBands.length;
          const localPct = localEnd > localStart ? (pct - localStart) / (localEnd - localStart) : 0;
          x = Math.round(Number(band.x0 || 0) + Math.max(0, Math.min(1, localPct)) * Math.max(1, Number(band.x1 || 0) - Number(band.x0 || 0)));
          playLine.style.top = Math.max(0, Number(band.top || 0)) + 'px';
          playLine.style.bottom = Math.max(0, scoreWrap.clientHeight - Number(band.bottom || scoreWrap.clientHeight)) + 'px';
        } else {
          const w = Math.max(1, scoreWrap.clientWidth);
          x = Math.round(pct * w);
          playLine.style.top = '0px';
          playLine.style.bottom = '0px';
        }
        if (idx === lastBandIdx && x < lastLineX) x = lastLineX;
        if (idx !== lastBandIdx) lastLineX = Number.MIN_SAFE_INTEGER;
        lastBandIdx = idx;
        lastLineX = x;
        playLine.style.left = x + 'px';
        playLine.style.display = 'block';
      };

      const resetLine = () => {
        lastLineX = 0;
        lastBandIdx = -1;
        if (playLine) {
          playLine.style.left = '0px';
          playLine.style.display = 'none';
        }
      };

      try {
        let xmlText = String(xmlTextLocal || '');
        if (!xmlText) {
          const res = await fetch(xmlUrl, { cache: 'no-store' });
          if (!res.ok) throw new Error('HTTP ' + res.status);
          const buf = await res.arrayBuffer();
          if (isZipBytes(buf)) {
            await loadScript('https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js');
            const zip = await window.JSZip.loadAsync(buf);
            const container = zip.file('META-INF/container.xml');
            if (container) {
              const cText = await container.async('string');
              const m = cText.match(/full-path\\s*=\\s*"([^"]+)"/i);
              if (m && m[1] && zip.file(m[1])) xmlText = await zip.file(m[1]).async('string');
            }
            if (!xmlText) {
              const names = Object.keys(zip.files || {}).filter((n) => /\\.xml$/i.test(n) && !/^META-INF\\//i.test(n));
              if (names[0] && zip.file(names[0])) xmlText = await zip.file(names[0]).async('string');
            }
            if (!xmlText) throw new Error('Could not extract XML from MXL');
            setMeta(xmlName + ' (rendered from MXL)');
          } else {
            xmlText = new TextDecoder('utf-8', { fatal: false }).decode(new Uint8Array(buf));
            setMeta(xmlName);
          }
        } else {
          setMeta(xmlName + ' (local)');
        }

        await loadScript('https://cdn.jsdelivr.net/npm/opensheetmusicdisplay@1.8.9/build/opensheetmusicdisplay.min.js');
        if (!window.opensheetmusicdisplay || !window.opensheetmusicdisplay.OpenSheetMusicDisplay) {
          showText(xmlText, xmlName + ' (viewer unavailable)');
          return;
        }
        const osmd = new window.opensheetmusicdisplay.OpenSheetMusicDisplay(mount, {
          autoResize: true,
          drawingParameters: 'compacttight',
          drawTitle: true
        });
        await osmd.load(xmlText);
        await osmd.render();

        const detectSystemBandsFromOsmd = () => {
          try {
            const wrapRect = scoreWrap.getBoundingClientRect();
            const svg = mount ? mount.querySelector('svg') : null;
            const svgRect = svg ? svg.getBoundingClientRect() : wrapRect;
            const dx = svgRect.left - wrapRect.left;
            const dy = svgRect.top - wrapRect.top;
            const pages = osmd?.graphic?.musicPages || osmd?.GraphicSheet?.MusicPages || [];
            const out = [];
            for (let p = 0; p < pages.length; p++) {
              const systems = pages[p]?.musicSystems || pages[p]?.MusicSystems || [];
              for (let i = 0; i < systems.length; i++) {
                const ps = systems[i]?.PositionAndShape || systems[i]?.positionAndShape || null;
                const pos = ps?.AbsolutePosition || ps?.absolutePosition || ps?.RelativePosition || ps?.relativePosition || null;
                const size = ps?.Size || ps?.size || null;
                const x = Number(pos?.x ?? pos?.X);
                const y = Number(pos?.y ?? pos?.Y);
                const w = Number(size?.width ?? size?.Width);
                const h = Number(size?.height ?? size?.Height);
                if (![x, y, w, h].every(Number.isFinite)) continue;
                if (w < 20 || h < 20) continue;
                out.push({
                  top: Math.max(0, Math.round(dy + y)),
                  bottom: Math.max(0, Math.round(dy + y + h)),
                  x0: Math.max(0, Math.round(dx + x)),
                  x1: Math.max(0, Math.round(dx + x + w))
                });
              }
            }
            return out;
          } catch {
            return [];
          }
        };

        systemBands = detectSystemBandsFromOsmd();
        if (!systemBands.length) systemBands = detectSystemBands();
        window.addEventListener('resize', () => {
          systemBands = detectSystemBandsFromOsmd();
          if (!systemBands.length) systemBands = detectSystemBands();
        });

        if (midiUrl) {
          try {
            await loadScript('/assets/lucide.min.js');
            await loadScript('/assets/Tone.min.js');
            await loadScript('/assets/MidiPlayerJS-master/browser/midiplayer.js');
            await loadScript('/assets/compactMidiPlayer.js?v=20260207piano10');
            if (typeof window.renderCompactMidiPlayer === 'function') {
              await window.renderCompactMidiPlayer(midiWrap, 'xml-live', midiName || 'omr.mid', midiUrl);
              midiWrap.addEventListener('midi-loaded', (e) => {
                tickMax = Math.max(1, Number(e?.detail?.totalTicks || 1));
                resetLine();
              });
              midiWrap.addEventListener('midi-playing', (e) => {
                const tick = Number(e?.detail?.tick || 0);
                const total = Number(e?.detail?.totalTicks || tickMax || 1);
                tickMax = Math.max(1, total);
                updateLine(tick, tickMax);
              });
              midiWrap.addEventListener('midi-ended', () => resetLine());
            } else {
              midiWrap.innerHTML = '<div style="font-size:12px;color:#6b7280;">Compact MIDI player not available.</div>';
            }
          } catch (e) {
            midiWrap.innerHTML = '<div style="font-size:12px;color:#b91c1c;">MIDI player load failed: ' + String(e && e.message ? e.message : e) + '</div>';
          }
        } else {
          midiWrap.innerHTML = '<div style="font-size:12px;color:#6b7280;">No MIDI URL available for this scan.</div>';
        }
      } catch (e) {
        showText(String(e && e.message ? e.message : e), 'MusicXML render failed');
      }
    })();
  </script>
</body>
</html>
